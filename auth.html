<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Авторизация...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function handleAuth() {
            try {
                const { data: { user }, error } = await supabaseClient.auth.getUser();
                
                if (error) throw error;
                
                if (user) {
                    // Успешный вход - перенаправляем на главную
                    window.location.href = 'https://ggfh-becouse.github.io/school62-vote-1';
                } else {
                    // Не удалось войти
                    window.location.href = 'https://ggfh-becouse.github.io/school62-vote-1?error=auth_failed';
                }
            } catch (err) {
                window.location.href = 'https://ggfh-becouse.github.io/school62-vote-1?error=' + err.message;
            }
        }
        
        handleAuth();
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #242582, #553D67);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #ffd700;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div>
        <h2>Вход выполнен!</h2>
        <div class="loader"></div>
        <p>Перенаправляем обратно...</p>
    </div>
</body>
</html>
