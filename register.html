<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Регистрация - Школа №62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .register-card {
            background: white;
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            padding: 28px 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border: 2px solid #4a6fa5;
        }

        .register-card h2 {
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid #4a6fa5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .class-select {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .class-option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .class-option:hover {
            border-color: #4a6fa5;
            background: #eef2f7;
        }

        .class-option.selected {
            background: #4a6fa5;
            color: white;
            border-color: #2c3e50;
        }

        .hint {
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .register-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            border-bottom: 4px solid #2c3e50;
            transition: all 0.1s;
            margin-top: 20px;
        }

        .register-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .register-btn:disabled {
            background: #ccc;
            border-bottom-color: #999;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
        }

        .login-link a {
            color: #4a6fa5;
            text-decoration: none;
            font-weight: 600;
        }

        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10001;
            animation: slideIn 0.2s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }

        @media (max-width: 600px) {
            .class-select {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>📝 РЕГИСТРАЦИЯ</h2>
        
        <div class="form-group">
            <label>Настоящее имя</label>
            <input type="text" id="realName" class="form-control" placeholder="Иванов Иван" maxlength="50">
        </div>

        <div class="form-group">
            <label>Никнейм (латиница и цифры, до 10 символов)</label>
            <input type="text" id="nickname" class="form-control" placeholder="john2007" maxlength="10">
            <div class="hint" id="nicknameHint">Только латиница и цифры</div>
        </div>

        <div class="form-group">
            <label>Пароль (минимум 6 символов)</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" maxlength="50">
            <div class="hint" id="passwordHint">Минимум 6 символов</div>
        </div>

        <div class="form-group">
            <label>Повторите пароль</label>
            <input type="password" id="passwordConfirm" class="form-control" placeholder="••••••••" maxlength="50">
            <div class="hint" id="passwordConfirmHint"></div>
        </div>

        <div class="form-group">
            <label>Класс</label>
            <div class="class-select" id="classSelect"></div>
        </div>

        <button class="register-btn" id="registerBtn" disabled>ЗАРЕГИСТРИРОВАТЬСЯ</button>

        <div class="login-link">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
    </div>

    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const classes = ['7А', '7Б', '8А', '8Б', '9А', '9Б', '10А', '10Б', '11А'];
        let selectedClass = '';
        let isNicknameValid = false;
        let isPasswordValid = false;

        // Заполняем классы
        const classSelect = document.getElementById('classSelect');
        classes.forEach(c => {
            const div = document.createElement('div');
            div.className = 'class-option';
            div.textContent = c;
            div.onclick = () => selectClass(c, div);
            classSelect.appendChild(div);
        });

        function selectClass(className, element) {
            document.querySelectorAll('.class-option').forEach(el => {
                el.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedClass = className;
            checkForm();
        }

        // Проверка ника
        document.getElementById('nickname').addEventListener('input', function(e) {
            const value = e.target.value;
            const hint = document.getElementById('nicknameHint');
            
            const regex = /^[A-Za-z0-9]+$/;
            if (value && !regex.test(value)) {
                hint.textContent = '❌ Только латиница и цифры';
                hint.style.color = '#c0392b';
                isNicknameValid = false;
            } else if (value.length > 10) {
                hint.textContent = '❌ Максимум 10 символов';
                hint.style.color = '#c0392b';
                isNicknameValid = false;
            } else if (value.length < 3) {
                hint.textContent = '❌ Минимум 3 символа';
                hint.style.color = '#c0392b';
                isNicknameValid = false;
            } else {
                hint.textContent = '✅ Доступно';
                hint.style.color = '#27ae60';
                isNicknameValid = true;
            }
            
            checkForm();
        });

        // Проверка пароля
        function checkPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('passwordConfirm').value;
            const hint = document.getElementById('passwordHint');
            const confirmHint = document.getElementById('passwordConfirmHint');

            // Проверка длины пароля
            if (password.length < 6) {
                hint.textContent = '❌ Минимум 6 символов';
                hint.style.color = '#c0392b';
                isPasswordValid = false;
            } else {
                hint.textContent = '✅ Минимум 6 символов';
                hint.style.color = '#27ae60';
                isPasswordValid = true;
            }

            // Проверка совпадения
            if (confirm) {
                if (password !== confirm) {
                    confirmHint.textContent = '❌ Пароли не совпадают';
                    confirmHint.style.color = '#c0392b';
                    isPasswordValid = false;
                } else {
                    confirmHint.textContent = '✅ Пароли совпадают';
                    confirmHint.style.color = '#27ae60';
                }
            } else {
                confirmHint.textContent = '';
            }

            checkForm();
        }

        document.getElementById('password').addEventListener('input', checkPassword);
        document.getElementById('passwordConfirm').addEventListener('input', checkPassword);

        function checkForm() {
            const realName = document.getElementById('realName').value.trim();
            const btn = document.getElementById('registerBtn');
            
            btn.disabled = !(realName && isNicknameValid && isPasswordValid && selectedClass);
        }

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const realName = document.getElementById('realName').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value.trim();
            
            try {
                // Проверка уникальности ника
                const { data: existing } = await supabaseClient
                    .from('users')
                    .select('nickname')
                    .eq('nickname', nickname)
                    .maybeSingle();
                
                if (existing) {
                    showMessage('Этот ник уже занят', 'error');
                    return;
                }

                // Создание пользователя
                const { data, error } = await supabaseClient
                    .from('users')
                    .insert({
                        real_name: realName,
                        nickname: nickname,
                        password: password,
                        class: selectedClass,
                        avatar_url: 'https://i.pravatar.cc/300',
                        status: '',
                        is_prime: false
                    })
                    .select()
                    .single();

                if (error) throw error;

                // Сохраняем ID пользователя
                localStorage.setItem('userId', data.id);
                localStorage.setItem('userNickname', data.nickname);
                localStorage.setItem('userClass', data.class);
                
                showMessage('✅ Регистрация успешна!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'your_account.html';
                }, 1500);

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>
