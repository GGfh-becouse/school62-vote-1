<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лучшая девочка школы - Битва за 8 марта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            color: white;
            font-size: 1.8rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header h1 span {
            color: #ffd700;
            display: inline-block;
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%,100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Профиль пользователя */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px 8px 8px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ffd700;
        }

        .user-name {
            color: white;
            font-weight: 500;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .google-login-btn {
            background: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .google-login-btn:hover {
            transform: scale(1.02);
        }

        .google-login-btn img {
            width: 24px;
            height: 24px;
        }

        /* Информация о голосовании */
        .info-bar {
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 24px;
            color: #ffd700;
            text-align: center;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }

        /* Битва */
        .battle-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .battle-container {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }

        .candidate-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
            border: 3px solid transparent;
        }

        .candidate-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.4);
        }

        .candidate-card.selected {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }

        .candidate-photo {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-bottom: 3px solid #f0f0f0;
        }

        .candidate-info {
            padding: 24px;
        }

        .candidate-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .candidate-class {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .candidate-bio {
            color: #444;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .rating-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 2px solid #eee;
        }

        .rating {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1a1a2e;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(255,215,0,0.3);
        }

        .rating-change {
            font-size: 0.9rem;
            color: #666;
        }

        .rating-change span {
            color: #28a745;
            font-weight: bold;
        }

        .rating-change span.minus {
            color: #dc3545;
        }

        /* VS разделитель */
        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            margin: 0 auto;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,215,0,0.3);
        }

        @media (max-width: 768px) {
            .vs-divider {
                width: 60px;
                height: 60px;
                font-size: 2rem;
                margin: 10px auto;
            }
        }

        /* Кнопка действия */
        .action-button {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 16px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255,215,0,0.3);
            transition: all 0.3s;
            margin: 0 auto 40px;
            display: block;
            width: fit-content;
        }

        .action-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(255,215,0,0.4);
        }

        .action-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Рейтинг */
        .rating-table {
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .rating-table h2 {
            color: #1a1a2e;
            margin-bottom: 24px;
            font-size: 1.8rem;
            text-align: center;
        }

        .rating-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rating-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 16px;
            transition: transform 0.2s;
        }

        .rating-item:hover {
            transform: translateX(5px);
            background: #f0f3f5;
        }

        .rating-position {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 16px;
        }

        .rating-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 16px;
            border: 2px solid #ffd700;
        }

        .rating-info {
            flex: 1;
        }

        .rating-name {
            font-weight: 700;
            color: #333;
            font-size: 1.2rem;
        }

        .rating-class {
            color: #666;
            font-size: 0.9rem;
        }

        .rating-score {
            font-weight: 800;
            color: #1a1a2e;
            background: rgba(255,215,0,0.2);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 1.3rem;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 16px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .message.success { background: #28a745; }
        .message.error { background: #dc3545; }
        .message.info { background: #17a2b8; }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <h1>🌸 БИТВА <span>ЗА 8 МАРТА</span> 🌸</h1>
            
            <div id="authSection">
                <div id="userProfile" class="user-profile" style="display: none;">
                    <img id="userAvatar" class="user-avatar" src="" alt="">
                    <span id="userName" class="user-name"></span>
                    <button id="logoutBtn" class="logout-btn">Выйти</button>
                </div>
                <button id="loginBtn" class="google-login-btn">
                    <img src="https://www.google.com/favicon.ico" alt="">
                    Войти через Google
                </button>
            </div>
        </div>

        <!-- Информация -->
        <div id="infoBar" class="info-bar" style="display: none;">
            ⚔️ Выберите лучшую! Победитель получает +100 рейтинга, проигравший -50
        </div>

        <!-- Сообщения -->
        <div id="messageContainer"></div>

        <!-- Основная битва -->
        <div id="battleContainer" style="display: none;">
            <div class="battle-container" id="battleGrid"></div>
            <button id="voteBtn" class="action-button">⚔️ Сделать выбор ⚔️</button>
        </div>

        <!-- Рейтинг -->
        <div id="ratingContainer" class="rating-table" style="display: none;">
            <h2>🏆 РЕЙТИНГ ДЕВУШЕК 🏆</h2>
            <div id="ratingList" class="rating-list"></div>
        </div>

        <!-- Пустое состояние -->
        <div id="emptyState" class="empty-state" style="display: none;">
            😢 Загрузка кандидатов...
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
// НАСТРОЙКИ - ТВОИ ДАННЫЕ (НЕ МЕНЯТЬ!)
// ============================================
const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkY3d4dnhrdnluY3lic2Vmb3RqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTMzODksImV4cCI6MjA4ODEyOTM4OX0.gIF0di79PaPA_0ckWX5R-wxQ435oaiu4jf1J48qz7SE';

// ТВОЙ САЙТ - БОЛЬШЕ НИЧЕГО НЕ НУЖНО!
const MY_SITE = 'https://ggfh-becouse.github.io/school62-vote-1';

// ============================================
// ИНИЦИАЛИЗАЦИЯ - ИСПРАВЛЕНО!
// ============================================
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allCandidates = [];
let currentUser = null;
let currentPair = [];
let userVotes = new Set(); // для истории голосований

// ============================================
// АВТОРИЗАЦИЯ
// ============================================
async function checkUser() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (user) {
        currentUser = user;
        updateAuthUI();
        loadUserVotes();
        loadCandidates();
    } else {
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('battleContainer').style.display = 'none';
        document.getElementById('ratingContainer').style.display = 'none';
    }
}

function updateAuthUI() {
    const loginBtn = document.getElementById('loginBtn');
    const userProfile = document.getElementById('userProfile');
    const userName = document.getElementById('userName');
    const userAvatar = document.getElementById('userAvatar');
    
    if (currentUser) {
        loginBtn.style.display = 'none';
        userProfile.style.display = 'flex';
        userName.textContent = currentUser.user_metadata.full_name || 'Участник';
        userAvatar.src = currentUser.user_metadata.avatar_url || 'https://i.pravatar.cc/40';
    } else {
        loginBtn.style.display = 'flex';
        userProfile.style.display = 'none';
    }
}

async function login() {
    try {
        showMessage('Перенаправление...', 'info');
        
        const { error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: 'https://ggfh-becouse.github.io/school62-vote-1/auth.html' // ЖЁСТКО ПРОПИСАНО!
            }
        });
        
        if (error) throw error;
    } catch (err) {
        showMessage('Ошибка входа: ' + err.message, 'error');
    }
}

async function logout() {
    await supabaseClient.auth.signOut();
    currentUser = null;
    userVotes.clear();
    updateAuthUI();
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('battleContainer').style.display = 'none';
    document.getElementById('ratingContainer').style.display = 'none';
    showMessage('Вы вышли', 'success');
}

// ============================================
// ЗАГРУЗКА ГОЛОСОВ ПОЛЬЗОВАТЕЛЯ
// ============================================
async function loadUserVotes() {
    if (!currentUser) return;
    
    const { data } = await supabaseClient
        .from('votes')
        .select('candidate_id')
        .eq('user_id', currentUser.id);
    
    if (data) {
        userVotes = new Set(data.map(v => v.candidate_id));
    }
}

// ============================================
// ЗАГРУЗКА КАНДИДАТОВ
// ============================================
async function loadCandidates() {
    try {
        const { data, error } = await supabaseClient
            .from('candidates')
            .select('*')
            .order('votes', { ascending: false });
        
        if (error) throw error;
        
        allCandidates = data || [];
        
        if (allCandidates.length < 2) {
            showMessage('Нужно минимум 2 кандидата', 'error');
            return;
        }
        
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('battleContainer').style.display = 'block';
        document.getElementById('ratingContainer').style.display = 'block';
        document.getElementById('infoBar').style.display = 'block';
        
        updateLeaderboard();
        selectNewPair();
    } catch (err) {
        showMessage('Ошибка загрузки: ' + err.message, 'error');
    }
}

// ============================================
// ВЫБОР НОВОЙ ПАРЫ
// ============================================
function selectNewPair() {
    if (allCandidates.length < 2) return;
    
    // Фильтруем тех, за кого уже голосовали
    const available = allCandidates.filter(c => !userVotes.has(c.id));
    
    if (available.length < 2) {
        showMessage('Вы уже проголосовали за всех! Ждите новых кандидатов', 'info');
        currentPair = [];
        renderBattle([]);
        return;
    }
    
    // Выбираем двух случайных
    let first, second;
    do {
        const shuffled = [...available].sort(() => 0.5 - Math.random());
        first = shuffled[0];
        second = shuffled[1];
    } while (first.id === second.id);
    
    currentPair = [first, second];
    renderBattle(currentPair);
}

// ============================================
// ОТОБРАЖЕНИЕ БИТВЫ
// ============================================
function renderBattle(pair) {
    const container = document.getElementById('battleGrid');
    
    if (pair.length < 2) {
        container.innerHTML = `
            <div style="grid-column:1/-1; text-align:center; color:white; padding:40px;">
                Недостаточно кандидатов для битвы
            </div>
        `;
        return;
    }
    
    container.innerHTML = `
        <div class="candidate-card" onclick="selectCandidate(${pair[0].id})" id="card-${pair[0].id}">
            <img src="${pair[0].photo_url || 'https://i.pravatar.cc/300'}" class="candidate-photo" onerror="this.src='https://i.pravatar.cc/300?u=${pair[0].id}'">
            <div class="candidate-info">
                <h2 class="candidate-name">${pair[0].name}</h2>
                <div class="candidate-class">${pair[0].class || '??'} класс</div>
                <div class="candidate-bio">${pair[0].bio || 'Нет описания'}</div>
                <div class="rating-container">
                    <span class="rating">❤️ ${pair[0].votes || 0}</span>
                    <span class="rating-change">+100 если победит</span>
                </div>
            </div>
        </div>
        
        <div class="vs-divider">VS</div>
        
        <div class="candidate-card" onclick="selectCandidate(${pair[1].id})" id="card-${pair[1].id}">
            <img src="${pair[1].photo_url || 'https://i.pravatar.cc/300'}" class="candidate-photo" onerror="this.src='https://i.pravatar.cc/300?u=${pair[1].id}'">
            <div class="candidate-info">
                <h2 class="candidate-name">${pair[1].name}</h2>
                <div class="candidate-class">${pair[1].class || '??'} класс</div>
                <div class="candidate-bio">${pair[1].bio || 'Нет описания'}</div>
                <div class="rating-container">
                    <span class="rating">❤️ ${pair[1].votes || 0}</span>
                    <span class="rating-change">+100 если победит</span>
                </div>
            </div>
        </div>
    `;
    
    // Убираем выделение
    document.querySelectorAll('.candidate-card').forEach(c => {
        c.classList.remove('selected');
    });
}

// ============================================
// ВЫБОР КАНДИДАТА
// ============================================
let selectedCandidateId = null;

window.selectCandidate = function(id) {
    // Убираем выделение у всех
    document.querySelectorAll('.candidate-card').forEach(c => {
        c.classList.remove('selected');
    });
    
    // Выделяем выбранную
    document.getElementById(`card-${id}`).classList.add('selected');
    selectedCandidateId = id;
};

// ============================================
// ГОЛОСОВАНИЕ
// ============================================
document.getElementById('voteBtn').addEventListener('click', async function() {
    if (!currentUser) {
        showMessage('Сначала войдите', 'error');
        return;
    }
    
    if (!selectedCandidateId) {
        showMessage('Выберите девушку', 'error');
        return;
    }
    
    if (currentPair.length !== 2) return;
    
    const winner = currentPair.find(c => c.id === selectedCandidateId);
    const loser = currentPair.find(c => c.id !== selectedCandidateId);
    
    if (!winner || !loser) return;
    
    try {
        // Новые рейтинги
        const newWinnerVotes = (winner.votes || 0) + 100;
        const newLoserVotes = Math.max(0, (loser.votes || 0) - 50); // не ниже 0
        
        // Обновляем победителя
        await supabaseClient
            .from('candidates')
            .update({ votes: newWinnerVotes })
            .eq('id', winner.id);
        
        // Обновляем проигравшего
        await supabaseClient
            .from('candidates')
            .update({ votes: newLoserVotes })
            .eq('id', loser.id);
        
        // Записываем голос
        await supabaseClient
            .from('votes')
            .insert({
                user_id: currentUser.id,
                candidate_id: winner.id,
                voted_at: new Date()
            });
        
        // Обновляем локальные данные
        winner.votes = newWinnerVotes;
        loser.votes = newLoserVotes;
        userVotes.add(winner.id);
        
        // Обновляем рейтинг
        updateLeaderboard();
        
        // Выбираем новую пару
        selectedCandidateId = null;
        selectNewPair();
        
        showMessage(`✅ ${winner.name} победила! +100 рейтинга`, 'success');
        
    } catch (err) {
        showMessage('Ошибка: ' + err.message, 'error');
    }
});

// ============================================
// ОБНОВЛЕНИЕ РЕЙТИНГА
// ============================================
function updateLeaderboard() {
    const sorted = [...allCandidates].sort((a, b) => (b.votes || 0) - (a.votes || 0));
    const container = document.getElementById('ratingList');
    
    let html = '';
    sorted.forEach((c, index) => {
        html += `
            <div class="rating-item">
                <div class="rating-position">${index + 1}</div>
                <img src="${c.photo_url || 'https://i.pravatar.cc/300'}" class="rating-avatar" onerror="this.src='https://i.pravatar.cc/300?u=${c.id}'">
                <div class="rating-info">
                    <div class="rating-name">${c.name}</div>
                    <div class="rating-class">${c.class || '??'} класс</div>
                </div>
                <div class="rating-score">❤️ ${c.votes || 0}</div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

// ============================================
// СООБЩЕНИЯ
// ============================================
function showMessage(text, type) {
    const container = document.getElementById('messageContainer');
    const msg = document.createElement('div');
    msg.className = `message ${type}`;
    msg.textContent = text;
    container.appendChild(msg);
    
    setTimeout(() => {
        msg.remove();
    }, 3000);
}

// ============================================
// СЛУШАТЕЛИ
// ============================================
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('logoutBtn').addEventListener('click', logout);

// Слушаем изменения авторизации
supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN') {
        currentUser = session.user;
        updateAuthUI();
        loadUserVotes();
        loadCandidates();
        showMessage('Добро пожаловать!', 'success');
    }
});

// ============================================
// СТАРТ
// ============================================
checkUser();
    </script>
</body>
</html>
