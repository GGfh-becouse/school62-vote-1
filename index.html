<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ШКОЛЬНАЯ ЛЕНТА - 62</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: #00aced; /* Синий как в Твиттере */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* ЭКРАН СОГЛАШЕНИЯ */
        .agreement-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 16px;
        }

        .agreement-card {
            background: white;
            border-radius: 10px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
        }

        .agreement-card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #00aced;
        }

        .agreement-text {
            color: #555;
            line-height: 1.5;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .checkbox-container {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .agreement-button {
            background: #00aced;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
        }

        .agreement-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content {
            display: none;
        }

        /* Шапка */
        .header {
            background: #00aced;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
        }

        .header h1 small {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        /* Статистика */
        .user-stats {
            background: #f8f9fa;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #e1e8ed;
        }

        .stat-items {
            display: flex;
            gap: 15px;
        }

        .stat-pill {
            color: #555;
        }

        .stat-pill span {
            font-weight: 700;
            color: #00aced;
            margin-left: 5px;
        }

        .school-badge {
            background: #e1e8ed;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #333;
            color: white;
            border-radius: 5px;
            z-index: 9999;
        }

        .message.success { background: #00aced; }
        .message.error { background: #dc3545; }

        /* Управление автообновлением */
        .auto-refresh-control {
            background: white;
            padding: 8px 15px;
            border-bottom: 1px solid #e1e8ed;
            display: flex;
            justify-content: flex-end;
        }

        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            color: #555;
        }

        /* Битва */
        .battle-header {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 1px solid #e1e8ed;
        }

        .battle-header h2 {
            color: #333;
            font-size: 1.2rem;
        }

        .battle-header p {
            color: #777;
            font-size: 0.8rem;
        }

        .battle-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #e1e8ed;
        }

        .candidate-card {
            background: white;
            padding: 15px;
            cursor: pointer;
            transition: 0.1s;
        }

        .candidate-card:hover {
            background: #f8f9fa;
        }

        .candidate-card.selected {
            background: #e3f2fd;
            border-left: 3px solid #00aced;
        }

        .candidate-card img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-bottom: 8px;
        }

        .candidate-name {
            font-weight: 700;
            color: #333;
        }

        .candidate-class {
            color: #777;
            font-size: 0.8rem;
        }

        .rating {
            color: #00aced;
            font-weight: 700;
            display: block;
            margin-top: 5px;
        }

        .vote-button {
            background: #00aced;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: 700;
            margin: 15px auto;
            display: block;
            cursor: pointer;
        }

        /* PRIME блок */
        .prime-box {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 1px solid #e1e8ed;
        }

        .prime-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .prime-badge {
            background: #00aced;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .prime-input-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .prime-input-group input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .prime-input-group button {
            background: #00aced;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .prime-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            color: #00aced;
            font-weight: 700;
        }

        /* КОММЕНТАРИИ (ЧАТ) */
        .chat-section {
            background: white;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 2px solid #00aced;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            color: #333;
        }

        .chat-header span {
            background: #00aced;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .chat-form {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e1e8ed;
        }

        .chat-form input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 8px;
        }

        .chat-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-height: 60px;
            resize: vertical;
            margin-bottom: 8px;
        }

        .chat-submit {
            background: #00aced;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            float: right;
        }

        .chat-messages {
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            background: white;
        }

        .chat-message {
            padding: 10px;
            border-bottom: 1px solid #e1e8ed;
            transition: 0.2s;
        }

        .chat-message.premium {
            background: #fff9e6;
            border-left: 3px solid #ffd700;
        }

        .chat-message.premium .chat-name {
            color: #b8860b;
            font-weight: 700;
        }

        .chat-message.premium .chat-name::after {
            content: " 👑";
            color: #ffd700;
        }

        .chat-header-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .chat-name {
            font-weight: 700;
            color: #00aced;
        }

        .chat-date {
            color: #999;
            font-size: 0.7rem;
        }

        .chat-text {
            color: #333;
            font-size: 0.9rem;
        }

        .chat-loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        /* Кнопка связи с администрацией */
        .feedback-button {
            background: #f8f9fa;
            padding: 12px 15px;
            border-top: 1px solid #e1e8ed;
            text-align: center;
            cursor: pointer;
        }

        .feedback-button:hover {
            background: #e1e8ed;
        }

        .feedback-button a {
            color: #00aced;
            text-decoration: none;
            font-weight: 700;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .modal-content button {
            background: #00aced;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
        }

        .modal-close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #333;
        }

        /* Загрузка */
        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        /* Рекомендации */
        .recommendations {
            background: #f8f9fa;
            padding: 15px;
            border-top: 1px solid #e1e8ed;
        }

        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .recommendation-card {
            background: white;
            border-radius: 5px;
            padding: 8px;
            text-align: center;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        .recommendation-photo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-bottom: 5px;
        }

        /* Рейтинг */
        .rating-table {
            background: white;
            padding: 15px;
            border-top: 1px solid #e1e8ed;
        }

        .rating-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .rating-position {
            width: 30px;
            font-weight: 700;
            color: #00aced;
        }

        .rating-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .rating-info {
            flex: 1;
        }

        .rating-name {
            font-weight: 700;
            color: #333;
        }

        .rating-score {
            color: #00aced;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <!-- ЭКРАН СОГЛАШЕНИЯ -->
    <div class="agreement-screen" id="agreementScreen">
        <div class="agreement-card">
            <h2>ДОГОВОР СООБЩЕСТВА</h2>
            <div class="agreement-text">
                <p>Правила использования сайта...</p>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="schoolCheckbox">
                <label>Я принимаю условия</label>
            </div>
            <button class="agreement-button" id="enterSiteBtn" disabled>Войти</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="container">
        <div class="main-content" id="mainContent">
            <!-- Шапка -->
            <div class="header">
                <h1>ШКОЛЬНАЯ ЛЕНТА <small>№62</small></h1>
            </div>

            <!-- Статистика -->
            <div class="user-stats">
                <div class="stat-items">
                    <div class="stat-pill">🗳️ <span id="voteCountBadge">0</span></div>
                    <div class="stat-pill">🔥 <span id="comboCount">0</span></div>
                </div>
                <div class="school-badge">🏫 Школа 62</div>
            </div>

            <!-- Сообщения -->
            <div id="messageContainer"></div>

            <!-- Автообновление -->
            <div class="auto-refresh-control">
                <label class="auto-refresh-toggle">
                    <input type="checkbox" id="autoRefreshToggle" checked>
                    <span>Автообновление (3 сек)</span>
                </label>
            </div>

            <!-- Битва -->
            <div id="battleContainer" style="display: none;">
                <div class="battle-header">
                    <h2>⚔️ БИТВА КАНДИДАТОВ</h2>
                    <p>Победитель +100 • Проигравший -50</p>
                </div>
                <div class="battle-grid" id="battleGrid"></div>
                <button class="vote-button" id="voteBtn">Голосовать</button>
            </div>

            <!-- PRIME БЛОК -->
            <div class="prime-box" id="primeBox">
                <div class="prime-header">
                    <img src="verified.png" width="20" height="20" onerror="this.src='https://via.placeholder.com/20'">
                    <span>in PRIME</span>
                    <span class="prime-badge">premium</span>
                </div>
                <div class="prime-input-group">
                    <input type="text" id="primeUsername" placeholder="Ник">
                    <input type="password" id="primePassword" placeholder="Пароль">
                    <button id="primeBtn">Войти</button>
                </div>
                <div class="prime-status" id="primeStatus" style="display: none;">
                    <img src="verified.png" width="16" height="16" onerror="this.src='https://via.placeholder.com/16'">
                    <span id="primeDisplayName"></span>
                    <button onclick="logoutPrime()" style="background:none; border:none; color:#999; text-decoration:underline; cursor:pointer;">выйти</button>
                </div>
            </div>

            <!-- ЧАТ -->
            <div class="chat-section">
                <div class="chat-header">
                    <h3>💬 ЧАТ ШКОЛЫ №62</h3>
                    <span>последние 50</span>
                </div>
                
                <!-- Форма сообщения -->
                <div class="chat-form">
                    <input type="text" id="commentName" placeholder="Ваше имя" maxlength="30">
                    <textarea id="commentMessage" placeholder="Напишите сообщение..." maxlength="200"></textarea>
                    <button class="chat-submit" id="submitComment">Отправить</button>
                </div>

                <!-- Список сообщений -->
                <div class="chat-messages" id="commentsList">
                    <div class="chat-loading">Загрузка...</div>
                </div>
            </div>

            <!-- Кнопка связи с администрацией -->
            <div class="feedback-button" onclick="openFeedbackModal()">
                <a href="#">📨 Связь с администрацией</a>
            </div>

            <!-- Рекомендации -->
            <div id="recommendations" class="recommendations" style="display: none;">
                <h3>🎯 Рекомендации</h3>
                <div id="recommendationsGrid" class="recommendations-grid"></div>
            </div>

            <!-- Рейтинг -->
            <div id="ratingContainer" class="rating-table" style="display: none;">
                <h3>🏆 ТОП-10</h3>
                <div id="ratingList" class="rating-list"></div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ОБРАТНОЙ СВЯЗИ -->
    <div class="modal" id="feedbackModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeFeedbackModal()">&times;</span>
            <h3>📨 Связь с администрацией</h3>
            <input type="text" id="feedbackName" placeholder="Ваше имя (необязательно)">
            <select id="feedbackType">
                <option value="idea">💡 Предложить идею</option>
                <option value="bug">🐛 Сообщить об ошибке</option>
                <option value="support">❤️ Поддержка</option>
                <option value="other">📝 Другое</option>
            </select>
            <textarea id="feedbackMessage" placeholder="Сообщение..." rows="4"></textarea>
            <button id="submitFeedback">Отправить</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
