<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лучшая девочка школы - 8 марта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #242582 0%, #553D67 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .auth-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        
        .user-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #F64c72;
        }
        
        .google-btn {
            background: white;
            color: #444;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }
        
        .google-btn:hover {
            background: #f0f0f0;
        }
        
        .google-btn img {
            width: 20px;
            height: 20px;
        }
        
        .logout-btn {
            background: #F64c72;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .filters {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }
        
        .class-filter {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            min-width: 200px;
        }
        
        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .candidate-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .candidate-photo {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 3px solid #F64c72;
        }
        
        .candidate-info {
            padding: 20px;
        }
        
        .candidate-name {
            font-size: 1.4em;
            margin-bottom: 5px;
            color: #333;
        }
        
        .candidate-class {
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .candidate-bio {
            color: #777;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .vote-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .votes-count {
            background: #2F2FA2;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .vote-btn {
            background: #F64c72;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .vote-btn:hover {
            background: #553D67;
        }
        
        .vote-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .vote-btn.voted {
            background: #28a745;
        }
        
        .leaderboard {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 40px;
        }
        
        .leaderboard h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .leaderboard-rank {
            width: 40px;
            height: 40px;
            background: #99738E;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .leaderboard-info {
            flex: 1;
        }
        
        .leaderboard-name {
            font-weight: bold;
            color: #333;
        }
        
        .leaderboard-class {
            color: #666;
            font-size: 0.9em;
        }
        
        .leaderboard-votes {
            font-weight: bold;
            color: #F64c72;
            margin-left: 15px;
        }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            color: white;
        }
        
        .message.error { background: #dc3545; }
        .message.success { background: #28a745; }
        
        .empty-message {
            grid-column: 1/-1;
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌸 Лучшая девочка школы 🌸</h1>
            <p>Голосование к 8 марта</p>
        </header>
        
        <div class="auth-card" id="authSection">
            <div id="userInfo" class="user-box" style="display: none;">
                <img id="userAvatar" class="user-avatar" src="" alt="">
                <span id="userName"></span>
                <button class="logout-btn" id="logoutBtn">Выйти</button>
            </div>
            <button class="google-btn" id="loginBtn">
                <img src="https://www.google.com/favicon.ico" alt="">
                Войти через Google
            </button>
        </div>
        
        <div id="messageBox"></div>
        
        <div class="filters">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск по имени...">
            <select class="class-filter" id="classSelect">
                <option value="">Все классы</option>
            </select>
        </div>
        
        <div class="candidates-grid" id="candidatesGrid"></div>
        
        <div class="leaderboard">
            <h2>🏆 Доска почёта 🏆</h2>
            <div class="leaderboard-list" id="leaderboardList"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // ТОЛЬКО ЭТИ ДВЕ СТРОЧКИ МЕНЯЕМ НА СВОИ
        // ============================================
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        // ============================================
        // ЭТО ТВОЙ САЙТ - БОЛЬШЕ НИКАКОГО LOCALHOST
        // ============================================
        const MY_SITE = 'https://ggfh-becouse.github.io/school62-vote-1';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allCandidates = [];
        let currentUser = null;
        let userVotes = new Set();
        
        async function checkUser() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                currentUser = user;
                updateUserUI();
                loadUserVotes();
            }
        }
        
        function updateUserUI() {
            const loginBtn = document.getElementById('loginBtn');
            const userInfo = document.getElementById('userInfo');
            const userName = document.getElementById('userName');
            const userAvatar = document.getElementById('userAvatar');
            
            if (currentUser) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                userName.textContent = currentUser.user_metadata.full_name || 'Пользователь';
                userAvatar.src = currentUser.user_metadata.avatar_url || 'https://i.pravatar.cc/40';
            } else {
                loginBtn.style.display = 'flex';
                userInfo.style.display = 'none';
            }
        }
        
        async function login() {
            try {
                showMessage('Перенаправление...', 'success');
                
                const { error } = await sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: б'https://wdcwxvxkvyncybsefotj.supabase.co/auth/v1/callback'
                    }
                });
                
                if (error) throw error;
            } catch (err) {
                showMessage('Ошибка: ' + err.message, 'error');
            }
        }
        
        async function logout() {
            await sb.auth.signOut();
            currentUser = null;
            userVotes.clear();
            updateUserUI();
            displayCandidates(allCandidates);
            showMessage('Вы вышли', 'success');
        }
        
        async function loadUserVotes() {
            if (!currentUser) return;
            
            const { data } = await sb
                .from('votes')
                .select('candidate_id')
                .eq('user_id', currentUser.id);
            
            if (data) {
                userVotes = new Set(data.map(v => v.candidate_id));
                displayCandidates(allCandidates);
            }
        }
        
        async function loadCandidates() {
            const { data, error } = await sb
                .from('candidates')
                .select('*')
                .order('votes', { ascending: false });
            
            if (error) {
                showMessage('Ошибка загрузки: ' + error.message, 'error');
                return;
            }
            
            allCandidates = data || [];
            displayCandidates(allCandidates);
            updateLeaderboard(allCandidates);
            fillClassFilter(allCandidates);
        }
        
        function displayCandidates(list) {
            const grid = document.getElementById('candidatesGrid');
            
            if (list.length === 0) {
                grid.innerHTML = '<div class="empty-message">😢 Пока нет кандидатов</div>';
                return;
            }
            
            let html = '';
            
            for (let c of list) {
                const hasVoted = userVotes.has(c.id);
                const canVote = currentUser && !hasVoted;
                
                let button = '';
                if (canVote) {
                    button = `<button class="vote-btn" onclick="vote(${c.id})">Голосовать</button>`;
                } else if (hasVoted) {
                    button = `<button class="vote-btn voted" disabled>✓ Голосовали</button>`;
                } else {
                    button = `<button class="vote-btn" disabled>Войдите</button>`;
                }
                
                html += `
                    <div class="candidate-card">
                        <img src="${c.photo_url || 'https://i.pravatar.cc/300'}" class="candidate-photo" onerror="this.src='https://i.pravatar.cc/300?u=${c.id}'">
                        <div class="candidate-info">
                            <h3 class="candidate-name">${c.name}</h3>
                            <div class="candidate-class">${c.class || '??'} класс</div>
                            <div class="candidate-bio">${c.bio || 'Нет описания'}</div>
                            <div class="vote-section">
                                <span class="votes-count">❤️ ${c.votes || 0}</span>
                                ${button}
                            </div>
                        </div>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }
        
        async function vote(id) {
            if (!currentUser) {
                showMessage('Сначала войдите', 'error');
                return;
            }
            
            if (userVotes.has(id)) {
                showMessage('Уже голосовали', 'error');
                return;
            }
            
            const candidate = allCandidates.find(c => c.id === id);
            const newVotes = (candidate.votes || 0) + 1;
            
            await sb
                .from('candidates')
                .update({ votes: newVotes })
                .eq('id', id);
            
            await sb
                .from('votes')
                .insert({
                    user_id: currentUser.id,
                    candidate_id: id,
                    voted_at: new Date()
                });
            
            candidate.votes = newVotes;
            userVotes.add(id);
            
            displayCandidates(allCandidates);
            updateLeaderboard(allCandidates);
            showMessage('Спасибо за голос!', 'success');
        }
        
        function updateLeaderboard(list) {
            const sorted = [...list].sort((a, b) => (b.votes || 0) - (a.votes || 0));
            const board = document.getElementById('leaderboardList');
            
            let html = '';
            for (let i = 0; i < Math.min(5, sorted.length); i++) {
                const c = sorted[i];
                html += `
                    <div class="leaderboard-item">
                        <div class="leaderboard-rank">${i + 1}</div>
                        <div class="leaderboard-info">
                            <div class="leaderboard-name">${c.name}</div>
                            <div class="leaderboard-class">${c.class} класс</div>
                        </div>
                        <div class="leaderboard-votes">❤️ ${c.votes || 0}</div>
                    </div>
                `;
            }
            
            board.innerHTML = html;
        }
        
        function fillClassFilter(list) {
            const classes = [...new Set(list.map(c => c.class))].sort();
            const select = document.getElementById('classSelect');
            
            while (select.options.length > 1) select.remove(1);
            
            classes.forEach(c => {
                const option = document.createElement('option');
                option.value = c;
                option.textContent = c + ' класс';
                select.appendChild(option);
            });
        }
        
        function filterCandidates() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const className = document.getElementById('classSelect').value;
            
            const filtered = allCandidates.filter(c => {
                const matchName = c.name.toLowerCase().includes(search);
                const matchClass = !className || c.class === className;
                return matchName && matchClass;
            });
            
            displayCandidates(filtered);
        }
        
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => box.innerHTML = '', 3000);
        }
        
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('searchInput').addEventListener('input', filterCandidates);
        document.getElementById('classSelect').addEventListener('change', filterCandidates);
        
        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') {
                currentUser = session.user;
                updateUserUI();
                loadUserVotes();
                showMessage('Вход выполнен!', 'success');
            }
        });
        
        checkUser();
        loadCandidates();
    </script>
</body>
</html>
