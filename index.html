<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лучшая девочка школы - 8 марта</title>
    <style>
        /* Основные стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #242582, #553D67);
            min-height: 100vh;
            padding: 16px;
        }
        
        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Шапка */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* Кнопка входа */
        .auth-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        
        .user-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #F64c72;
        }
        
        .google-button {
            background: white;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .google-button:hover {
            background: #f0f0f0;
        }
        
        .google-button img {
            width: 20px;
            height: 20px;
        }
        
        .logout-button {
            background: #F64c72;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        
        /* Поиск */
        .search-panel {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.95);
        }
        
        .class-select {
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.95);
            min-width: 160px;
        }
        
        /* Сетка кандидатов */
        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .candidate-item {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        .candidate-photo {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-bottom: 3px solid #F64c72;
        }
        
        .candidate-details {
            padding: 16px;
        }
        
        .candidate-title {
            font-size: 1.3rem;
            margin-bottom: 4px;
            color: #222;
        }
        
        .candidate-class-badge {
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .candidate-description {
            color: #555;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .vote-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
        
        .vote-counter {
            background: #2F2FA2;
            color: white;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .vote-action {
            background: #F64c72;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .vote-action:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .vote-action.voted {
            background: #28a745;
        }
        
        /* Доска почёта */
        .leaderboard-panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-top: 32px;
        }
        
        .leaderboard-panel h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .leaderboard-row {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .leaderboard-rank-number {
            width: 36px;
            height: 36px;
            background: #99738E;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
        }
        
        .leaderboard-person {
            flex: 1;
        }
        
        .leaderboard-person-name {
            font-weight: 600;
            color: #333;
        }
        
        .leaderboard-person-class {
            color: #666;
            font-size: 0.9rem;
        }
        
        .leaderboard-person-votes {
            font-weight: bold;
            color: #F64c72;
            margin-left: 12px;
        }
        
        /* Уведомления */
        .notification {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            color: white;
        }
        
        .notification.error {
            background: #dc3545;
        }
        
        .notification.success {
            background: #28a745;
        }
        
        .empty-message {
            grid-column: 1/-1;
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Шапка -->
        <div class="header">
            <h1>🌸 Лучшая девочка школы 🌸</h1>
            <p>Голосование к 8 марта</p>
        </div>
        
        <!-- Блок авторизации -->
        <div class="auth-card" id="authBlock">
            <div id="userBlock" style="display: none;" class="user-box">
                <img id="avatarImg" class="user-avatar" src="" alt="">
                <span id="nameSpan"></span>
                <button class="logout-button" id="exitButton">Выйти</button>
            </div>
            <button class="google-button" id="loginButton">
                <img src="https://www.google.com/favicon.ico" alt="">
                Войти через Google
            </button>
        </div>
        
        <!-- Уведомления -->
        <div id="messageArea"></div>
        
        <!-- Фильтры -->
        <div class="search-panel">
            <input type="text" class="search-input" id="searchField" placeholder="🔍 Поиск по имени...">
            <select class="class-select" id="classSelect">
                <option value="">Все классы</option>
            </select>
        </div>
        
        <!-- Список кандидатов -->
        <div class="candidates-grid" id="candidatesList"></div>
        
        <!-- Доска почёта -->
        <div class="leaderboard-panel" id="leaderboardPanel">
            <h2>🏆 Доска почёта 🏆</h2>
            <div class="leaderboard-list" id="leaderboardContainer"></div>
        </div>
    </div>

    <!-- Подключаем Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ============================================
        // НАСТРОЙКИ - ЗАПОЛНИ ЭТИ ДВЕ СТРОКИ
        // ============================================
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkY3d4dnhrdnluY3lic2Vmb3RqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTMzODksImV4cCI6MjA4ODEyOTM4OX0.gIF0di79PaPA_0ckWX5R-wxQ435oaiu4jf1J48qz7SE';
        const MY_SITE = 'https://ggfh-becouse.github.io/school62-vote-1';
        // ============================================
        
        // Создаем клиент Supabase
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Данные
        let allCandidates = [];
        let activeUser = null;
        let userVotes = new Set();
        
        // ============================================
        // ПРОВЕРКА ПОЛЬЗОВАТЕЛЯ
        // ============================================
        async function checkCurrentUser() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                activeUser = user;
                updateUserInterface();
                await loadUserVotingHistory();
            }
        }
        
        // ============================================
        // ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ПОЛЬЗОВАТЕЛЯ
        // ============================================
        function updateUserInterface() {
            const loginBtn = document.getElementById('loginButton');
            const userBlock = document.getElementById('userBlock');
            const nameSpan = document.getElementById('nameSpan');
            const avatarImg = document.getElementById('avatarImg');
            
            if (activeUser) {
                loginBtn.style.display = 'none';
                userBlock.style.display = 'flex';
                nameSpan.textContent = activeUser.user_metadata.full_name || 'Пользователь';
                avatarImg.src = activeUser.user_metadata.avatar_url || 'https://i.pravatar.cc/40';
            } else {
                loginBtn.style.display = 'flex';
                userBlock.style.display = 'none';
            }
        }
        
        // ============================================
        // ВХОД ЧЕРЕЗ GOOGLE
        // ============================================
        async function loginWithGoogle() {
            try {
                showMessage('Перенаправление на Google...', 'success');
                
                const { error } = await sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: MY_SITE
                    }
                });
                
                if (error) throw error;
            } catch (err) {
                showMessage('Ошибка входа: ' + err.message, 'error');
            }
        }
        
        // ============================================
        // ВЫХОД
        // ============================================
        async function logoutUser() {
            try {
                const { error } = await sb.auth.signOut();
                if (error) throw error;
                
                activeUser = null;
                userVotes.clear();
                updateUserInterface();
                renderCandidates(allCandidates);
                showMessage('Вы вышли из аккаунта', 'success');
            } catch (err) {
                showMessage('Ошибка выхода: ' + err.message, 'error');
            }
        }
        
        // ============================================
        // ЗАГРУЗКА ИСТОРИИ ГОЛОСОВАНИЯ
        // ============================================
        async function loadUserVotingHistory() {
            if (!activeUser) return;
            
            try {
                const { data, error } = await sb
                    .from('votes')
                    .select('candidate_id')
                    .eq('user_id', activeUser.id);
                
                if (error && error.code !== '42P01') throw error;
                
                if (data) {
                    userVotes = new Set(data.map(v => v.candidate_id));
                    renderCandidates(allCandidates);
                }
            } catch (err) {
                console.log('Таблица votes не создана');
            }
        }
        
        // ============================================
        // ЗАГРУЗКА КАНДИДАТОВ
        // ============================================
        async function loadCandidatesFromDB() {
            try {
                const { data, error } = await sb
                    .from('candidates')
                    .select('*')
                    .order('votes', { ascending: false });
                
                if (error) throw error;
                
                allCandidates = data || [];
                renderCandidates(allCandidates);
                updateLeaderboard(allCandidates);
                fillClassFilter(allCandidates);
            } catch (err) {
                showMessage('Ошибка загрузки: ' + err.message, 'error');
            }
        }
        
        // ============================================
        // ОТОБРАЖЕНИЕ КАНДИДАТОВ
        // ============================================
        function renderCandidates(candidatesToShow) {
            const container = document.getElementById('candidatesList');
            
            if (!candidatesToShow || candidatesToShow.length === 0) {
                container.innerHTML = '<div class="empty-message">😢 Пока нет кандидатов</div>';
                return;
            }
            
            let html = '';
            
            for (let i = 0; i < candidatesToShow.length; i++) {
                const c = candidatesToShow[i];
                const hasVoted = userVotes.has(c.id);
                const canVote = activeUser && !hasVoted;
                
                let buttonHtml = '';
                if (canVote) {
                    buttonHtml = `<button class="vote-action" onclick="voteForCandidate(${c.id})">Голосовать</button>`;
                } else if (hasVoted) {
                    buttonHtml = `<button class="vote-action voted" disabled>✓ Голосовали</button>`;
                } else {
                    buttonHtml = `<button class="vote-action" disabled title="Нужно войти">Войдите</button>`;
                }
                
                html += `
                    <div class="candidate-item">
                        <img src="${c.photo_url || 'https://i.pravatar.cc/300'}" alt="${c.name}" class="candidate-photo" onerror="this.src='https://i.pravatar.cc/300?u=${c.id}'">
                        <div class="candidate-details">
                            <h3 class="candidate-title">${c.name}</h3>
                            <div class="candidate-class-badge">${c.class || '??'} класс</div>
                            <div class="candidate-description">${c.bio || 'Нет описания'}</div>
                            <div class="vote-area">
                                <span class="vote-counter">❤️ ${c.votes || 0}</span>
                                ${buttonHtml}
                            </div>
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        // ============================================
        // ГОЛОСОВАНИЕ
        // ============================================
        async function voteForCandidate(candidateId) {
            if (!activeUser) {
                showMessage('Сначала войдите через Google', 'error');
                return;
            }
            
            if (userVotes.has(candidateId)) {
                showMessage('Вы уже голосовали', 'error');
                return;
            }
            
            try {
                const candidate = allCandidates.find(c => c.id === candidateId);
                const newVoteCount = (candidate.votes || 0) + 1;
                
                // Обновляем голоса кандидата
                const { error: voteErr } = await sb
                    .from('candidates')
                    .update({ votes: newVoteCount })
                    .eq('id', candidateId);
                
                if (voteErr) throw voteErr;
                
                // Записываем голос пользователя
                const { error: recordErr } = await sb
                    .from('votes')
                    .insert({
                        user_id: activeUser.id,
                        candidate_id: candidateId,
                        voted_at: new Date()
                    });
                
                if (recordErr && recordErr.code !== '42P01') throw recordErr;
                
                // Обновляем данные
                candidate.votes = newVoteCount;
                userVotes.add(candidateId);
                
                renderCandidates(allCandidates);
                updateLeaderboard(allCandidates);
                showMessage('Спасибо за голос!', 'success');
            } catch (err) {
                showMessage('Ошибка: ' + err.message, 'error');
            }
        }
        
        // ============================================
        // ОБНОВЛЕНИЕ ДОСКИ ПОЧЁТА
        // ============================================
        function updateLeaderboard(candidatesList) {
            const sorted = [...candidatesList].sort((a, b) => (b.votes || 0) - (a.votes || 0));
            const container = document.getElementById('leaderboardContainer');
            
            let html = '';
            for (let i = 0; i < Math.min(5, sorted.length); i++) {
                const c = sorted[i];
                html += `
                    <div class="leaderboard-row">
                        <div class="leaderboard-rank-number">${i + 1}</div>
                        <div class="leaderboard-person">
                            <div class="leaderboard-person-name">${c.name}</div>
                            <div class="leaderboard-person-class">${c.class} класс</div>
                        </div>
                        <div class="leaderboard-person-votes">❤️ ${c.votes || 0}</div>
                    </div>
                `;
            }
            
            container.innerHTML = html || '<div style="text-align:center">Пока нет голосов</div>';
        }
        
        // ============================================
        // ЗАПОЛНЕНИЕ ФИЛЬТРА КЛАССОВ
        // ============================================
        function fillClassFilter(candidatesList) {
            const classSet = new Set();
            candidatesList.forEach(c => {
                if (c.class) classSet.add(c.class);
            });
            
            const classArray = [...classSet].sort();
            const select = document.getElementById('classSelect');
            
            // Очищаем кроме первого
            while (select.options.length > 1) {
                select.remove(1);
            }
            
            classArray.forEach(className => {
                const option = document.createElement('option');
                option.value = className;
                option.textContent = className + ' класс';
                select.appendChild(option);
            });
        }
        
        // ============================================
        // ФИЛЬТРАЦИЯ
        // ============================================
        function filterCandidatesList() {
            const searchText = document.getElementById('searchField').value.toLowerCase();
            const selectedClass = document.getElementById('classSelect').value;
            
            const filtered = allCandidates.filter(c => {
                const nameMatch = c.name.toLowerCase().includes(searchText);
                const classMatch = !selectedClass || c.class === selectedClass;
                return nameMatch && classMatch;
            });
            
            renderCandidates(filtered);
        }
        
        // ============================================
        // ПОКАЗ УВЕДОМЛЕНИЙ
        // ============================================
        function showMessage(text, type) {
            const msgDiv = document.getElementById('messageArea');
            msgDiv.innerHTML = `<div class="notification ${type}">${text}</div>`;
            setTimeout(() => {
                msgDiv.innerHTML = '';
            }, 3000);
        }
        
        // ============================================
        // СЛУШАТЕЛИ СОБЫТИЙ
        // ============================================
        document.getElementById('loginButton').addEventListener('click', loginWithGoogle);
        document.getElementById('exitButton').addEventListener('click', logoutUser);
        document.getElementById('searchField').addEventListener('input', filterCandidatesList);
        document.getElementById('classSelect').addEventListener('change', filterCandidatesList);
        
        // Слушаем изменения авторизации
        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') {
                activeUser = session.user;
                updateUserInterface();
                loadUserVotingHistory();
                showMessage('Вход выполнен!', 'success');
            }
        });
        
        // ============================================
        // ЗАПУСК
        // ============================================
        checkCurrentUser();
        loadCandidatesFromDB();
    </script>
</body>
</html>
