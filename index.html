<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Школьный форум - Главная</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->
        <div class="header">
            <h1>ШКОЛЬНЫЙ ФОРУМ <small>Школа №62</small></h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Главный поток</a>
                <a href="#" class="nav-link" onclick="showHotThreads()">🔥 Горячее</a>
                <a href="#" class="nav-link" onclick="showPinnedThreads()">📌 Закреплённые</a>
            </div>
        </div>

        <!-- Статистика пользователя -->
        <div class="user-stats">
            <div class="stat-items">
                <div class="stat-pill">👤 <span id="userId">Гость</span></div>
                <div class="stat-pill">📝 <span id="userMessages">0</span></div>
            </div>
            <div class="school-badge">🏫 Школа №62</div>
        </div>

        <!-- Сообщения -->
        <div id="messageContainer"></div>

        <!-- Форма создания нового треда -->
        <div class="create-thread">
            <h3>➕ СОЗДАТЬ НОВУЮ ТЕМУ</h3>
            <input type="text" id="threadTitle" class="thread-input" placeholder="Заголовок" maxlength="100">
            <textarea id="threadContent" class="thread-textarea" placeholder="Что хотите обсудить?" maxlength="500"></textarea>
            <div class="thread-actions">
                <button class="thread-submit" id="createThreadBtn">📤 Опубликовать</button>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filters">
            <select id="sortFilter" class="filter-select">
                <option value="bump">По активности</option>
                <option value="new">Сначала новые</option>
                <option value="hot">Горячие</option>
            </select>
            <input type="text" id="searchFilter" class="filter-input" placeholder="🔍 Поиск по темам...">
        </div>

        <!-- Список тредов -->
        <div class="threads-list" id="threadsList">
            <div class="loading">Загрузка тем...</div>
        </div>

        <!-- Подвал -->
        <div class="footer">
            <p>Школьный форум • свободное общение</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
