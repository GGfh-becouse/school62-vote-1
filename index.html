<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Битва за 8 марта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            color: white;
            font-size: 1.8rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header h1 span {
            color: #ffd700;
            display: inline-block;
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%,100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .user-info {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 24px;
            color: #ffd700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,215,0,0.3);
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-ip {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .vote-count-badge {
            background: rgba(255,215,0,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .info-bar {
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);

            margin-bottom: 24px;

        .battle-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .battle-container {
                grid-template-columns: 1fr;
                gap: 16px;
            }

        .candidate-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
            border: 3px solid transparent;
        }

        .candidate-card:hover:not(.voted):not(.disabled) {
            transform: translateY(-8px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.4);
        }

        .candidate-card.selected {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }

        .candidate-card.voted {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .candidate-photo {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-bottom: 3px solid #f0f0f0;
        }

        .candidate-info {
            padding: 24px;
        }

        .candidate-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .candidate-class {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .candidate-bio {
            color: #444;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .rating-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 2px solid #eee;
        }

        .rating {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1a1a2e;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(255,215,0,0.3);
        }

        .vote-badge {
            background: #28a745;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            background: rgba(255,255,255,0.1);

            height: 80px;
            margin: 0 auto;

        @media (max-width: 768px) {

        .action-button {
            background: linear-gradient(135deg, #ffd700, #ffa500);

            color: #1a1a2e;
            font-weight: 700;

            border-radius: 50px;

        .action-button:hover:not(:disabled) {

        }

        .action-button:disabled {

        .recommendations {

        }

        .recommendations h3 {

        }

        .recommendations-grid {

            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

        .recommendation-card {

        .recommendation-card:hover {

        }

        .recommendation-photo {

            object-fit: cover;
        }

        .recommendation-info {
            padding: 15px;
        }

        .recommendation-name {
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .recommendation-class {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .recommendation-rating {
            background: rgba(255,215,0,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 600;
        }

        /* ===== НОВЫЙ БЛОК - СТЕНА НОВОСТЕЙ ===== */
        .news-wall {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin: 30px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-left: 5px solid #ffd700;
        }

        .news-wall h2 {
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .news-wall h2:before {
            content: "📢";
            font-size: 2rem;
        }

        .news-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-item {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.2s;
            border-left: 4px solid #ffd700;
        }

        .news-item:hover {
            transform: translateX(5px);
            background: #f0f3f5;
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .news-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .news-date {
            background: #ffd700;
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .news-content {
            color: #444;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .news-tag {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            color: #1a1a2e;

        }

        .news-tag.development {
            background: #17a2b8;

        }

        .news-tag.update {

        }

        .news-tag.event {
            background: #ffc107;

        }

        .news-empty {

            padding: 40px;
            color: #666;
            font-style: italic;
        }

        .admin-news-badge {
            background: #ffd700;
            color: #1a1a2e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-left: 10px;
            font-weight: normal;
        }
        /* ===== КОНЕЦ НОВОГО БЛОКА ===== */

        .rating-table {
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .rating-table h2 {
            color: #1a1a2e;
            margin-bottom: 24px;
            font-size: 1.8rem;
            text-align: center;
        }

        .rating-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rating-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 16px;
            transition: transform 0.2s;
        }

        .rating-item:hover {
            transform: translateX(5px);
            background: #f0f3f5;
        }

        .rating-position {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 16px;
        }

        .rating-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 16px;
            border: 2px solid #ffd700;
        }

        .rating-info {
            flex: 1;
        }

        .rating-name {
            font-weight: 700;
            color: #333;
            font-size: 1.2rem;
        }

        .rating-class {
            color: #666;
            font-size: 0.9rem;
        }

        .rating-score {
            font-weight: 800;
            color: #1a1a2e;
            background: rgba(255,215,0,0.2);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 1.3rem;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 16px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s;
            max-width: 350px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #28a745; }
        .message.error { background: #dc3545; }
        .message.info { background: #17a2b8; }
        .message.warning { background: #ffc107; color: #1a1a2e; }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.2rem;
        }

        .loader {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .bot-link {
            text-align: center;
            margin-top: 20px;
        }

        .bot-link a {
            color: #ffd700;
            text-decoration: none;
            background: rgba(255,215,0,0.1);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .bot-link a:hover {
            background: rgba(255,215,0,0.2);
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 БИТВА <span>ЗА 8 МАРТА</span> 🌸</h1>
        </div>

        <div class="user-info" id="userInfo">
            <span>🔍 Ваш IP: <span id="userIp" class="user-ip">определяется...</span></span>
            <span class="vote-count-badge" id="voteCountBadge">0 голосов</span>
        </div>

        <div id="infoBar" class="info-bar">
            ⚔️ Выберите лучшую! Победитель +100, проигравший -50
        </div>

        <div id="messageContainer"></div>

        <div id="battleContainer" style="display: none;">
            <div class="battle-container" id="battleGrid"></div>
            <button id="voteBtn" class="action-button">⚔️ Сделать выбор ⚔️</button>
        </div>

        <div id="recommendations" class="recommendations" style="display: none;">
            <h3>🌟 Возможно, вам также понравятся</h3>
            <div id="recommendationsGrid" class="recommendations-grid"></div>
        </div>

        <!-- ===== НОВЫЙ БЛОК - СТЕНА НОВОСТЕЙ ===== -->
        <div class="news-wall" id="newsWall">
            <h2> НОВОСТИ</h2>
            <div class="news-container" id="newsContainer">
                <div class="news-empty">Загрузка новостей...</div>
            </div>
        </div>
        <!-- ===== КОНЕЦ НОВОГО БЛОКА ===== -->

        <div id="ratingContainer" class="rating-table" style="display: none;">
            <h2>🏆 РЕЙТИНГ ДЕВУШЕК 🏆</h2>
            <div id="ratingList" class="rating-list"></div>
        </div>

        <div class="bot-link">
            <a href="https://t.me/school_vote_bot" target="_blank">📱 Предложить кандидата через Telegram</a>
        </div>

        <div id="emptyState" class="empty-state">
            <div class="loader"></div>
            <p>Загрузка кандидатов...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // КОНФИГУРАЦИЯ - ТВОИ ДАННЫЕ
        // ============================================
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============================================
        // СОСТОЯНИЕ
        // ============================================
        let allCandidates = [];
        let currentPair = [];
        let selectedCandidateId = null;
        let userIp = null;
        let userVotes = {};
        let userVoteCount = 0;
        let lastVoteTime = null;
        let news = []; // Массив для новостей
        
        // ============================================
        // ПОЛУЧЕНИЕ IP
        // ============================================
        async function getUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
                document.getElementById('userIp').textContent = userIp;
                return userIp;
            } catch (error) {
                console.error('Ошибка получения IP:', error);
                document.getElementById('userIp').textContent = 'не определен';
                userIp = 'unknown-' + Math.random().toString(36).substring(2);
                return userIp;
            }
        }
        
        // ============================================
        // ЗАГРУЗКА НОВОСТЕЙ
        // ============================================
        async function loadNews() {
            try {
                // Здесь можно загружать новости из Supabase
                // Но пока сделаем тестовые новости
                
                const testNews = [
                    {
                        id: 1,
                        title: "Запуск проекта",
                        content: "Открытие сайта. каждый может проголосовать за любимую девушку школы",
                        date: "2026-03-06,
                        tag: "update"
                    },
                    {
                        id: 2,
                        title: "Обновления",
                        content: "Будут проводиться частые обновления, в которых будет введен нормальный рейтинг, подсчет голосов недели, и многое друге. Главное голосуйте",
                        date: "2026-03-06",
                        tag: "development"
                    },
                    {
                        id: 3,
                        title: "Ваша помощь",
                        content: "Вы можете написать о своей проблеме нашему тг-боту, если Вас чтото не устраивает. Наша поддержка работает с 7:00 до 00:00 по Караганде",
                        date: "2026-03-06",
                        tag: "update"
                    }
                    }
                ];
                
                displayNews(testNews);
                
            } catch (error) {
                console.error('Ошибка загрузки новостей:', error);
                document.getElementById('newsContainer').innerHTML = '<div class="news-empty">😢 Не удалось загрузить новости</div>';
            }
        }
        
        // ============================================
        // ОТОБРАЖЕНИЕ НОВОСТЕЙ
        // ============================================
        function displayNews(newsList) {
            const container = document.getElementById('newsContainer');
            
            if (!newsList || newsList.length === 0) {
                container.innerHTML = '<div class="news-empty">Пока нет новостей</div>';
                return;
            }
            
            let html = '';
            newsList.forEach(item => {
                // Определяем класс для тега
                let tagClass = 'news-tag';
                if (item.tag === 'development') tagClass += ' development';
                else if (item.tag === 'update') tagClass += ' update';
                else if (item.tag === 'event') tagClass += ' event';
                
                // Название тега
                let tagName = '';
                if (item.tag === 'development') tagName = '⚙️ Разработка';
                else if (item.tag === 'update') tagName = '✨ Обновление';
                else if (item.tag === 'event') tagName = '🎉 Событие';
                else tagName = item.tag || 'Новость';
                
                html += `
                    <div class="news-item">
                        <div class="news-header">
                            <span class="news-title">${item.title}</span>
                            <span class="news-date">${item.date}</span>
                        </div>
                        <div class="news-content">${item.content}</div>
                        <span class="${tagClass}">${tagName}</span>
                        <span class="admin-news-badge">Админ</span>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // ============================================
        // ЗАГРУЗКА ГОЛОСОВ ПОЛЬЗОВАТЕЛЯ
        // ============================================
        async function loadUserVotes() {
            if (!userIp) return;
            
            try {
                const { data, error } = await supabaseClient
                    .from('votes')
                    .select('candidate_id, created_at')
                    .eq('ip_address', userIp);
                
                if (error) throw error;
                
                userVotes = {};
                userVoteCount = 0;
                
                if (data) {
                    data.forEach(vote => {
                        userVotes[vote.candidate_id] = true;
                        userVoteCount++;
                    });
                    
                    if (data.length > 0) {
                        const sorted = data.sort((a, b) => 
                            new Date(b.created_at) - new Date(a.created_at)
                        );
                        lastVoteTime = new Date(sorted[0].created_at);
                    }
                }
                
                document.getElementById('voteCountBadge').textContent = 
                    `${userVoteCount} ${getVoteWord(userVoteCount)}`;
                
                console.log('Загружены голоса:', userVotes);
            } catch (error) {
                console.error('Ошибка загрузки голосов:', error);
            }
        }
        
        function getVoteWord(count) {
            if (count % 10 === 1 && count % 100 !== 11) return 'голос';
            if ([2,3,4].includes(count % 10) && ![12,13,14].includes(count % 100)) return 'голоса';
            return 'голосов';
        }
        
        // ============================================
        // ЗАГРУЗКА КАНДИДАТОВ
        // ============================================
        async function loadCandidates() {
            try {
                const { data, error } = await supabaseClient
                    .from('candidates')
                    .select('*')
                    .order('votes', { ascending: false });
                
                if (error) throw error;
                
                allCandidates = data || [];
                
                if (allCandidates.length < 2) {
                    showMessage('Нужно минимум 2 кандидата', 'error');
                    document.getElementById('emptyState').innerHTML = '😢 Недостаточно кандидатов';
                    return;
                }
                
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('battleContainer').style.display = 'block';
                document.getElementById('ratingContainer').style.display = 'block';
                
                updateLeaderboard();
                selectNewPair();
            } catch (err) {
                showMessage('Ошибка загрузки: ' + err.message, 'error');
                document.getElementById('emptyState').innerHTML = '😢 Ошибка загрузки';
            }
        }
        
        // ============================================
        // ВЫБОР ПАРЫ
        // ============================================
        function selectNewPair() {
            if (allCandidates.length < 2) return;
            
            const available = allCandidates.filter(c => !userVotes[c.id]);
            
            if (available.length >= 2) {
                let first, second;
                do {
                    const shuffled = [...available].sort(() => 0.5 - Math.random());
                    first = shuffled[0];
                    second = shuffled[1];
                } while (first.id === second.id);
                
                currentPair = [first, second];
            } else if (available.length === 1) {
                const voted = allCandidates.find(c => userVotes[c.id]);
                currentPair = [available[0], voted];
            } else {
                showMessage('Вы проголосовали за всех! Посмотрите рейтинг', 'info');
                const shuffled = [...allCandidates].sort(() => 0.5 - Math.random());
                currentPair = [shuffled[0], shuffled[1]];
            }
            
            renderBattle(currentPair);
        }
        
        // ============================================
        // ОТОБРАЖЕНИЕ БИТВЫ
        // ============================================
        function renderBattle(pair) {
            const container = document.getElementById('battleGrid');
            
            if (!pair || pair.length < 2) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:white; padding:40px;">Недостаточно кандидатов</div>';
                return;
            }
            
            const firstVoted = userVotes[pair[0].id];
            const secondVoted = userVotes[pair[1].id];
            
            container.innerHTML = `
                <div class="candidate-card ${firstVoted ? 'voted' : ''}" 
                     onclick="${!firstVoted ? 'selectCandidate(' + pair[0].id + ')' : ''}" 
                     id="card-${pair[0].id}" 
                     style="${firstVoted ? 'pointer-events: none;' : ''}">
                    <img src="${pair[0].photo_url || 'https://i.pravatar.cc/300'}" 
                         class="candidate-photo" 
                         onerror="this.src='https://i.pravatar.cc/300?u=${pair[0].id}'">
                    <div class="candidate-info">
                        <h2 class="candidate-name">${pair[0].name}</h2>
                        <div class="candidate-class">${pair[0].class || '??'} класс</div>
                        <div class="candidate-bio">${pair[0].bio || ''}</div>
                        <div class="rating-container">
                            <span class="rating">❤️ ${pair[0].votes || 0}</span>
                            ${firstVoted ? 
                                '<span class="vote-badge">✓ Вы голосовали</span>' : 
                                '<span class="rating-change">+100 если победит</span>'}
                        </div>
                    </div>
                </div>
                
                <div class="vs-divider">VS</div>
                
                <div class="candidate-card ${secondVoted ? 'voted' : ''}" 
                     onclick="${!secondVoted ? 'selectCandidate(' + pair[1].id + ')' : ''}" 
                     id="card-${pair[1].id}" 
                     style="${secondVoted ? 'pointer-events: none;' : ''}">
                    <img src="${pair[1].photo_url || 'https://i.pravatar.cc/300'}" 
                         class="candidate-photo" 
                         onerror="this.src='https://i.pravatar.cc/300?u=${pair[1].id}'">
                    <div class="candidate-info">
                        <h2 class="candidate-name">${pair[1].name}</h2>
                        <div class="candidate-class">${pair[1].class || '??'} класс</div>
                        <div class="candidate-bio">${pair[1].bio || ''}</div>
                        <div class="rating-container">
                            <span class="rating">❤️ ${pair[1].votes || 0}</span>
                            ${secondVoted ? 
                                '<span class="vote-badge">✓ Вы голосовали</span>' : 
                                '<span class="rating-change">+100 если победит</span>'}
                        </div>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.candidate-card').forEach(c => c.classList.remove('selected'));
            selectedCandidateId = null;
        }
        
        window.selectCandidate = function(id) {
            document.querySelectorAll('.candidate-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${id}`).classList.add('selected');
            selectedCandidateId = id;
        };
        
        function getRecommendations(excludeId) {
            const candidates = allCandidates.filter(c => 
                c.id !== excludeId && !userVotes[c.id]
            );
            
            if (candidates.length === 0) return [];
            return candidates.sort(() => 0.5 - Math.random()).slice(0, 3);
        }
        
        function showRecommendations(excludeId) {
            const recs = getRecommendations(excludeId);
            const container = document.getElementById('recommendationsGrid');
            
            if (recs.length === 0) {
                document.getElementById('recommendations').style.display = 'none';
                return;
            }
            
            let html = '';
            recs.forEach(c => {
                html += `
                    <div class="recommendation-card" onclick="selectAndScroll(${c.id})">
                        <img src="${c.photo_url || 'https://i.pravatar.cc/300'}" 
                             class="recommendation-photo"
                             onerror="this.src='https://i.pravatar.cc/300?u=${c.id}'">
                        <div class="recommendation-info">
                            <div class="recommendation-name">${c.name}</div>
                            <div class="recommendation-class">${c.class || '??'} класс</div>
                            <span class="recommendation-rating">❤️ ${c.votes || 0}</span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            document.getElementById('recommendations').style.display = 'block';
        }
        
        window.selectAndScroll = function(id) {
            document.getElementById('recommendations').style.display = 'none';
            
            if (currentPair[0]?.id === id || currentPair[1]?.id === id) {
                selectCandidate(id);
                document.getElementById('battleContainer').scrollIntoView({ behavior: 'smooth' });
                return;
            }
            
            const candidate = allCandidates.find(c => c.id === id);
            if (!candidate) return;
            
            const other = currentPair[0]?.id === id ? currentPair[1] : currentPair[0];
            currentPair = [candidate, other];
            renderBattle(currentPair);
            selectCandidate(id);
            
            document.getElementById('battleContainer').scrollIntoView({ behavior: 'smooth' });
        };
        
        document.getElementById('voteBtn').addEventListener('click', async function() {
            if (!selectedCandidateId) {
                showMessage('Выберите девушку', 'error');
                return;
            }
            
            if (!userIp) {
                showMessage('Не удалось определить IP', 'error');
                return;
            }
            
            if (currentPair.length !== 2) return;
            
            const winner = currentPair.find(c => c.id === selectedCandidateId);
            const loser = currentPair.find(c => c.id !== selectedCandidateId);
            
            if (!winner || !loser) return;
            
            if (userVotes[winner.id]) {
                showMessage(`Вы уже голосовали за ${winner.name}`, 'warning');
                return;
            }
            
            if (lastVoteTime) {
                const secondsSinceLastVote = (new Date() - lastVoteTime) / 1000;
                if (secondsSinceLastVote < 5) {
                    showMessage('Слишком быстро! Подождите 5 секунд', 'warning');
                    return;
                }
            }
            
            try {
                const newWinnerVotes = (winner.votes || 0) + 100;
                const newLoserVotes = Math.max(0, (loser.votes || 0) - 50);
                const userAgent = navigator.userAgent;
                
                await Promise.all([
                    supabaseClient.from('candidates').update({ votes: newWinnerVotes }).eq('id', winner.id),
                    supabaseClient.from('candidates').update({ votes: newLoserVotes }).eq('id', loser.id),
                    supabaseClient.from('votes').insert({
                        candidate_id: winner.id,
                        ip_address: userIp,
                        user_agent: userAgent
                    })
                ]);
                
                winner.votes = newWinnerVotes;
                loser.votes = newLoserVotes;
                userVotes[winner.id] = true;
                userVoteCount++;
                lastVoteTime = new Date();
                
                document.getElementById('voteCountBadge').textContent = 
                    `${userVoteCount} ${getVoteWord(userVoteCount)}`;
                
                updateLeaderboard();
                
                showMessage(`✅ Вы проголосовали за ${winner.name}!`, 'success');
                showRecommendations(winner.id);
                
                selectedCandidateId = null;
                selectNewPair();
                
            } catch (err) {
                console.error('Ошибка:', err);
                showMessage('Ошибка: ' + err.message, 'error');
            }
        });
        
        function updateLeaderboard() {
            const sorted = [...allCandidates].sort((a, b) => (b.votes || 0) - (a.votes || 0));
            const container = document.getElementById('ratingList');
            
            let html = '';
            sorted.forEach((c, index) => {
                const voted = userVotes[c.id] ? '✓' : '';
                html += `
                    <div class="rating-item">
                        <div class="rating-position">${index + 1}</div>
                        <img src="${c.photo_url || 'https://i.pravatar.cc/300'}" 
                             class="rating-avatar"
                             onerror="this.src='https://i.pravatar.cc/300?u=${c.id}'">
                        <div class="rating-info">
                            <div class="rating-name">${c.name} ${voted}</div>
                            <div class="rating-class">${c.class || '??'} класс</div>
                        </div>
                        <div class="rating-score">❤️ ${c.votes || 0}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            
            setTimeout(() => msg.remove(), 3000);
        }
        
        async function init() {
            await getUserIp();
            await loadUserVotes();
            await loadCandidates();
            await loadNews(); // Загружаем новости
        }
        
        init();
    </script>
</body>
</html>
