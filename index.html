<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ШКОЛЬНАЯ СТЕНА 62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->
        <div class="header">
            <h1>ШКОЛЬНАЯ СТЕНА 62</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">🏠 Главная</a>
                <a href="threads.html" class="nav-link">💬 Форум</a>
                <a href="updates.html" class="nav-link">🚀 Обновления</a>
            </div>
        </div>

        <!-- Статистика и PRIME статус -->
        <div class="user-stats">
            <div class="stat-items">
                <div class="stat-pill">🗳️ <span id="voteCountBadge">0</span></div>
                <div class="stat-pill">🔥 <span id="comboCount">0</span></div>
            </div>
            <div class="prime-status" id="primeStatus">
                <img src="verified.png" width="20" height="20" id="primeIcon" style="display: none;">
                <span id="primeName"></span>
            </div>
        </div>

        <!-- Сообщения -->
        <div id="messageContainer"></div>

        <!-- БЛОК in-PRIME -->
        <div class="prime-box">
            <h3 class="prime-header">
                <img src="verified.png" width="24" height="24">
                <span>in-PRIME</span>
                <span class="prime-badge">скоро будет доступно</span>
            </h3>
            <div class="prime-input-group">
                <input type="text" id="primeUsername" placeholder="Ваш ник PRIME" maxlength="30">
                <input type="password" id="primePassword" placeholder="Пароль" maxlength="50">
                <button id="primeBtn">Войти</button>
            </div>
            <div class="prime-status" id="primeStatusMsg" style="display: none;">
                <span>✅ Вы в PRIME как <span id="primeDisplayName"></span></span>
                <button onclick="logoutPrime()">(выйти)</button>
            </div>
        </div>

        <!-- БИТВА -->
        <div id="battleContainer" style="display: none;">
            <div class="battle-header">
                <h2>⚔️ БИТВА КАНДИДАТОВ</h2>
                <p>Победитель +100, проигравший -50</p>
            </div>
            <div class="battle-grid" id="battleGrid"></div>
            <button class="battle-vote-btn" id="voteBtn">⚡ ГОЛОСОВАТЬ</button>
            <div class="prediction-box" id="predictionBox">
                <div class="prediction-bars" id="predictionBars"></div>
            </div>
        </div>

        <!-- РЕКОМЕНДАЦИИ -->
        <div id="recommendations" class="recommendations" style="display: none;">
            <h3>🎯 Вам также могут понравиться</h3>
            <div id="recommendationsGrid" class="recommendations-grid"></div>
        </div>

        <!-- КОММЕНТАРИИ -->
        <div class="comments-section">
            <h3>💬 КОММЕНТАРИИ</h3>
            <div class="comment-form">
                <textarea id="commentMessage" placeholder="Напишите комментарий..." maxlength="200"></textarea>
                <button id="submitComment">📝 Отправить</button>
            </div>
            <div class="comments-list" id="commentsList">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
