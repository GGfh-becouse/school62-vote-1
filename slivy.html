<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Сливы - Школа №62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif !important;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
        }

        /* Шапка */
        .header {
            background: linear-gradient(145deg, #4a6fa5 0%, #2c3e50 100%);
            border-radius: 24px;
            padding: 12px 20px;
            margin: 16px;
            box-shadow: 0 6px 0 #1a2a3a;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .school-badge {
            background: #ffd966;
            color: #2c3e50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            border-bottom: 3px solid #b38f4a;
        }

        .main-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 3px solid rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-item.active {
            background: #ffd966;
            color: #2c3e50;
            border-bottom-color: #b38f4a;
        }

        .nav-icon {
            font-size: 1.1rem;
        }

        /* Основной контент */
        .content {
            padding: 0 16px 30px 16px;
        }

        .page-title {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title span {
            font-size: 2rem;
        }

        /* Форма загрузки */
        .upload-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            border: 2px solid #e0e0e0;
            box-shadow: 0 4px 0 #c0c0c0;
            margin-bottom: 30px;
        }

        .upload-card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-area {
            border: 3px dashed #4a6fa5;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .upload-area:hover {
            background: #eef2f7;
            border-color: #2c3e50;
        }

        .upload-area.dragover {
            background: #e3f2fd;
            border-color: #2196f3;
        }

        .upload-icon {
            font-size: 48px;
            color: #4a6fa5;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #2c3e50;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .file-info {
            display: none;
            background: #e8f5e9;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #4caf50;
        }

        .file-info.active {
            display: block;
        }

        .file-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .file-size {
            color: #7f8c8d;
            font-size: 0.85rem;
        }

        .preview-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 10px;
            border: 2px solid #4a6fa5;
        }

        /* Классификация */
        .classification-section {
            margin-bottom: 20px;
        }

        .section-label {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .class-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .class-option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .class-option:hover {
            border-color: #4a6fa5;
            background: #eef2f7;
        }

        .class-option.selected {
            background: #4a6fa5;
            color: white;
            border-color: #2c3e50;
        }

        .exam-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .exam-option {
            flex: 1;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .exam-option:hover {
            border-color: #4a6fa5;
            background: #eef2f7;
        }

        .exam-option.selected {
            background: #4a6fa5;
            color: white;
            border-color: #2c3e50;
        }

        .exam-option .exam-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .exam-option .exam-title {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .exam-option .exam-desc {
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        .exam-option.selected .exam-desc {
            color: rgba(255,255,255,0.8);
        }

        .upload-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            border-bottom: 4px solid #2c3e50;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .upload-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .upload-btn:disabled {
            background: #ccc;
            border-bottom-color: #999;
            cursor: not-allowed;
        }

        /* Галерея */
        .gallery-section {
            margin-top: 30px;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .gallery-title {
            color: #2c3e50;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-badge {
            background: #f8f9fa;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 0.9rem;
            color: #2c3e50;
            border: 1px solid #e0e0e0;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .gallery-item {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
            box-shadow: 0 4px 0 #c0c0c0;
            transition: all 0.2s;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 0 #a0a0a0;
        }

        .gallery-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .gallery-info {
            padding: 10px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .gallery-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .gallery-class {
            background: #4a6fa5;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .gallery-exam {
            background: #ffd966;
            color: #2c3e50;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .gallery-date {
            font-size: 0.7rem;
            color: #7f8c8d;
        }

        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4a6fa5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10001;
            animation: slideIn 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }

        @media (max-width: 600px) {
            .class-selector {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->

                </div>
                
                <nav class="main-nav">
                    <a href="index.html" class="nav-item">
                        <span class="nav-icon">🏠</span>

                    <a href="threads.html" class="nav-item">

                    </div>

                        Все классы
                    </div>
                </div>
                <div class="gallery-grid" id="galleryGrid">
                    <div style="text-align: center; padding: 40px; color: #7f8c8d; grid-column: 1/-1;">
                        <div style="font-size: 48px; margin-bottom: 15px;">📸</div>

        </div>
    </div>

    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================
        // ПЕРЕМЕННЫЕ
        // ============================================
        const classes = ['7А', '7Б', '8А', '8Б', '9А', '9Б', '10А', '11А'];
        let selectedClass = '';
        let selectedExam = '';
        let selectedFile = null;
        let uploadedImages = [];

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        function init() {
            // Заполняем классы
            const classSelector = document.getElementById('classSelector');
            classes.forEach(c => {
                const div = document.createElement('div');
                div.className = 'class-option';
                div.textContent = c;
                div.onclick = () => selectClass(c, div);
                classSelector.appendChild(div);
            });

            // Настраиваем загрузку
            setupUploadArea();
            
            // Загружаем сохраненные изображения
            loadImages();
        }

        // ============================================
        // ВЫБОР КЛАССА
        // ============================================
        function selectClass(className, element) {
            document.querySelectorAll('.class-option').forEach(el => {
                el.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedClass = className;
            checkForm();
        }

        // ============================================
        // ВЫБОР ТИПА РАБОТЫ
        // ============================================
        document.querySelectorAll('.exam-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.exam-option').forEach(el => {
                    el.classList.remove('selected');
                });
                this.classList.add('selected');
                selectedExam = this.dataset.exam;
                checkForm();
            });
        });

        // ============================================
        // ПРОВЕРКА ФОРМЫ
        // ============================================
        function checkForm() {
            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = !(selectedFile && selectedClass && selectedExam);
        }

        // ============================================
        // НАСТРОЙКА ЗАГРУЗКИ
        // ============================================
        function setupUploadArea() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            // Клик по области
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });

            // Выбор файла
            fileInput.addEventListener('change', (e) => {
                handleFile(e.target.files[0]);
            });

            // Drag & Drop
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    handleFile(file);
                } else {
                    showMessage('Пожалуйста, выберите изображение', 'error');
                }
            });
        }

        // ============================================
        // ОБРАБОТКА ФАЙЛА
        // ============================================
        function handleFile(file) {
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showMessage('Пожалуйста, выберите изображение', 'error');
                return;
            }

            if (file.size > 10 * 1024 * 1024) { // 10MB
                showMessage('Файл слишком большой (максимум 10MB)', 'error');
                return;
            }

            selectedFile = file;

            // Отображаем информацию
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = 
                (file.size / 1024 / 1024).toFixed(2) + ' MB';
            
            // Превью
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview').src = e.target.result;
            };
            reader.readAsDataURL(file);

            document.getElementById('fileInfo').classList.add('active');
            checkForm();
        }

        // ============================================
        // ЗАГРУЗКА НА ХОСТИНГ
        // ============================================
        async function uploadToHosting(file) {
            // Здесь будет интеграция с реальным хостингом
            // Пока используем Imgur API как пример
            
            const formData = new FormData();
            formData.append('image', file);

            try {
                // Пример с Imgur API (нужен будет client-id)
                // const response = await fetch('https://api.imgur.com/3/image', {
                //     method: 'POST',
                //     headers: {
                //         'Authorization': 'Client-ID YOUR_CLIENT_ID'
                //     },
                //     body: formData
                // });
                // const data = await response.json();
                // return data.data.link;

                // Пока возвращаем локальный URL для демо
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });

            } catch (error) {
                console.error('Ошибка загрузки на хостинг:', error);
                throw error;
            }
        }

        // ============================================
        // ЗАГРУЗКА ФОТО
        // ============================================
        async function uploadPhoto() {
            if (!selectedFile || !selectedClass || !selectedExam) return;

            const uploadBtn = document.getElementById('uploadBtn');
            const spinner = document.getElementById('loadingSpinner');
            
            uploadBtn.disabled = true;
            spinner.style.display = 'block';

            try {
                // Загружаем на хостинг
                const imageUrl = await uploadToHosting(selectedFile);

                // Создаем запись в локальном хранилище
                const imageData = {
                    id: Date.now(),
                    url: imageUrl,
                    class: selectedClass,
                    exam: selectedExam,
                    date: new Date().toISOString(),
                    uploader: 'Аноним'
                };

                // Сохраняем в localStorage
                const saved = localStorage.getItem('slivy_images');
                const images = saved ? JSON.parse(saved) : [];
                images.unshift(imageData);
                localStorage.setItem('slivy_images', JSON.stringify(images));

                // Обновляем галерею
                await loadImages();

                // Сбрасываем форму
                resetForm();

                showMessage('✅ Фото успешно загружено!', 'success');

            } catch (error) {
                console.error('Ошибка загрузки:', error);
                showMessage('Ошибка при загрузке фото', 'error');
            } finally {
                uploadBtn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        // ============================================
        // СБРОС ФОРМЫ
        // ============================================
        function resetForm() {
            selectedFile = null;
            selectedClass = '';
            selectedExam = '';
            
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').classList.remove('active');
            document.querySelectorAll('.class-option').forEach(el => {
                el.classList.remove('selected');
            });
            document.querySelectorAll('.exam-option').forEach(el => {
                el.classList.remove('selected');
            });
            
            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
        }

        // ============================================
        // ЗАГРУЗКА ИЗОБРАЖЕНИЙ
        // ============================================
        async function loadImages() {
            const galleryGrid = document.getElementById('galleryGrid');
            
            // Загружаем из localStorage
            const saved = localStorage.getItem('slivy_images');
            const images = saved ? JSON.parse(saved) : [];

            if (images.length === 0) {
                galleryGrid.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #7f8c8d; grid-column: 1/-1;">
                        <div style="font-size: 48px; margin-bottom: 15px;">📸</div>
                        <p>Пока нет загруженных фото</p>
                    </div>
                `;
                return;
            }

            let html = '';
            images.slice(0, 12).forEach(img => {
                const date = new Date(img.date).toLocaleString('ru', {
                    day: '2-digit', month: '2-digit'
                });
                
                html += `
                    <div class="gallery-item" onclick="openImage('${img.url}')">
                        <img src="${img.url}" class="gallery-image" alt="Upload" loading="lazy">
                        <div class="gallery-info">
                            <div class="gallery-meta">
                                <span class="gallery-class">${img.class}</span>
                                <span class="gallery-exam">${img.exam.toUpperCase()}</span>
                            </div>
                            <div class="gallery-date">${date}</div>
                        </div>
                    </div>
                `;
            });

            galleryGrid.innerHTML = html;
        }

        // ============================================
        // ОТКРЫТЬ ИЗОБРАЖЕНИЕ
        // ============================================
        function openImage(url) {
            window.open(url, '_blank');
        }

        // ============================================
        // ПОКАЗ СООБЩЕНИЙ
        // ============================================
        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // ============================================
        // ЗАПУСК
        // ============================================
        document.addEventListener('DOMContentLoaded', init);

        // Кнопка загрузки
        document.getElementById('uploadBtn').addEventListener('click', uploadPhoto);

        // Фильтр (для будущей реализации)
        document.getElementById('filterBadge').addEventListener('click', () => {
            const filter = prompt('Введите класс для фильтрации (или оставьте пустым для всех):');
            if (filter === null) return;
            
            if (filter) {
                document.getElementById('filterBadge').textContent = `Класс: ${filter}`;
                // Здесь будет фильтрация
            } else {
                document.getElementById('filterBadge').textContent = 'Все классы';
                loadImages();
            }
        });
    </script>
</body>
</html>
