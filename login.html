<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>вход | школа 62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #f8f9fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        /* HEADER */
        .header {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-img {
            height: 36px;
            width: auto;
            object-fit: contain;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a1e2b;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #8b93a6;
            font-size: 0.8rem;
            font-weight: 400;
            margin-left: 4px;
        }

        .header-icons {
            display: flex;
            gap: 16px;
        }

        .header-icon {
            font-size: 1.2rem;
            color: #8b93a6;
            transition: color 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .header-icon:hover {
            color: #2e3440;
        }

        /* LOGIN CARD */
        .login-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-header h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1e2b;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #8b93a6;
            font-size: 0.9rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1a1e2b;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 18px;
            font-size: 0.95rem;
            background: #f8f9fc;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #2e3440;
            background: #ffffff;
        }

        .form-control::placeholder {
            color: #b5bcc8;
            font-weight: 300;
        }

        .login-btn {
            background: #2e3440;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            letter-spacing: 0.3px;
        }

        .login-btn:hover {
            background: #1a1e2b;
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* PRIME LOGIN BUTTON */
        .prime-login-btn {
            background: #fcf9f0;
            border: 2px solid #f1c40f;
            color: #1a1e2b;
            border-radius: 40px;
            padding: 16px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            text-align: center;
            text-decoration: none;
            margin: 16px 0 20px;
        }

        .prime-login-btn:hover {
            background: #f8f0d8;
            transform: translateY(-1px);
        }

        .prime-login-btn i {
            color: #f1c40f;
            margin-right: 8px;
        }

        /* DIVIDER */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #8b93a6;
            font-size: 0.8rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(0, 0, 0, 0.05);
        }

        /* REGISTER LINK */
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #8b93a6;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #2e3440;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid #2e3440;
            padding-bottom: 2px;
            transition: opacity 0.2s;
        }

        .register-link a:hover {
            opacity: 0.7;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 560px;
            width: calc(100% - 32px);
            background: #ffffff;
            border-radius: 40px;
            padding: 6px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .nav-item-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8b93a6;
            text-decoration: none;
            font-size: 0.6rem;
            font-weight: 500;
            flex: 1;
            padding: 8px 0;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .nav-item-bottom.active {
            background: #f0f2f5;
            color: #2e3440;
        }

        .nav-item-bottom:hover {
            color: #2e3440;
            background: #f8f9fc;
        }

        .nav-icon-bottom {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        /* MESSAGES */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.15);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #2e3440; }
        .message.error { background: #c0392b; }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            body {
                padding: 16px;
                align-items: flex-start;
            }

            .login-card {
                padding: 24px 20px;
            }

            .bottom-nav {
                bottom: 16px;
            }

            .logo-img {
                height: 28px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <img src="top_logotype.png" alt="Школа 62" class="logo-img">
                    <h1>стена</h1>
                </div>
                <div class="header-icons">
                    <a href="your_account.html" class="header-icon">
                        <i class="far fa-user"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <div class="login-header">
                <h2>вход</h2>
                <p>войдите в свой аккаунт</p>
            </div>
            
            <div class="form-group">
                <label>никнейм</label>
                <input type="text" id="nickname" class="form-control" placeholder="john2007">
            </div>

            <div class="form-group">
                <label>пароль</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••">
            </div>

            <button class="login-btn" id="loginBtn">войти</button>

            <!-- Prime вход -->
            <a href="prime.login.html" class="prime-login-btn">
                <i class="fas fa-crown"></i> вход в in-PREMIUM
            </a>

            <!-- Ссылка на правила -->
            <div style="text-align: center; margin-top: 15px;">
                <a href="rules.html" style="color: #8b93a6; font-size: 0.8rem; text-decoration: none; border-bottom: 1px solid #8b93a6;">
                    <i class="fas fa-scroll"></i> правила сообщества
                </a>
            </div>

            <div class="divider">
                <span class="divider-line"></span>
                <span>или</span>
                <span class="divider-line"></span>
            </div>

            <div class="register-link">
                нет аккаунта? <a href="register.html">зарегистрироваться</a>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item-bottom">
            <i class="fas fa-home nav-icon-bottom"></i>
            <span>главная</span>
        </a>
        <a href="votes.html" class="nav-item-bottom">
            <i class="fas fa-chart-bar nav-icon-bottom"></i>
            <span>голосования</span>
        </a>
        <a href="threads.html" class="nav-item-bottom">
            <i class="fas fa-comment nav-icon-bottom"></i>
            <span>темки</span>
        </a>
        <a href="slivy.html" class="nav-item-bottom">
            <i class="fas fa-image nav-icon-bottom"></i>
            <span>сливы</span>
        </a>
        <a href="your_account.html" class="nav-item-bottom active">
            <i class="fas fa-user nav-icon-bottom"></i>
            <span>аккаунт</span>
        </a>
    </nav>

    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!nickname || !password) {
                showMessage('введите ник и пароль', 'error');
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('nickname', nickname)
                    .eq('password', password)
                    .maybeSingle();

                if (error) throw error;

                if (!data) {
                    showMessage('неверный ник или пароль', 'error');
                    return;
                }

                // Сохраняем данные пользователя
                localStorage.setItem('userId', data.id);
                localStorage.setItem('userNickname', data.nickname);
                localStorage.setItem('userClass', data.class);
                
                showMessage('✅ вход выполнен', 'success');
                
                setTimeout(() => {
                    window.location.href = 'your_account.html';
                }, 1500);

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        });

        // Enter для отправки
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });

        // Автофокус на никнейм
        document.getElementById('nickname').focus();
    </script>
</body>
</html>
