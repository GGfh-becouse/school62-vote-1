<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Вход - Школа №62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            max-width: 400px;
            width: 100%;
            padding: 28px 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border: 2px solid #4a6fa5;
        }

        .login-card h2 {
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid #4a6fa5;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .login-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            border-bottom: 4px solid #2c3e50;
            transition: all 0.1s;
            margin-top: 10px;
        }

        .login-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
        }

        .register-link a {
            color: #4a6fa5;
            text-decoration: none;
            font-weight: 600;
        }

        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10001;
            animation: slideIn 0.2s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔐 ВХОД</h2>
        
        <div class="form-group">
            <label>Никнейм</label>
            <input type="text" id="nickname" class="form-control" placeholder="john2007">
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••">
        </div>

        <button class="login-btn" id="loginBtn">ВОЙТИ</button>

        <div class="register-link">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </div>
    </div>
<div class="register-link" style="margin-top: 15px;">
    <a href="prime_login.html" style="color: gold; font-weight: 700;">👑 Войти как PREMIUM</a>
</div>
    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!nickname || !password) {
                showMessage('Введите ник и пароль', 'error');
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('nickname', nickname)
                    .eq('password', password)
                    .maybeSingle();

                if (error) throw error;

                if (!data) {
                    showMessage('Неверный ник или пароль', 'error');
                    return;
                }

                // Сохраняем данные пользователя
                localStorage.setItem('userId', data.id);
                localStorage.setItem('userNickname', data.nickname);
                localStorage.setItem('userClass', data.class);
                
                showMessage('✅ Вход выполнен!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'your_account.html';
                }, 1500);

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        });

        // Enter для отправки
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
