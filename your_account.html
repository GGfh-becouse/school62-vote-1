<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>профиль | школа 62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... все стили без изменений ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #f8f9fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #f8f9fc;
            position: relative;
            padding: 0 16px;
        }

        .main-content {
            display: block;
            padding-bottom: 90px;
        }

        /* HEADER */
        .header {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px 20px;
            margin: 8px 0 24px 0;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #2e3440;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a1e2b;
            letter-spacing: -0.5px;
        }

        .header-icons {
            display: flex;
            gap: 16px;
        }

        .header-icon {
            font-size: 1.2rem;
            color: #8b93a6;
            transition: color 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .header-icon:hover {
            color: #2e3440;
        }

        /* USER INFO BAR */
        .user-info-bar {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .user-info-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .user-avatar-mini {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            overflow: hidden;
            border: 2px solid rgba(0, 0, 0, 0.05);
        }

        .user-avatar-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .user-nickname {
            font-weight: 600;
            font-size: 1.2rem;
            color: #1a1e2b;
        }

        .user-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .user-class {
            background: #f0f2f5;
            color: #1a1e2b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .user-prime {
            background: #f1c40f;
            color: #1a1e2b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .logout-btn {
            background: #f0f2f5;
            color: #1a1e2b;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .logout-btn:hover {
            background: #e4e6e9;
        }

        /* PROFILE CARD */
        .profile-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .profile-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        /* AVATAR CONTAINER */
        .avatar-container {
            position: relative;
            width: 200px;
            height: 200px;
            flex-shrink: 0;
            margin: 0 auto;
        }

        .avatar-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            object-fit: cover;
            border: 2px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 16px -8px rgba(0, 0, 0, 0.2);
        }

        /* FRAMES */
        .avatar-frame-neon {
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 26px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 15px #00ff88;
            pointer-events: none;
        }

        .avatar-frame-gold {
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 26px;
            border: 3px solid #f1c40f;
            box-shadow: 0 0 15px #f1c40f;
            pointer-events: none;
        }

        .avatar-frame-event {
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 26px;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 15px #ff6b6b;
            pointer-events: none;
        }

        /* STICKERS */
        .sticker {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 16px;
            object-fit: cover;
            border: none;
            box-shadow: 0 4px 8px -4px rgba(0, 0, 0, 0.2);
            z-index: 5;
        }

        .sticker-pos-1 { top: -10px; left: -10px; width: 60px; height: 60px; }
        .sticker-pos-2 { top: -10px; right: -10px; width: 60px; height: 60px; }
        .sticker-pos-3 { bottom: -10px; left: -10px; width: 60px; height: 60px; }
        .sticker-pos-4 { bottom: -10px; right: -10px; width: 60px; height: 60px; }
        .sticker-pos-5 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; }
        .sticker-pos-6 { top: -10px; left: 50%; transform: translateX(-50%); }
        .sticker-pos-7 { bottom: -10px; left: 50%; transform: translateX(-50%); }
        .sticker-pos-8 { left: -10px; top: 50%; transform: translateY(-50%); }
        .sticker-pos-9 { right: -10px; top: 50%; transform: translateY(-50%); }

        .sticker:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .sticker-remove {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: #e74c3c;
            color: white;
            border-radius: 10px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-bottom: 2px solid #c0392b;
            z-index: 15;
        }

        .avatar-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
            flex: 1;
        }

        .change-avatar-btn {
            background: #f0f2f5;
            color: #1a1e2b;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .change-avatar-btn:hover {
            background: #e4e6e9;
        }

        /* STATUS SECTION */
        .status-section {
            margin-bottom: 24px;
        }

        .status-display {
            background: #f8f9fc;
            border-radius: 18px;
            padding: 16px 20px;
            margin-bottom: 12px;
            color: #1a1e2b;
            font-size: 0.95rem;
            border-left: 3px solid #2e3440;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .status-input {
            display: flex;
            gap: 10px;
        }

        .status-input input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 18px;
            font-size: 0.9rem;
            background: #f8f9fc;
            transition: border-color 0.2s;
        }

        .status-input input:focus {
            outline: none;
            border-color: #2e3440;
            background: #ffffff;
        }

        .status-input button {
            background: #2e3440;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .status-input button:hover {
            background: #1a1e2b;
        }

        /* PROFILE ACTIONS */
        .profile-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .action-btn {
            background: #f0f2f5;
            color: #1a1e2b;
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            background: #e4e6e9;
        }

        /* FRIENDS SECTION */
        .friends-section {
            background: #f8f9fc;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .friends-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .friends-header h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .friends-count {
            background: #2e3440;
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .friends-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 12px;
        }

        .friend-tab {
            background: none;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #8b93a6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .friend-tab:hover {
            background: #f0f2f5;
            color: #1a1e2b;
        }

        .friend-tab.active {
            background: #2e3440;
            color: white;
        }

        .friends-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: transform 0.2s;
        }

        .friend-item:hover {
            transform: translateX(4px);
        }

        .friend-avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(0, 0, 0, 0.05);
        }

        .friend-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            font-weight: 600;
            color: #1a1e2b;
            margin-bottom: 2px;
        }

        .friend-meta {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .friend-class {
            font-size: 0.7rem;
            color: #8b93a6;
            background: #f0f2f5;
            padding: 2px 8px;
            border-radius: 30px;
        }

        .friend-status {
            font-size: 0.7rem;
            color: #27ae60;
        }

        .friend-actions {
            display: flex;
            gap: 8px;
        }

        .friend-btn {
            background: #f0f2f5;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .friend-btn.accept {
            background: #2e3440;
            color: white;
        }

        .friend-btn.accept:hover {
            background: #1a1e2b;
        }

        .friend-btn.reject {
            background: #f0f2f5;
            color: #e74c3c;
        }

        .friend-btn.reject:hover {
            background: #fdedec;
        }

        .friend-btn.remove {
            color: #e74c3c;
        }

        .friend-btn.remove:hover {
            background: #fdedec;
        }

        .empty-friends {
            text-align: center;
            padding: 30px;
            color: #8b93a6;
            font-size: 0.9rem;
        }

        /* FRAMES SECTION */
        .frames-section {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .frames-section h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .frames-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        .frame-option {
            background: #ffffff;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.2s;
        }

        .frame-option:hover {
            border-color: #2e3440;
            transform: translateY(-2px);
        }

        .frame-option.active {
            border: 2px solid #2e3440;
        }

        .frame-preview {
            width: 50px;
            height: 50px;
            margin: 0 auto 8px;
            border-radius: 12px;
        }

        .frame-preview.standard { background: #2e3440; }
        .frame-preview.neon { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .frame-preview.gold { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        .frame-preview.event { background: linear-gradient(45deg, #ff6b6b, #f1c40f); }

        /* STICKERS SECTION */
        .stickers-section {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .stickers-section h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sticker-counter {
            background: #2e3440;
            color: white;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .sticker-url-input {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .sticker-url-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            font-size: 0.9rem;
            background: #ffffff;
        }

        .sticker-url-input input:focus {
            outline: none;
            border-color: #2e3440;
        }

        .sticker-url-input button {
            background: #2e3440;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .sticker-item {
            background: #ffffff;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.2s;
        }

        .sticker-item:hover {
            border-color: #2e3440;
            transform: translateY(-2px);
        }

        .sticker-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 5px;
            border: none;
        }

        .sticker-rarity {
            font-size: 0.65rem;
            color: #8b93a6;
        }

        .prime-note {
            color: #8b93a6;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 560px;
            width: calc(100% - 32px);
            background: #ffffff;
            border-radius: 40px;
            padding: 6px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .nav-item-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8b93a6;
            text-decoration: none;
            font-size: 0.6rem;
            font-weight: 500;
            flex: 1;
            padding: 8px 0;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .nav-item-bottom.active {
            background: #f0f2f5;
            color: #2e3440;
        }

        .nav-item-bottom:hover {
            color: #2e3440;
            background: #f8f9fc;
        }

        .nav-icon-bottom {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        /* MESSAGES */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.15);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #2e3440; }
        .message.error { background: #c0392b; }

        .loader {
            border: 2px solid #f0f2f5;
            border-top: 2px solid #2e3440;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            body {
                padding: 16px 0;
            }
            
            .profile-header {
                justify-content: center;
                text-align: center;
            }
            
            .avatar-actions {
                align-items: center;
            }
            
            .status-input {
                flex-direction: column;
            }
            
            .sticker-url-input {
                flex-direction: column;
            }

            .user-info-bar {
                flex-direction: column;
                text-align: center;
            }

            .user-info-left {
                justify-content: center;
            }

            .friends-tabs {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
        /* Логотип */
.logo-img {
    height: 36px;
    width: auto;
    object-fit: contain;
}

@media (max-width: 600px) {
    .logo-img {
        height: 28px;
    }
}

    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================
        // ПЕРЕМЕННЫЕ
        // ============================================
        let currentUser = null;

        const stickerPositions = [
            'sticker-pos-1', 'sticker-pos-2', 'sticker-pos-3', 'sticker-pos-4', 'sticker-pos-5',

        // ============================================
        // БАЗОВЫЕ ФУНКЦИИ (ОПРЕДЕЛЯЕМ ПЕРВЫМИ)

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // ФУНКЦИИ ДЛЯ РАМОК
        // ============================================
        function selectFrame(frameType) {
            currentFrame = frameType;
            const frameDiv = document.getElementById('avatarFrame');
            
            const frames = {
                standard: '',
                neon: '<div class="avatar-frame-neon"></div>',
                gold: '<div class="avatar-frame-gold"></div>',
                event: '<div class="avatar-frame-event"></div>'
            };
            
            if (frameDiv) {
                frameDiv.innerHTML = frames[frameType] || '';

            // Подсветка активной рамки
            document.querySelectorAll('.frame-option').forEach(opt => opt.classList.remove('active'));
            const activeFrame = document.querySelector(`.frame-option[onclick*="'${frameType}'"]`);

                activeFrame.classList.add('active');
            }
            
            saveProfileToLocalStorage();
        }

        // ============================================
        // LOCALSTORAGE
        // ============================================
        function saveProfileToLocalStorage() {
            if (!currentUser) return;
            
            const profileData = {
                id: currentUser.id,
                nickname: currentUser.nickname,
                real_name: currentUser.real_name,
                class: currentUser.class,
                avatar_url: currentUser.avatar_url,
                status: currentUser.status,
                is_prime: currentUser.is_prime,
                display_name: currentUser.display_name || currentUser.nickname,
                frame: currentFrame,
                stickers: currentStickers.map(s => ({
                    id: s.id,
                    url: s.sticker_url,
                    position: s.position
                }))
            };
            
            localStorage.setItem('profileData', JSON.stringify(profileData));
        }

        function loadProfileFromLocalStorage() {
            const profileData = localStorage.getItem('profileData');
            if (profileData) {
                try {
                    const data = JSON.parse(profileData);
                    currentFrame = data.frame || 'standard';
                    
                    const avatar = document.getElementById('avatar');
                    const miniAvatar = document.getElementById('miniAvatar');
                    const userNickname = document.getElementById('userNickname');
                    const userClass = document.getElementById('userClass');
                    const statusDisplay = document.getElementById('statusDisplay');
                    
                    if (avatar) avatar.src = data.avatar_url || 'https://i.pravatar.cc/300';
                    if (miniAvatar) miniAvatar.src = data.avatar_url || 'https://i.pravatar.cc/300';
                    if (userNickname) userNickname.textContent = data.display_name || data.nickname;
                    if (userClass) userClass.textContent = data.class;
                    if (statusDisplay) statusDisplay.textContent = data.status || 'Статус не установлен';
                    
                    selectFrame(currentFrame);
                    
                    if (data.stickers) {
                        currentStickers = data.stickers.map(s => ({
                            id: s.id,
                            sticker_url: s.url,
                            position: s.position
                        }));
                        renderStickers();
                    }
                    
                    return true;
                } catch (e) {
                    console.error('Ошибка загрузки из localStorage:', e);
                    return false;
                }
            }
            return false;
        }

        // ============================================
        // ПРОВЕРКА PREMIUM
        // ============================================
        async function checkPrimeStatus() {
            try {
                const { data, error } = await supabaseClient
                    .from('verified_users')

                if (data) {
                    currentUser.is_prime = true;
                    await supabaseClient
                        .from('users')
                        .update({ is_prime: true })
                        .eq('id', currentUser.id);
                }
            } catch (error) {
                console.error('Ошибка проверки премиум статуса:', error);
            }

        function applyPrimeFeatures() {
            if (!currentUser.is_prime) return;
            
            maxStickers = 5;
            document.getElementById('stickerCounter').textContent = `${currentStickers.length}/${maxStickers}`;
            document.getElementById('userPrime').textContent = 'prime';
        }

        // ============================================
        // ФУНКЦИИ ДЛЯ ДРУЗЕЙ
        // ============================================
        window.switchFriendsTab = function(tab) {
            const tabs = document.querySelectorAll('.friend-tab');
            tabs.forEach(t => t.classList.remove('active'));
            
            const activeTab = Array.from(tabs).find(t => {
                if (tab === 'friends') return t.textContent.includes('мои кенты');
                if (tab === 'requests') return t.textContent.includes('запросы');
                if (tab === 'sent') return t.textContent.includes('отправленные');
            });
            
            if (activeTab) {
                activeTab.classList.add('active');
            }

            const friendsList = document.getElementById('friendsList');
            
            if (tab === 'friends') {
                displayFriends();
            } else if (tab === 'requests') {
                displayFriendRequests();
            } else if (tab === 'sent') {
                displaySentRequests();
            }
        };

        function displayFriends() {
            const list = document.getElementById('friendsList');
            
            if (!friends || friends.length === 0) {
                list.innerHTML = '<div class="empty-friends">🤝 пока нет кентов</div>';
                return;
            }

            let html = '';
            friends.forEach(friend => {
                if (!friend) return;
                
                html += `
                    <div class="friend-item">
                        <div class="friend-avatar">
                            <img src="${friend.avatar_url || 'https://i.pravatar.cc/300'}" alt="">
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">${friend.display_name || friend.nickname || 'Пользователь'}</div>
                            <div class="friend-meta">
                                <span class="friend-class">${friend.class || 'класс'}</span>
                                ${friend.status ? `<span class="friend-status">"${friend.status.substring(0, 20)}${friend.status.length > 20 ? '...' : ''}"</span>` : ''}
                            </div>
                        </div>
                        <div class="friend-actions">
                            <button class="friend-btn remove" onclick="removeFriend('${friend.id}')">
                                <i class="fas fa-user-minus"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }

        function displayFriendRequests() {
            const list = document.getElementById('friendsList');
            
            if (!friendRequests || friendRequests.length === 0) {
                list.innerHTML = '<div class="empty-friends">📭 нет запросов в друзья</div>';
                return;
            }

            let html = '';
            friendRequests.forEach(request => {
                if (!request || !request.user) return;
                
                html += `
                    <div class="friend-item">
                        <div class="friend-avatar">
                            <img src="${request.user.avatar_url || 'https://i.pravatar.cc/300'}" alt="">
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">${request.user.display_name || request.user.nickname}</div>
                            <div class="friend-meta">
                                <span class="friend-class">${request.user.class || 'класс'}</span>
                                ${request.user.is_prime ? '<span class="friend-status" style="color:#f1c40f;">prime</span>' : ''}
                            </div>
                        </div>
                        <div class="friend-actions">
                            <button class="friend-btn accept" onclick="acceptFriendRequest('${request.id}', '${request.user.id}')">
                                <i class="fas fa-check"></i>
                            </button>
                            <button class="friend-btn reject" onclick="rejectFriendRequest('${request.id}')">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }

        function displaySentRequests() {
            const list = document.getElementById('friendsList');
            
            if (!sentRequests || sentRequests.length === 0) {
                list.innerHTML = '<div class="empty-friends">📤 нет отправленных запросов</div>';
                return;
            }

            let html = '';
            sentRequests.forEach(request => {
                if (!request || !request.user) return;
                
                html += `
                    <div class="friend-item">
                        <div class="friend-avatar">
                            <img src="${request.user.avatar_url || 'https://i.pravatar.cc/300'}" alt="">
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">${request.user.display_name || request.user.nickname}</div>
                            <div class="friend-meta">
                                <span class="friend-class">${request.user.class || 'класс'}</span>
                                <span class="friend-status" style="color:#8b93a6;">ожидание</span>
                            </div>
                        </div>
                        <div class="friend-actions">
                            <button class="friend-btn reject" onclick="cancelFriendRequest('${request.id}')">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }

        window.acceptFriendRequest = async function(requestId, friendId) {
            try {
                const { error } = await supabaseClient
                    .from('friends')
                    .update({ 
                        status: 'accepted',
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', parseInt(requestId));

                if (error) throw error;

                showMessage('✅ запрос принят', 'success');
                await loadFriends();

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        };

        window.rejectFriendRequest = async function(requestId) {
            try {
                const { error } = await supabaseClient
                    .from('friends')
                    .delete()
                    .eq('id', parseInt(requestId));

                if (error) throw error;

                showMessage('❌ запрос отклонен', 'success');
                await loadFriends();

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        };

        window.cancelFriendRequest = async function(requestId) {
            try {
                const { error } = await supabaseClient
                    .from('friends')
                    .delete()
                    .eq('id', parseInt(requestId));

                if (error) throw error;

                showMessage('✖️ запрос отменен', 'success');
                await loadFriends();

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        };

        window.removeFriend = async function(friendId) {
            if (!confirm('Удалить из кентов?')) return;

            const userId = parseInt(currentUser.id);
            const friendIdNum = parseInt(friendId);

            try {
                // Пытаемся удалить связь где текущий пользователь - инициатор
                const { error: error1 } = await supabaseClient
                    .from('friends')
                    .delete()
                    .eq('user_id', userId)
                    .eq('friend_id', friendIdNum)
                    .eq('status', 'accepted');

                // Если первая попытка не удалась, пробуем обратную связь
                if (error1 && error1.code === 'PGRST116') {
                    const { error: error2 } = await supabaseClient
                        .from('friends')
                        .delete()
                        .eq('user_id', friendIdNum)
                        .eq('friend_id', userId)
                        .eq('status', 'accepted');

                    if (error2) throw error2;
                } else if (error1) {
                    throw error1;
                }

                showMessage('👋 кент удален', 'success');
                await loadFriends();

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        };

        async function loadFriends() {
            try {
                const userId = parseInt(currentUser.id);
                
                // Загружаем друзей (где пользователь - инициатор)
                const { data: sentFriends, error: sentError } = await supabaseClient
                    .from('friends')
                    .select(`
                        friend_id,
                        users!friends_friend_id_fkey (
                            id,
                            nickname,
                            display_name,
                            class,
                            avatar_url,
                            is_prime,
                            status
                        )
                    `)
                    .eq('user_id', userId)
                    .eq('status', 'accepted');

                if (sentError) throw sentError;

                // Загружаем друзей (где пользователь - получатель)
                const { data: receivedFriends, error: receivedError } = await supabaseClient
                    .from('friends')
                    .select(`
                        user_id,
                        users!friends_user_id_fkey (
                            id,
                            nickname,
                            display_name,
                            class,
                            avatar_url,
                            is_prime,
                            status
                        )
                    `)
                    .eq('friend_id', userId)
                    .eq('status', 'accepted');

                if (receivedError) throw receivedError;

                // Объединяем обоих друзей
                friends = [
                    ...(sentFriends?.map(f => f.users) || []),
                    ...(receivedFriends?.map(f => f.users) || [])
                ];
                
                document.getElementById('friendsCount').textContent = friends.length;

                // Загружаем входящие запросы
                const { data: requestsData, error: requestsError } = await supabaseClient
                    .from('friends')
                    .select(`
                        id,
                        user_id,
                        users!friends_user_id_fkey (
                            id,
                            nickname,
                            display_name,
                            class,
                            avatar_url,
                            is_prime,
                            status
                        )
                    `)
                    .eq('friend_id', userId)
                    .eq('status', 'pending');

                if (requestsError) throw requestsError;

                // Загружаем отправленные запросы
                const { data: sentData, error: sentError2 } = await supabaseClient
                    .from('friends')
                    .select(`
                        id,
                        friend_id,
                        users!friends_friend_id_fkey (
                            id,
                            nickname,
                            display_name,
                            class,
                            avatar_url,
                            is_prime,
                            status
                        )
                    `)
                    .eq('user_id', userId)
                    .eq('status', 'pending');

                if (sentError2) throw sentError2;

                friendRequests = requestsData?.map(r => ({
                    id: r.id,
                    user: r.users
                })) || [];

                sentRequests = sentData?.map(s => ({
                    id: s.id,
                    user: s.users
                })) || [];

                // Отображаем активную вкладку
                switchFriendsTab('friends');

            } catch (error) {
                console.error('Ошибка загрузки друзей:', error);
            }
        }

        // ============================================
        // СТИКЕРЫ
        // ============================================
        async function loadStickers() {
            try {
                const { data, error } = await supabaseClient
                    .from('user_stickers')
                    .select('*')
                    .eq('user_id', currentUser.id);

                if (error) throw error;

                currentStickers = data || [];
                renderStickers();
                
                document.getElementById('stickerCounter').textContent = 
                    `${currentStickers.length}/${maxStickers}`;

                const grid = document.getElementById('stickersGrid');
                if (currentStickers.length === 0) {
                    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#8b93a6; padding:20px;">нет стикеров</div>';
                } else {
                    let gridHtml = '';
                    currentStickers.forEach(sticker => {
                        gridHtml += `
                            <div class="sticker-item">
                                <img src="${sticker.sticker_url}" alt="Стикер">
                                <div class="sticker-rarity">${sticker.rarity || 'обычный'}</div>
                            </div>
                        `;
                    });
                    grid.innerHTML = gridHtml;
                }

            } catch (error) {
                console.error('Ошибка загрузки стикеров:', error);
            }
        }

        function renderStickers() {
            const container = document.getElementById('avatarContainer');
            
            const existingStickers = container.querySelectorAll('.sticker, .sticker-remove');
            existingStickers.forEach(s => s.remove());

            currentStickers.forEach((sticker, index) => {
                const stickerEl = document.createElement('img');
                stickerEl.src = sticker.sticker_url;
                stickerEl.className = `sticker ${sticker.position || stickerPositions[index]}`;
                stickerEl.onerror = () => stickerEl.remove();
                
                const removeBtn = document.createElement('div');
                removeBtn.className = 'sticker-remove';
                removeBtn.innerHTML = '✕';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeSticker(sticker.id);
                };
                
                container.appendChild(stickerEl);
                container.appendChild(removeBtn);
            });
            
            document.getElementById('stickerCounter').textContent = 
                `${currentStickers.length}/${maxStickers}`;
            saveProfileToLocalStorage();
        }

        async function addStickerByUrl() {
            const urlInput = document.getElementById('stickerUrlInput');
            const url = urlInput.value.trim();
            
            if (!url) {
                showMessage('введите url стикера', 'error');
                return;
            }

            if (currentStickers.length >= maxStickers) {
                showMessage(`лимит стикеров: ${maxStickers}`, 'error');
                return;
            }

            try {
                const newSticker = {
                    user_id: currentUser.id,
                    sticker_url: url,
                    position: stickerPositions[currentStickers.length],
                    rarity: 'обычный'
                };

                const { data, error } = await supabaseClient
                    .from('user_stickers')
                    .insert(newSticker)
                    .select()
                    .single();

                if (error) throw error;

                currentStickers.push(data);
                renderStickers();
                urlInput.value = '';
                saveProfileToLocalStorage();
                showMessage('✅ стикер добавлен', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        }

        async function removeSticker(stickerId) {
            try {
                const { error } = await supabaseClient
                    .from('user_stickers')
                    .delete()
                    .eq('id', stickerId);

                if (error) throw error;

                currentStickers = currentStickers.filter(s => s.id !== stickerId);
                renderStickers();
                saveProfileToLocalStorage();
                showMessage('стикер удален', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ОБНОВЛЕНИЕ ИМЕНИ
        // ============================================
        window.updateDisplayName = async function() {
            const newName = prompt('виртуальное имя:', 
                currentUser.display_name || currentUser.nickname);
            
            if (newName === null) return;
            
            try {
                const displayName = newName.trim() || currentUser.nickname;
                
                const { error } = await supabaseClient
                    .from('users')
                    .update({ display_name: displayName })
                    .eq('id', currentUser.id);

                if (error) throw error;

                currentUser.display_name = displayName;
                document.getElementById('userNickname').textContent = displayName;
                saveProfileToLocalStorage();
                showMessage('✅ имя обновлено', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        };

        window.updateClass = async function() {
            const classes = ['7А', '7Б', '8А', '8Б', '9А', '9Б', '10А', '11А'];
            const currentClass = currentUser.class;
            
            const newClass = prompt(`класс (${classes.join(', ')}):`, currentClass);
            
            if (!newClass || !classes.includes(newClass)) {
                showMessage('выберите класс из списка', 'error');
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('users')
                    .update({ class: newClass })
                    .eq('id', currentUser.id);

                if (error) throw error;

                currentUser.class = newClass;
                document.getElementById('userClass').textContent = newClass;
                saveProfileToLocalStorage();
                showMessage('✅ класс обновлен', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        };

        // ============================================
        // СМЕНА АВАТАРА
        // ============================================
        async function changeAvatar() {
            const url = prompt('url новой аватарки:', currentUser.avatar_url);
            if (!url) return;

            try {
                const { error } = await supabaseClient
                    .from('users')
                    .update({ avatar_url: url })
                    .eq('id', currentUser.id);

                if (error) throw error;

                document.getElementById('avatar').src = url;
                document.getElementById('miniAvatar').src = url;
                currentUser.avatar_url = url;
                saveProfileToLocalStorage();
                showMessage('✅ аватар обновлен', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ОБНОВЛЕНИЕ СТАТУСА
        // ============================================
        async function updateStatus() {
            const status = document.getElementById('statusInput').value.trim();
            
            if (status.length > 50) {
                showMessage('максимум 50 символов', 'error');
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('users')
                    .update({ status: status })
                    .eq('id', currentUser.id);

                if (error) throw error;

                currentUser.status = status;
                document.getElementById('statusDisplay').textContent = status || 'Статус не установлен';
                document.getElementById('statusInput').value = '';
                saveProfileToLocalStorage();
                showMessage('✅ статус обновлен', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ПРОВЕРКА АВТОРИЗАЦИИ
        // ============================================
        async function checkAuth() {
            const userId = localStorage.getItem('userId');
            
            if (!userId) {
                window.location.href = 'https://ggfh-becouse.github.io/school62-vote/login.html';
                return;
            }

            try {
                loadProfileFromLocalStorage();

                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error || !data) {
                    localStorage.clear();
                    window.location.href = 'https://ggfh-becouse.github.io/school62-vote/login.html';
                    return;
                }

                currentUser = data;
                await checkPrimeStatus();
                
                maxStickers = currentUser.is_prime ? 5 : 1;
                
                document.getElementById('userNickname').textContent = currentUser.display_name || currentUser.nickname;
                document.getElementById('userClass').textContent = currentUser.class || 'класс не указан';
                document.getElementById('userPrime').textContent = currentUser.is_prime ? 'prime' : 'обычный';
                
                const avatarUrl = currentUser.avatar_url || 'https://i.pravatar.cc/300';
                document.getElementById('avatar').src = avatarUrl;
                document.getElementById('miniAvatar').src = avatarUrl;
                
                document.getElementById('statusDisplay').textContent = currentUser.status || 'Статус не установлен';
                
                await Promise.all([
                    loadStickers(),
                    loadFriends()
                ]);
                
                saveProfileToLocalStorage();

            } catch (error) {
                console.error('Ошибка:', error);
                localStorage.clear();
                window.location.href = 'https://ggfh-becouse.github.io/school62-vote/login.html';
            }
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();

            // Обработчики
            document.getElementById('addStickerByUrlBtn').addEventListener('click', addStickerByUrl);
            document.getElementById('changeAvatarBtn').addEventListener('click', changeAvatar);
            document.getElementById('updateStatusBtn').addEventListener('click', updateStatus);
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.clear();
                window.location.href = 'https://ggfh-becouse.github.io/school62-vote/login.html';
            });

            // Enter для полей
            document.getElementById('stickerUrlInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addStickerByUrl();
            });
            
            document.getElementById('statusInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') updateStatus();
            });
        });
    </script>
</body>
</html>
