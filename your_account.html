<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Мой профиль - Школа №62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif !important;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
        }

        /* Шапка */
        .header {
            background: linear-gradient(145deg, #4a6fa5 0%, #2c3e50 100%);
            border-radius: 24px;
            padding: 12px 20px;
            margin: 16px;
            box-shadow: 0 6px 0 #1a2a3a;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .school-badge {
            background: #ffd966;
            color: #2c3e50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            border-bottom: 3px solid #b38f4a;
        }

        .main-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 3px solid rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-item.active {
            background: #ffd966;
            color: #2c3e50;
            border-bottom-color: #b38f4a;
        }

        .nav-icon {
            font-size: 1.1rem;
        }

        /* Основной контент профиля */
        .profile-content {
            padding: 0 16px 30px 16px;
        }

        /* Информация о пользователе */
        .user-info-bar {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #e0e0e0;
        }

        .user-info-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-nickname {
            font-size: 1.4rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .user-class {
            background: #4a6fa5;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            border-bottom: 3px solid #2c3e50;
        }

        .user-prime {
            background: #ffd966;
            color: #2c3e50;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            border-bottom: 3px solid #b38f4a;
        }

        .logout-btn {
            background: #e0e0e0;
            color: #2c3e50;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #b0b0b0;
            transition: all 0.1s;
        }

        .logout-btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        /* Блок с кнопкой просмотра */
        .view-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .view-profile-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #2c3e50;
            transition: all 0.1s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .view-profile-btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        /* Профиль */
        .profile-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            border: 2px solid #e0e0e0;
            box-shadow: 0 4px 0 #c0c0c0;
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        /* Аватар со стикерами */
        .avatar-container {
            position: relative;
            width: 200px;
            height: 200px;
            flex-shrink: 0;
        }

        .avatar-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
            border: 3px solid #4a6fa5;
            box-shadow: 0 4px 0 #2c3e50;
            transition: all 0.3s;
        }

        /* Рамки */
        .avatar-frame-neon {
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 22px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 15px #00ff88, 0 4px 0 #00aa55;
            pointer-events: none;
        }

        .avatar-frame-gold {
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 22px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 15px #ffd700, 0 4px 0 #b38f4a;
            pointer-events: none;
        }

        .avatar-frame-event {
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 22px;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 15px #ff6b6b, 0 4px 0 #c0392b;
            pointer-events: none;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
            background-size: 200% 200%;
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .sticker {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            cursor: move;
            transition: transform 0.2s;
            z-index: 5;
        }

        .sticker:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .sticker-remove {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: #c0392b;
            color: white;
            border-radius: 10px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-bottom: 2px solid #962d22;
            z-index: 15;
        }

        /* Позиции для стикеров */
        .sticker-pos-1 { top: -10px; left: -10px; }
        .sticker-pos-2 { top: -10px; right: -10px; }
        .sticker-pos-3 { bottom: -10px; left: -10px; }
        .sticker-pos-4 { bottom: -10px; right: -10px; }
        .sticker-pos-5 { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .sticker-pos-6 { top: -10px; left: 50%; transform: translateX(-50%); }
        .sticker-pos-7 { bottom: -10px; left: 50%; transform: translateX(-50%); }
        .sticker-pos-8 { left: -10px; top: 50%; transform: translateY(-50%); }
        .sticker-pos-9 { right: -10px; top: 50%; transform: translateY(-50%); }

        .avatar-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
        }

        .change-avatar-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #2c3e50;
            width: fit-content;
        }

        .change-avatar-btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        /* Статус */
        .status-section {
            margin-bottom: 20px;
        }

        .status-display {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px 15px;
            border-left: 4px solid #4a6fa5;
            margin-bottom: 10px;
            font-style: italic;
            color: #34495e;
        }

        .status-input {
            display: flex;
            gap: 10px;
        }

        .status-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
        }

        .status-input input:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .status-input button {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #2c3e50;
        }

        .status-input button:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        /* Рамки */
        .frames-section {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        .frames-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .frames-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .frame-option {
            background: white;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .frame-option:hover {
            border-color: #4a6fa5;
            transform: translateY(-2px);
        }

        .frame-option.active {
            border-color: #4a6fa5;
            background: #eef2f7;
        }

        .frame-preview {
            width: 50px;
            height: 50px;
            margin: 0 auto 5px;
            border-radius: 10px;
        }

        .frame-preview.standard { background: #4a6fa5; }
        .frame-preview.neon { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .frame-preview.gold { background: #ffd700; box-shadow: 0 0 10px #ffd700; }
        .frame-preview.event { background: linear-gradient(45deg, #ff6b6b, #ffd700); }

        /* Секция стикеров */
        .stickers-section {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        .stickers-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sticker-url-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .sticker-url-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
        }

        .sticker-url-input input:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .sticker-url-input button {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #2c3e50;
        }

        .sticker-url-input button:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .sticker-item {
            background: white;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sticker-item:hover {
            border-color: #4a6fa5;
            transform: translateY(-2px);
        }

        .sticker-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 5px;
        }

        .sticker-rarity {
            font-size: 0.7rem;
            color: #7f8c8d;
        }

        .sticker-rarity.rare { color: #f1c40f; }
        .sticker-rarity.event { color: #e74c3c; }

        .sticker-counter {
            color: #4a6fa5;
            font-weight: 600;
        }

        /* Музыкальный блок */
        .music-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e0e0e0;
        }

        .music-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .track-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .track-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
        }

        .track-input input:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .track-input button {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #2c3e50;
        }

        .track-input button:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        .mini-player {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #e0e0e0;
        }

        .track-cover {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #4a6fa5;
        }

        .track-info {
            flex: 1;
        }

        .track-title {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 4px;
        }

        .track-artist {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .track-play {
            background: #4a6fa5;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
            border-bottom: 3px solid #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track-play:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        .track-remove {
            background: #e0e0e0;
            color: #2c3e50;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            border-bottom: 2px solid #b0b0b0;
        }

        /* Реакции */
        .reactions-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .reactions-title {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .reactions-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .reaction-btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .reaction-btn:hover {
            border-color: #4a6fa5;
            transform: translateY(-2px);
        }

        .reaction-count {
            font-size: 0.9rem;
            color: #2c3e50;
            font-weight: 600;
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10001;
            animation: slideIn 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }

        /* Адаптивность */
        @media (max-width: 600px) {
            .profile-header {
                justify-content: center;
                text-align: center;
            }
            
            .avatar-actions {
                align-items: center;
            }
            
            .track-input, .sticker-url-input, .status-input {
                flex-direction: column;
            }
            
            .mini-player {
                flex-wrap: wrap;
                justify-content: center;
            }

            .user-info-bar {
                flex-direction: column;
                text-align: center;
            }

            .user-info-left {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->
        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>ШКОЛЬНАЯ СТЕНА</h1>
                    <span class="school-badge">№62</span>
                </div>
                
                <nav class="main-nav">
                    <a href="index.html" class="nav-item">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-text">Главная</span>
                    </a>
                    
                    <a href="threads.html" class="nav-item">
                        <span class="nav-icon">💬</span>
                        <span class="nav-text">Темки</span>
                    </a>
                    
                    <a href="your_account.html" class="nav-item active">
                        <span class="nav-icon">👤</span>
                        <span class="nav-text">Профиль</span>
                    </a>
                </nav>
            </div>
        </div>

        <div class="profile-content">
            <!-- Информация о пользователе -->
            <div class="user-info-bar" id="userInfoBar">
                <div class="user-info-left">
                    <span class="user-nickname" id="userNickname">Загрузка...</span>
                    <span class="user-class" id="userClass"></span>
                    <span class="user-prime" id="userPrime">👑 Обычный</span>
                </div>
                <button class="logout-btn" id="logoutBtn">Выйти</button>
            </div>

            <!-- Кнопка просмотра со стороны -->
            <div class="view-actions">
                <button class="view-profile-btn" id="viewProfileBtn">
                    <span>👁️</span> Посмотреть профиль со стороны
                </button>
            </div>

            <!-- Профиль -->
            <div class="profile-card">
                <div class="profile-header">
                    <!-- Аватар со стикерами -->
                    <div class="avatar-container" id="avatarContainer">
                        <div class="avatar-wrapper">
                            <img src="https://i.pravatar.cc/300" class="avatar" id="avatar" alt="Аватар">
                            <div id="avatarFrame"></div>
                        </div>
                        <!-- Стикеры будут добавляться сюда -->
                    </div>

                    <!-- Кнопки управления аватаром -->
                    <div class="avatar-actions">
                        <button class="change-avatar-btn" id="changeAvatarBtn">
                            <span>📷</span> Сменить аватар
                        </button>
                    </div>
                </div>

                <!-- Статус -->
                <div class="status-section">
                    <div class="status-display" id="statusDisplay">Статус не установлен</div>
                    <div class="status-input">
                        <input type="text" id="statusInput" placeholder="Введите статус (до 50 символов)" maxlength="50">
                        <button id="updateStatusBtn">Обновить</button>
                    </div>
                </div>

                <!-- Рамки -->
                <div class="frames-section">
                    <h3><span>🖼️</span> Рамки для аватарки</h3>
                    <div class="frames-grid" id="framesGrid">
                        <div class="frame-option" onclick="selectFrame('standard')">
                            <div class="frame-preview standard"></div>
                            <div>Обычная</div>
                        </div>
                        <div class="frame-option" onclick="selectFrame('neon')">
                            <div class="frame-preview neon"></div>
                            <div>Неоновая</div>
                        </div>
                        <div class="frame-option" onclick="selectFrame('gold')">
                            <div class="frame-preview gold"></div>
                            <div>Золотая</div>
                            <div style="font-size: 0.7rem; color: #f1c40f;">Prime</div>
                        </div>
                        <div class="frame-option" onclick="selectFrame('event')">
                            <div class="frame-preview event"></div>
                            <div>Ивентовая</div>
                        </div>
                    </div>
                </div>

                <!-- Секция стикеров -->
                <div class="stickers-section">
                    <h3>
                        <span>✨</span> Мои стикеры 
                        <span class="sticker-counter" id="stickerCounter">0/1</span>
                    </h3>
                    
                    <div class="sticker-url-input">
                        <input type="text" id="stickerUrlInput" placeholder="Вставьте URL стикера (jpg, png, gif)">
                        <button id="addStickerByUrlBtn">Добавить</button>
                    </div>

                    <div class="stickers-grid" id="stickersGrid"></div>
                    
                    <p style="color: #7f8c8d; font-size: 0.85rem;">
                        👑 Prime-аккаунт: до 5 стикеров. Нажмите на стикер, чтобы добавить.
                    </p>
                </div>

                <!-- Музыкальный блок -->
                <div class="music-section">
                    <h3><span>🎵</span> Мой трек</h3>
                    <div class="track-input">
                        <input type="text" id="trackUrl" placeholder="Ссылка на трек (Spotify, YouTube, Яндекс.Музыка)">
                        <button id="addTrackBtn">Добавить</button>
                    </div>
                    <div id="playerContainer"></div>
                </div>

                <!-- Реакции на профиль -->
                <div class="reactions-section">
                    <div class="reactions-title">Реакции на профиль</div>
                    <div class="reactions-grid" id="reactionsGrid">
                        <div class="reaction-btn" onclick="addReaction('❤️')">❤️ <span class="reaction-count" id="reaction-❤️">0</span></div>
                        <div class="reaction-btn" onclick="addReaction('🔥')">🔥 <span class="reaction-count" id="reaction-🔥">0</span></div>
                        <div class="reaction-btn" onclick="addReaction('😎')">😎 <span class="reaction-count" id="reaction-😎">0</span></div>
                        <div class="reaction-btn" onclick="addReaction('🤡')">🤡 <span class="reaction-count" id="reaction-🤡">0</span></div>
                        <div class="reaction-btn" onclick="addReaction('💀')">💀 <span class="reaction-count" id="reaction-💀">0</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================
        // СОСТОЯНИЕ
        // ============================================
        let currentUser = null;
        let currentStickers = [];
        let maxStickers = 1; // Обычный аккаунт
        let currentFrame = 'standard';

        const stickerPositions = [
            'sticker-pos-1', 'sticker-pos-2', 'sticker-pos-3', 'sticker-pos-4', 'sticker-pos-5',
            'sticker-pos-6', 'sticker-pos-7', 'sticker-pos-8', 'sticker-pos-9'
        ];

        // ============================================
        // ПРОВЕРКА АВТОРИЗАЦИИ
        // ============================================
        async function checkAuth() {
            const userId = localStorage.getItem('userId');
            
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error || !data) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                    return;
                }

                currentUser = data;
                maxStickers = data.is_prime ? 5 : 1;
                
                // Загружаем данные
                document.getElementById('userNickname').textContent = data.nickname;
                document.getElementById('userClass').textContent = data.class;
                document.getElementById('userPrime').textContent = data.is_prime ? '👑 Prime' : '👑 Обычный';
                document.getElementById('avatar').src = data.avatar_url || 'https://i.pravatar.cc/300';
                document.getElementById('statusDisplay').textContent = data.status || 'Статус не установлен';
                
                await loadStickers();
                await loadReactions();
                await loadMusic();
                
            } catch (error) {
                console.error('Ошибка:', error);
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }

        // ============================================
        // ЗАГРУЗКА СТИКЕРОВ
        // ============================================
        async function loadStickers() {
            try {
                const { data, error } = await supabaseClient
                    .from('user_stickers')
                    .select('*')
                    .eq('user_id', currentUser.id);

                if (error) throw error;

                currentStickers = data || [];
                renderStickers();
                
                document.getElementById('stickerCounter').textContent = 
                    `${currentStickers.length}/${maxStickers}`;

            } catch (error) {
                console.error('Ошибка загрузки стикеров:', error);
            }
        }

        // ============================================
        // ДОБАВЛЕНИЕ СТИКЕРА ПО URL
        // ============================================
        async function addStickerByUrl() {
            const urlInput = document.getElementById('stickerUrlInput');
            const url = urlInput.value.trim();
            
            if (!url) {
                showMessage('Введите URL стикера', 'error');
                return;
            }

            if (currentStickers.length >= maxStickers) {
                showMessage(`Достигнут лимит стикеров (${maxStickers})`, 'error');
                return;
            }

            try {
                const newSticker = {
                    user_id: currentUser.id,
                    sticker_url: url,
                    position: stickerPositions[currentStickers.length],
                    rarity: 'common'
                };

                const { data, error } = await supabaseClient
                    .from('user_stickers')
                    .insert(newSticker)
                    .select()
                    .single();

                if (error) throw error;

                currentStickers.push(data);
                renderStickers();
                urlInput.value = '';
                
                showMessage('✅ Стикер добавлен!', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // УДАЛЕНИЕ СТИКЕРА
        // ============================================
        async function removeSticker(stickerId) {
            try {
                const { error } = await supabaseClient
                    .from('user_stickers')
                    .delete()
                    .eq('id', stickerId);

                if (error) throw error;

                currentStickers = currentStickers.filter(s => s.id !== stickerId);
                renderStickers();
                showMessage('Стикер удален', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ОТОБРАЖЕНИЕ СТИКЕРОВ
        // ============================================
        function renderStickers() {
            const container = document.getElementById('avatarContainer');
            
            // Удаляем старые стикеры (оставляем только аватар и рамку)
            while (container.children.length > 1) {
                container.removeChild(container.lastChild);
            }

            currentStickers.forEach((sticker, index) => {
                const stickerWrapper = document.createElement('div');
                stickerWrapper.style.position = 'relative';
                stickerWrapper.style.display = 'contents';
                
                const stickerEl = document.createElement('img');
                stickerEl.src = sticker.sticker_url;
                stickerEl.className = `sticker ${sticker.position || stickerPositions[index]}`;
                stickerEl.onerror = () => stickerEl.remove();
                
                const removeBtn = document.createElement('div');
                removeBtn.className = 'sticker-remove';
                removeBtn.innerHTML = '✕';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeSticker(sticker.id);
                };
                
                container.appendChild(stickerEl);
                container.appendChild(removeBtn);
            });
            
            document.getElementById('stickerCounter').textContent = 
                `${currentStickers.length}/${maxStickers}`;
        }

        // ============================================
        // ВЫБОР РАМКИ
        // ============================================
        function selectFrame(frameType) {
            currentFrame = frameType;
            const frameDiv = document.getElementById('avatarFrame');
            
            const frames = {
                standard: '',
                neon: '<div class="avatar-frame-neon"></div>',
                gold: '<div class="avatar-frame-gold"></div>',
                event: '<div class="avatar-frame-event"></div>'
            };
            
            frameDiv.innerHTML = frames[frameType] || '';
            
            document.querySelectorAll('.frame-option').forEach(el => {
                el.classList.remove('active');
            });
            event.target.closest('.frame-option').classList.add('active');
        }

        // ============================================
        // ОБНОВЛЕНИЕ СТАТУСА
        // ============================================
        async function updateStatus() {
            const status = document.getElementById('statusInput').value.trim();
            
            if (status.length > 50) {
                showMessage('Максимум 50 символов', 'error');
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('users')
                    .update({ status: status })
                    .eq('id', currentUser.id);

                if (error) throw error;

                currentUser.status = status;
                document.getElementById('statusDisplay').textContent = status || 'Статус не установлен';
                document.getElementById('statusInput').value = '';
                
                showMessage('✅ Статус обновлен!', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // СМЕНА АВАТАРА
        // ============================================
        async function changeAvatar() {
            const url = prompt('Введите URL новой аватарки:', currentUser.avatar_url);
            if (!url) return;

            try {
                const { error } = await supabaseClient
                    .from('users')
                    .update({ avatar_url: url })
                    .eq('id', currentUser.id);

                if (error) throw error;

                document.getElementById('avatar').src = url;
                currentUser.avatar_url = url;
                showMessage('✅ Аватар обновлен!', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ПАРСИНГ МУЗЫКАЛЬНОЙ ССЫЛКИ
        // ============================================
        async function parseMusicUrl(url) {
            // Здесь будет парсинг ссылок Spotify, YouTube и т.д.
            // Пока демо-версия
            return {
                title: 'Тестовый трек',
                artist: 'Исполнитель',
                cover: 'https://i.scdn.co/image/ab67616d0000b273c8b5c9c3b5c9c3b5c9c3b5c9',
                url: url
            };
        }

        // ============================================
        // ДОБАВЛЕНИЕ ТРЕКА
        // ============================================
        async function addTrack() {
            const url = document.getElementById('trackUrl').value.trim();
            if (!url) {
                showMessage('Введите ссылку на трек', 'error');
                return;
            }

            try {
                const musicData = await parseMusicUrl(url);
                
                const { error } = await supabaseClient
                    .from('users')
                    .update({ 
                        music_url: url,
                        music_data: musicData
                    })
                    .eq('id', currentUser.id);

                if (error) throw error;

                renderPlayer(musicData);
                document.getElementById('trackUrl').value = '';
                showMessage('✅ Трек добавлен!', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ЗАГРУЗКА МУЗЫКИ
        // ============================================
        async function loadMusic() {
            if (currentUser.music_data) {
                renderPlayer(currentUser.music_data);
            }
        }

        // ============================================
        // ОТОБРАЖЕНИЕ ПЛЕЕРА
        // ============================================
        function renderPlayer(track) {
            const container = document.getElementById('playerContainer');
            
            container.innerHTML = `
                <div class="mini-player">
                    <img src="${track.cover}" class="track-cover" alt="Обложка">
                    <div class="track-info">
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                    </div>
                    <button class="track-play" onclick="playTrack('${track.url}')">▶</button>
                    <button class="track-remove" onclick="removeTrack()">Удалить</button>
                </div>
            `;
        }

        function playTrack(url) {
            window.open(url, '_blank');
        }

        async function removeTrack() {
            try {
                const { error } = await supabaseClient
                    .from('users')
                    .update({ music_url: null, music_data: null })
                    .eq('id', currentUser.id);

                if (error) throw error;

                document.getElementById('playerContainer').innerHTML = '';
                showMessage('Трек удален', 'success');

            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // РЕАКЦИИ
        // ============================================
        async function loadReactions() {
            try {
                const { data, error } = await supabaseClient
                    .from('profile_reactions')
                    .select('*')
                    .eq('user_id', currentUser.id);

                if (error) throw error;

                data?.forEach(r => {
                    const el = document.getElementById(`reaction-${r.reaction}`);
                    if (el) el.textContent = r.count;
                });

            } catch (error) {
                console.error('Ошибка загрузки реакций:', error);
            }
        }

        async function addReaction(reaction) {
            try {
                const { data, error } = await supabaseClient
                    .from('profile_reactions')
                    .upsert({
                        user_id: currentUser.id,
                        reaction: reaction,
                        count: supabaseClient.rpc('increment', { x: 1 })
                    })
                    .select()
                    .single();

                if (error) throw error;

                const el = document.getElementById(`reaction-${reaction}`);
                if (el) el.textContent = data.count;

            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        // ============================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================
        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();

            // Обработчики
            document.getElementById('addStickerByUrlBtn').addEventListener('click', addStickerByUrl);
            document.getElementById('changeAvatarBtn').addEventListener('click', changeAvatar);
            document.getElementById('updateStatusBtn').addEventListener('click', updateStatus);
            document.getElementById('addTrackBtn').addEventListener('click', addTrack);
            document.getElementById('viewProfileBtn').addEventListener('click', () => {
                window.open(`check_account.html?id=${currentUser.id}`, '_blank');
            });
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.clear();
                window.location.href = 'login.html';
            });

            // Enter для полей ввода
            document.getElementById('stickerUrlInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addStickerByUrl();
            });
            
            document.getElementById('statusInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') updateStatus();
            });
            
            document.getElementById('trackUrl').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTrack();
            });
        });
    </script>
</body>
</html>
