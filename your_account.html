<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Мой профиль - Школа №62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif !important;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
        }

        /* Шапка */
        .header {
            background: linear-gradient(145deg, #4a6fa5 0%, #2c3e50 100%);
            border-radius: 24px;
            padding: 12px 20px;
            margin: 16px;
            box-shadow: 0 6px 0 #1a2a3a;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .school-badge {
            background: #ffd966;
            color: #2c3e50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            border-bottom: 3px solid #b38f4a;
        }

        .main-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 3px solid rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-item.active {
            background: #ffd966;
            color: #2c3e50;
            border-bottom-color: #b38f4a;
        }

        .nav-icon {
            font-size: 1.1rem;
        }

        /* Основной контент профиля */
        .profile-content {
            padding: 0 16px 30px 16px;
        }

        /* Блок с кнопкой просмотра */
        .view-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .view-profile-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #2c3e50;
            transition: all 0.1s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .view-profile-btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        /* Профиль */
        .profile-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            border: 2px solid #e0e0e0;
            box-shadow: 0 4px 0 #c0c0c0;
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        /* Аватар со стикерами */
        .avatar-container {
            position: relative;
            width: 200px;
            height: 200px;
            flex-shrink: 0;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
            border: 3px solid #4a6fa5;
            box-shadow: 0 4px 0 #2c3e50;
        }

        .sticker {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            cursor: move;
            transition: transform 0.2s;
        }

        .sticker:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .sticker-remove {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: #c0392b;
            color: white;
            border-radius: 10px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-bottom: 2px solid #962d22;
        }

        /* Позиции для стикеров */
        .sticker-pos-1 { top: -10px; left: -10px; }
        .sticker-pos-2 { top: -10px; right: -10px; }
        .sticker-pos-3 { bottom: -10px; left: -10px; }
        .sticker-pos-4 { bottom: -10px; right: -10px; }
        .sticker-pos-5 { top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .avatar-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
        }

        .change-avatar-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #2c3e50;
            width: fit-content;
        }

        .change-avatar-btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        .prime-badge {
            background: #ffd966;
            color: #2c3e50;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            border-bottom: 2px solid #b38f4a;
            width: fit-content;
        }

        /* Секция стикеров */
        .stickers-section {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }

        .stickers-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .sticker-item {
            background: white;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sticker-item:hover {
            border-color: #4a6fa5;
            transform: translateY(-2px);
        }

        .sticker-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 5px;
        }

        .sticker-item span {
            font-size: 0.7rem;
            color: #7f8c8d;
        }

        .sticker-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sticker-counter {
            color: #4a6fa5;
            font-weight: 600;
        }

        /* Музыкальный блок */
        .music-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e0e0e0;
        }

        .music-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .track-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .track-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
        }

        .track-input input:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .track-input button {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #2c3e50;
        }

        .track-input button:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        /* Мини-плеер */
        .mini-player {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #e0e0e0;
        }

        .track-cover {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #4a6fa5;
        }

        .track-info {
            flex: 1;
        }

        .track-title {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 4px;
        }

        .track-artist {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .track-play {
            background: #4a6fa5;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
            border-bottom: 3px solid #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track-play:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        .track-remove {
            background: #e0e0e0;
            color: #2c3e50;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            border-bottom: 2px solid #b0b0b0;
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10001;
            animation: slideIn 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }

        /* Адаптивность */
        @media (max-width: 600px) {
            .profile-header {
                justify-content: center;
                text-align: center;
            }
            
            .avatar-actions {
                align-items: center;
            }
            
            .track-input {
                flex-direction: column;
            }
            
            .mini-player {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->
        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>ШКОЛЬНАЯ СТЕНА</h1>
                    <span class="school-badge">№62</span>
                </div>
                
                <nav class="main-nav">
                    <a href="index.html" class="nav-item">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-text">Главная</span>
                    </a>
                    
                    <a href="threads.html" class="nav-item">
                        <span class="nav-icon">💬</span>
                        <span class="nav-text">Темки</span>
                    </a>
                    
                    <a href="your_account.html" class="nav-item active">
                        <span class="nav-icon">👤</span>
                        <span class="nav-text">Профиль</span>
                    </a>
                </nav>
            </div>
        </div>

        <div class="profile-content">
            <!-- Кнопка просмотра со стороны -->
            <div class="view-actions">
                <a href="check_account.html" class="view-profile-btn">
                    <span>👁️</span> Посмотреть профиль со стороны
                </a>
            </div>

            <!-- Профиль -->
            <div class="profile-card">
                <div class="profile-header">
                    <!-- Аватар со стикерами -->
                    <div class="avatar-container" id="avatarContainer">
                        <img src="https://i.pravatar.cc/300" class="avatar" id="avatar" alt="Аватар">
                        <!-- Стикеры будут добавляться сюда -->
                    </div>

                    <!-- Кнопки управления аватаром -->
                    <div class="avatar-actions">
                        <button class="change-avatar-btn" id="changeAvatarBtn">
                            <span>📷</span> Сменить аватар
                        </button>
                        <div class="prime-badge" id="primeBadge">
                            👑 Обычный аккаунт (1/5 стикеров)
                        </div>
                    </div>
                </div>

              <!-- Секция стикеров -->
<div class="stickers-section">
    <h3>
        <span>✨</span> Мои стикеры 
        <span class="sticker-counter" id="stickerCounter">1/5</span>
    </h3>
    
    <!-- Добавьте это поле для ввода URL -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="stickerUrlInput" 
               placeholder="Вставьте URL стикера" 
               style="flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px;">
        <button id="addStickerByUrlBtn" 
                style="background: #4a6fa5; color: white; border: none; padding: 12px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; border-bottom: 3px solid #2c3e50;">
            Добавить
        </button>
    </div>

    <div class="stickers-grid" id="stickersGrid">
        <!-- Стикеры будут здесь -->
    </div>
</div>

                <!-- Музыкальный блок -->
                <div class="music-section">
                    <h3><span>🎵</span> Мой трек</h3>
                    <div class="track-input">
                        <input type="text" id="trackUrl" placeholder="Вставьте ссылку на трек (Spotify, YouTube, Яндекс.Музыка)">
                        <button id="addTrackBtn">Добавить</button>
                    </div>
                    <div id="playerContainer">
                        <!-- Плеер появится здесь -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="messageContainer"></div>

   <script>
    // ============================================
    // СОСТОЯНИЕ ПРОФИЛЯ
    // ============================================
    let isPrime = false; // Обычный аккаунт
    let maxStickers = isPrime ? 5 : 1;
    let currentStickers = [];
    let currentTrack = null;

    // Позиции для стикеров
    const stickerPositions = [
        'sticker-pos-1', 'sticker-pos-2', 'sticker-pos-3', 'sticker-pos-4', 'sticker-pos-5'
    ];

    // ============================================
    // ФУНКЦИИ ПОКАЗА СООБЩЕНИЙ
    // ============================================
    function showMessage(text, type) {
        const container = document.getElementById('messageContainer');
        const msg = document.createElement('div');
        msg.className = `message ${type}`;
        msg.textContent = text;
        container.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
    }

    // ============================================
    // ДОБАВЛЕНИЕ СТИКЕРА ПО URL
    // ============================================
    function addStickerByUrl() {
        const urlInput = document.getElementById('stickerUrlInput');
        const url = urlInput.value.trim();
        
        if (!url) {
            showMessage('Введите URL стикера', 'error');
            return;
        }
        
        // Проверяем, что это похоже на URL картинки
        if (!url.match(/\.(jpg|jpeg|png|gif|webp|svg)$/i) && !url.includes('http')) {
            showMessage('Пожалуйста, введите прямую ссылку на картинку', 'error');
            return;
        }
        
        // Проверяем лимит
        if (currentStickers.length >= maxStickers) {
            showMessage(`Достигнут лимит стикеров (${maxStickers})`, 'error');
            return;
        }
        
        // Создаем новый стикер
        const newSticker = {
            id: Date.now(), // уникальный ID на основе времени
            url: url,
            name: 'Стикер',
            position: stickerPositions[currentStickers.length]
        };
        
        currentStickers.push(newSticker);
        renderStickers();
        
        // Очищаем поле ввода
        urlInput.value = '';
        
        showMessage('Стикер добавлен!', 'success');
    }

    // ============================================
    // УДАЛЕНИЕ СТИКЕРА
    // ============================================
    function removeSticker(stickerId) {
        currentStickers = currentStickers.filter(s => s.id !== stickerId);
        renderStickers();
        showMessage('Стикер удален', 'success');
    }

    // ============================================
    // ОТОБРАЖЕНИЕ СТИКЕРОВ
    // ============================================
    function renderStickers() {
        const container = document.getElementById('avatarContainer');
        
        // Удаляем старые стикеры (оставляем только аватар)
        while (container.children.length > 1) {
            container.removeChild(container.lastChild);
        }

        // Добавляем новые стикеры
        currentStickers.forEach((sticker, index) => {
            const stickerEl = document.createElement('img');
            stickerEl.src = sticker.url;
            stickerEl.className = `sticker ${stickerPositions[index]}`;
            stickerEl.draggable = false;
            
            // Кнопка удаления
            const removeBtn = document.createElement('div');
            removeBtn.className = 'sticker-remove';
            removeBtn.innerHTML = '✕';
            removeBtn.onclick = (e) => {
                e.stopPropagation();
                removeSticker(sticker.id);
            };
            
            const stickerWrapper = document.createElement('div');
            stickerWrapper.style.position = 'relative';
            stickerWrapper.style.display = 'contents';
            stickerWrapper.appendChild(stickerEl);
            stickerWrapper.appendChild(removeBtn);
            
            container.appendChild(stickerWrapper);
        });
        
        // Обновляем счетчик
        document.getElementById('stickerCounter').textContent = `${currentStickers.length}/${maxStickers}`;
    }

    // ============================================
    // ПАРСИНГ ССЫЛКИ НА ТРЕК
    // ============================================
    function parseTrack(url) {
        return {
            title: 'Тестовый трек',
            artist: 'Исполнитель',
            cover: 'https://i.scdn.co/image/ab67616d0000b273c8b5c9c3b5c9c3b5c9c3b5c9',
            url: url
        };
    }

    // ============================================
    // ОТОБРАЖЕНИЕ ПЛЕЕРА
    // ============================================
    function renderPlayer(track) {
        const container = document.getElementById('playerContainer');
        
        container.innerHTML = `
            <div class="mini-player">
                <img src="${track.cover}" class="track-cover" alt="Обложка">
                <div class="track-info">
                    <div class="track-title">${track.title}</div>
                    <div class="track-artist">${track.artist}</div>
                </div>
                <button class="track-play" onclick="playTrack()">▶</button>
                <button class="track-remove" onclick="removeTrack()">Удалить</button>
            </div>
        `;
    }

    // ============================================
    // УПРАВЛЕНИЕ ТРЕКОМ
    // ============================================
    function playTrack() {
        alert('🎵 Воспроизведение трека (демо-режим)');
    }

    function removeTrack() {
        currentTrack = null;
        document.getElementById('playerContainer').innerHTML = '';
        document.getElementById('trackUrl').value = '';
        showMessage('Трек удален', 'success');
    }

    // ============================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
        // Обработчик добавления стикера по URL
        const addBtn = document.getElementById('addStickerByUrlBtn');
        if (addBtn) {
            addBtn.addEventListener('click', addStickerByUrl);
        }

        // Enter для добавления стикера
        const urlInput = document.getElementById('stickerUrlInput');
        if (urlInput) {
            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addStickerByUrl();
                }
            });
        }

        // Обработчик смены аватара
        document.getElementById('changeAvatarBtn').addEventListener('click', () => {
            const newAvatar = prompt('Введите URL новой аватарки:', 'https://i.pravatar.cc/300');
            if (newAvatar) {
                document.getElementById('avatar').src = newAvatar;
                showMessage('Аватар обновлен!', 'success');
            }
        });

        // Обработчик добавления трека
        document.getElementById('addTrackBtn').addEventListener('click', () => {
            const url = document.getElementById('trackUrl').value.trim();
            if (!url) {
                showMessage('Введите ссылку на трек', 'error');
                return;
            }

            const track = parseTrack(url);
            currentTrack = track;
            renderPlayer(track);
            showMessage('Трек добавлен!', 'success');
        });

        // Enter для добавления трека
        document.getElementById('trackUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('addTrackBtn').click();
            }
        });
    });
</script>
</body>
</html>
