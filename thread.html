<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Школьный форум - Тред</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->
        <div class="header">
            <h1>ШКОЛЬНЫЙ ФОРУМ <small>Школа №62</small></h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">← К списку тем</a>
            </div>
        </div>

        <!-- Статистика пользователя -->
        <div class="user-stats">
            <div class="stat-items">
                <div class="stat-pill">👤 <span id="userId">Гость</span></div>
                <div class="stat-pill">📝 <span id="userMessages">0</span></div>
            </div>
            <div class="school-badge">🏫 Школа №62</div>
        </div>

        <!-- Сообщения -->
        <div id="messageContainer"></div>

        <!-- Основной тред -->
        <div class="thread-container" id="threadContainer">
            <div class="loading">Загрузка треда...</div>
        </div>

        <!-- Форма ответа -->
        <div class="reply-form">
            <h3>✏️ ОТВЕТИТЬ</h3>
            <textarea id="replyContent" class="reply-textarea" placeholder="Напишите ответ..." maxlength="300"></textarea>
            <div class="reply-actions">
                <button class="reply-submit" id="submitReply">📤 Отправить</button>
            </div>
        </div>

        <!-- Список ответов -->
        <div class="replies-section">
            <h3>💬 ОТВЕТЫ</h3>
            <div class="replies-list" id="repliesList">
                <div class="loading">Загрузка ответов...</div>
            </div>
        </div>

        <!-- Подвал -->
        <div class="footer">
            <p>Школьный форум • свободное общение</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script src="thread.js"></script>
</body>
</html>
