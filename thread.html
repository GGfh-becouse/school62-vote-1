<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Форум - Школа 62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ШКОЛЬНЫЙ ФОРУМ</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 Главная</a>
                <a href="threads.html" class="nav-link active">💬 Форум</a>
                <a href="updates.html" class="nav-link">🚀 Обновления</a>
            </div>
        </div>

        <div class="prime-status" id="primeStatus">
            <img src="verified.png" width="20" height="20" id="primeIcon" style="display: none;">
            <span id="primeName"></span>
        </div>

        <div id="messageContainer"></div>

        <!-- СОЗДАНИЕ ТРЕДА -->
        <div class="create-thread">
            <h3>➕ НОВАЯ ТЕМА</h3>
            <input type="text" id="threadTitle" placeholder="Заголовок" maxlength="100">
            <textarea id="threadContent" placeholder="Текст..." maxlength="500"></textarea>
            <button id="createThreadBtn">Создать тему</button>
        </div>

        <!-- ФИЛЬТРЫ -->
        <div class="filters">
            <select id="sortFilter">
                <option value="bump">По активности</option>
                <option value="new">Сначала новые</option>
                <option value="hot">Горячие</option>
            </select>
            <input type="text" id="searchFilter" placeholder="🔍 Поиск...">
        </div>

        <!-- СПИСОК ТРЕДОВ -->
        <div class="threads-list" id="threadsList">
            <div class="loading">Загрузка...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script src="thread.js"></script>
</body>
</html>
