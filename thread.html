<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Тред - Школа №62</title>
    <!-- Подключаем шрифт как в ВК -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
        }

        /* Шапка */
        .header {
            background: linear-gradient(145deg, #4a6fa5 0%, #2c3e50 100%);
            border-radius: 24px;
            padding: 18px 20px;
            margin: 16px;
            box-shadow: 0 6px 0 #1a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .header h1 small {
            font-size: 0.9rem;
            opacity: 0.9;
            display: block;
            margin-top: 4px;
        }

        .nav-menu {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid rgba(0,0,0,0.2);
            transition: all 0.1s;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .nav-btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        .back-btn {
            background: #ffd966;
            color: #2c3e50;
            border-bottom-color: #b38f4a;
        }

        /* Основной пост */
        .main-post {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin: 0 16px 20px 16px;
            border: 2px solid #4a6fa5;
            box-shadow: 0 4px 0 #2c3e50;
        }

        .post-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .post-meta {
            display: flex;
            gap: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .post-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .post-content {
            color: #2c3e50;
            line-height: 1.6;
            font-size: 1rem;
            white-space: pre-wrap;
        }

        /* Ответы */
        .replies-section {
            margin: 20px 16px;
        }

        .replies-title {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .replies-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .reply-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 15px;
            border-left: 4px solid #4a6fa5;
        }

        .reply-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .reply-author {
            font-weight: 700;
            color: #2c3e50;
            background: #ffd966;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .reply-date {
            color: #7f8c8d;
            font-size: 0.7rem;
        }

        .reply-content {
            color: #34495e;
            font-size: 0.95rem;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        /* Форма ответа */
        .reply-form {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e0e0e0;
        }

        .reply-form textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            min-height: 100px;
            margin-bottom: 15px;
            font-family: inherit;
            resize: vertical;
        }

        .reply-form textarea:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .reply-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border-bottom: 4px solid #2c3e50;
            width: 100%;
        }

        .reply-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        /* PREMIUM-бейдж */
        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #4a6fa5;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 8px;
        }

        /* Индикатор загрузки */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a6fa5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->
        <div class="header">
            <div>
                <h1>ШКОЛЬНАЯ СТЕНКА <small>Обсуждение</small></h1>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-btn">🏠 Главная</a>
                <a href="threads.html" class="nav-btn back-btn">← К тредам</a>
            </div>
        </div>

        <!-- Основной пост -->
        <div class="main-post" id="mainPost">
            <div class="loader" id="postLoader"></div>
        </div>

        <!-- Ответы -->
        <div class="replies-section">
            <div class="replies-title">
                <i class="fas fa-comments"></i> Ответы (<span id="repliesCount">0</span>)
            </div>
            
            <div class="replies-list" id="repliesList">
                <div class="loader" id="repliesLoader"></div>
            </div>

            <!-- Форма ответа -->
            <div class="reply-form">
                <textarea id="replyContent" placeholder="Написать ответ..." maxlength="1000"></textarea>
                <button class="reply-btn" id="submitReply">📨 ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <!-- Контейнер для сообщений -->
    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // SUPABASE КОНФИГ
        // ============================================
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================
        // ПЕРЕМЕННЫЕ
        // ============================================
        let userIp = null;
        let verifiedUser = null;
        let threadId = null;
        let threadData = null;

        // ============================================
        // ПОЛУЧЕНИЕ IP
        // ============================================
        async function getUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
                return userIp;
            } catch {
                userIp = 'user-' + Math.random().toString(36).substring(2, 10);
                return userIp;
            }
        }

        // ============================================
        // ПОКАЗ СООБЩЕНИЙ
        // ============================================
        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // ============================================
        // ЭКРАНИРОВАНИЕ HTML
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // ПОЛУЧЕНИЕ ID ТРЕДА ИЗ URL
        // ============================================
        function getThreadIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // ============================================
        // ЗАГРУЗКА ТРЕДА
        // ============================================
        async function loadThread() {
            threadId = getThreadIdFromUrl();
            
            if (!threadId) {
                window.location.href = 'threads.html';
                return;
            }
            
            try {
                const { data, error } = await supabaseClient
                    .from('threads')
                    .select('*')
                    .eq('id', threadId)
                    .single();
                
                if (error) throw error;
                
                threadData = data;
                
                // Увеличиваем счетчик просмотров
                await supabaseClient
                    .from('threads')
                    .update({ views: (data.views || 0) + 1 })
                    .eq('id', threadId);
                
                // Отображаем основной пост
                displayMainPost(data);
                
                // Загружаем ответы
                loadReplies();
                
            } catch (error) {
                console.error('Ошибка загрузки треда:', error);
                document.getElementById('postLoader').style.display = 'none';
                document.getElementById('mainPost').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #c0392b;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 15px;"></i>
                        <p>Тред не найден</p>
                        <a href="threads.html" style="color: #4a6fa5; text-decoration: none;">Вернуться к тредам</a>
                    </div>
                `;
            }
        }

        // ============================================
        // ОТОБРАЖЕНИЕ ОСНОВНОГО ПОСТА
        // ============================================
        function displayMainPost(thread) {
            const postLoader = document.getElementById('postLoader');
            postLoader.style.display = 'none';
            
            const date = new Date(thread.created_at).toLocaleString('ru', {
                day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
            });
            
            document.getElementById('mainPost').innerHTML = `
                <div class="post-title">${escapeHtml(thread.title)}</div>
                <div class="post-meta">
                    <span><i class="fas fa-user"></i> ${escapeHtml(thread.created_by || 'Аноним')}</span>
                    <span><i class="fas fa-clock"></i> ${date}</span>
                    <span><i class="fas fa-eye"></i> ${thread.views || 0} просмотров</span>
                </div>
                <div class="post-content">${escapeHtml(thread.content || '')}</div>
            `;
        }

        // ============================================
        // ЗАГРУЗКА ОТВЕТОВ
        // ============================================
        async function loadReplies() {
            const repliesList = document.getElementById('repliesList');
            const repliesLoader = document.getElementById('repliesLoader');
            const repliesCount = document.getElementById('repliesCount');
            
            try {
                const { data, error } = await supabaseClient
                    .from('thread_messages')
                    .select('*')
                    .eq('thread_id', threadId)
                    .order('created_at', { ascending: true });
                
                if (error) throw error;
                
                repliesLoader.style.display = 'none';
                
                // Обновляем счетчик ответов (исключая первое сообщение)
                const replies = data?.filter(m => !m.is_first) || [];
                repliesCount.textContent = replies.length;
                
                if (replies.length === 0) {
                    repliesList.innerHTML = `
                        <div style="text-align: center; padding: 20px; color: #7f8c8d;">
                            <p>Пока нет ответов. Будьте первым!</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                replies.forEach(reply => {
                    const date = new Date(reply.created_at).toLocaleString('ru', {
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                    });
                    
                    html += `
                        <div class="reply-item">
                            <div class="reply-header">
                                <span class="reply-author">
                                    ${escapeHtml(reply.author || 'Аноним')}
                                </span>
                                <span class="reply-date">${date}</span>
                            </div>
                            <div class="reply-content">${escapeHtml(reply.content)}</div>
                        </div>
                    `;
                });
                
                repliesList.innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка загрузки ответов:', error);
                repliesLoader.style.display = 'none';
                repliesList.innerHTML = `
                    <div style="text-align: center; padding: 20px; color: #c0392b;">
                        <p>Ошибка загрузки ответов</p>
                    </div>
                `;
            }
        }

        // ============================================
        // ОТПРАВКА ОТВЕТА
        // ============================================
        async function submitReply() {
            const content = document.getElementById('replyContent').value.trim();
            
            if (!content) {
                showMessage('Напишите ответ', 'error');
                return;
            }
            
            if (content.length < 2) {
                showMessage('Слишком короткий ответ', 'error');
                return;
            }
            
            try {
                if (!userIp) await getUserIp();
                
                // Сохраняем ответ
                const { error } = await supabaseClient
                    .from('thread_messages')
                    .insert({
                        thread_id: threadId,
                        content: content,
                        author: verifiedUser || 'Аноним',
                        ip_address: userIp,
                        user_agent: navigator.userAgent,
                        is_first: false
                    });
                
                if (error) throw error;
                
                // Обновляем счетчик и время последней активности в треде
                await supabaseClient
                    .from('threads')
                    .update({ 
                        messages_count: supabaseClient.raw('messages_count + 1'),
                        last_activity: new Date().toISOString()
                    })
                    .eq('id', threadId);
                
                // Очищаем поле
                document.getElementById('replyContent').value = '';
                
                showMessage('✅ Ответ отправлен!', 'success');
                
                // Перезагружаем ответы
                loadReplies();
                
            } catch (error) {
                console.error('Ошибка отправки ответа:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            await getUserIp();
            await loadThread();
            
            // Кнопка отправки ответа
            document.getElementById('submitReply').addEventListener('click', submitReply);
            
            // Enter для отправки (Ctrl+Enter)
            document.getElementById('replyContent').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    submitReply();
                }
            });
        });
    </script>
</body>
</html>
