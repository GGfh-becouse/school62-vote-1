<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Тред - Школа 62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ШКОЛЬНЫЙ ФОРУМ</h1>
            <div class="nav-links">
                <a href="threads.html" class="nav-link">← К списку</a>
            </div>
        </div>

        <div class="prime-status" id="primeStatus">
            <img src="verified.png" width="20" height="20" id="primeIcon" style="display: none;">
            <span id="primeName"></span>
        </div>

        <div id="messageContainer"></div>

        <!-- ТРЕД -->
        <div class="thread-container" id="threadContainer">
            <div class="loading">Загрузка...</div>
        </div>

        <!-- ОТВЕТ -->
        <div class="reply-form">
            <h3>✏️ ОТВЕТИТЬ</h3>
            <textarea id="replyContent" placeholder="Напишите ответ..." maxlength="300"></textarea>
            <button id="submitReply">Отправить</button>
        </div>

        <!-- ОТВЕТЫ -->
        <div class="replies-section">
            <h3>💬 ОТВЕТЫ</h3>
            <div class="replies-list" id="repliesList">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script src="thread.js"></script>
</body>
</html>
