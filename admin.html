<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Школа 62</title>
    <style>
        body {
            background: #00aced;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #00aced;
        }
        .login-form {
            max-width: 300px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #00aced;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 700;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 4px;
            cursor: pointer;
        }
        .tab.active {
            background: #00aced;
            color: white;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f5f5f5;
            padding: 10px;
            text-align: left;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            background: #00aced;
            color: white;
        }
        .prime-row {
            background: #fff9e6;
        }
    </style>
</head>
<body>
    <div class="login-form" id="loginForm">
        <h2>Вход в админку</h2>
        <input type="password" id="adminPassword" placeholder="Пароль">
        <button onclick="checkPassword()">Войти</button>
    </div>

    <div class="container" id="adminPanel" style="display:none;">
        <div class="header">
            <h1>Админ-панель Школа 62</h1>
            <button onclick="logout()">Выйти</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('comments')">Комментарии</div>
            <div class="tab" onclick="switchTab('feedback')">Обратная связь</div>
            <div class="tab" onclick="switchTab('prime')">PRIME</div>
            <div class="tab" onclick="switchTab('votes')">Голоса</div>
        </div>

        <div id="commentsPanel" class="panel active">
            <h3>Комментарии (PRIME выделены)</h3>
            <table>
                <thead>
                    <tr><th>Имя</th><th>Сообщение</th><th>IP</th><th>Дата</th></tr>
                </thead>
                <tbody id="commentsTable"></tbody>
            </table>
        </div>

        <div id="feedbackPanel" class="panel">
            <h3>Обратная связь</h3>
            <table>
                <thead>
                    <tr><th>Тип</th><th>Имя</th><th>Сообщение</th><th>IP</th><th>Дата</th></tr>
                </thead>
                <tbody id="feedbackTable"></tbody>
            </table>
        </div>

        <div id="primePanel" class="panel">
            <h3>PRIME-пользователи</h3>
            <table>
                <thead>
                    <tr><th>ID</th><th>Ник</th><th>Дата</th><th>Действия</th></tr>
                </thead>
                <tbody id="primeTable"></tbody>
            </table>
            <h4>Добавить PRIME</h4>
            <input type="text" id="newPrimeUser" placeholder="Ник">
            <input type="text" id="newPrimePass" placeholder="Пароль">
            <button onclick="addPrime()">Добавить</button>
        </div>

        <div id="votesPanel" class="panel">
            <h3>Голоса</h3>
            <table>
                <thead>
                    <tr><th>Кандидат</th><th>IP</th><th>Дата</th></tr>
                </thead>
                <tbody id="votesTable"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const ADMIN_PASSWORD = 'a7K9#mP2$vL5@nR8';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function checkPassword() {
            if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadAll();
            }
        }

        function logout() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            if (tab === 'comments') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('commentsPanel').classList.add('active');
                loadComments();
            } else if (tab === 'feedback') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('feedbackPanel').classList.add('active');
                loadFeedback();
            } else if (tab === 'prime') {
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('primePanel').classList.add('active');
                loadPrime();
            } else if (tab === 'votes') {
                document.querySelectorAll('.tab')[3].classList.add('active');
                document.getElementById('votesPanel').classList.add('active');
                loadVotes();
            }
        }

        async function loadAll() {
            loadComments();
            loadFeedback();
            loadPrime();
            loadVotes();
        }

        async function loadComments() {
            const { data } = await supabase
                .from('comments')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(100);
            
            let html = '';
            data?.forEach(c => {
                const primeClass = c.is_verified ? 'prime-row' : '';
                html += `<tr class="${primeClass}">
                    <td>${c.name} ${c.is_verified ? '👑' : ''}</td>
                    <td>${c.message}</td>
                    <td>${c.ip_address}</td>
                    <td>${new Date(c.created_at).toLocaleString()}</td>
                </tr>`;
            });
            document.getElementById('commentsTable').innerHTML = html;
        }

        async function loadFeedback() {
            const { data } = await supabase
                .from('feedback')
                .select('*')
                .order('created_at', { ascending: false });
            
            let html = '';
            data?.forEach(f => {
                html += `<tr>
                    <td><span class="badge">${f.type}</span></td>
                    <td>${f.name}</td>
                    <td>${f.message}</td>
                    <td>${f.ip_address}</td>
                    <td>${new Date(f.created_at).toLocaleString()}</td>
                </tr>`;
            });
            document.getElementById('feedbackTable').innerHTML = html;
        }

        async function loadPrime() {
            const { data } = await supabase
                .from('verified_users')
                .select('*')
                .order('created_at', { ascending: false });
            
            let html = '';
            data?.forEach(p => {
                html += `<tr>
                    <td>${p.id}</td>
                    <td>${p.username} 👑</td>
                    <td>${new Date(p.created_at).toLocaleString()}</td>
                    <td><button onclick="deletePrime(${p.id})">Удалить</button></td>
                </tr>`;
            });
            document.getElementById('primeTable').innerHTML = html;
        }

        async function loadVotes() {
            const { data } = await supabase
                .from('votes')
                .select('*, candidates(name)')
                .order('created_at', { ascending: false })
                .limit(100);
            
            let html = '';
            data?.forEach(v => {
                html += `<tr>
                    <td>${v.candidates?.name || 'Удалён'}</td>
                    <td>${v.ip_address}</td>
                    <td>${new Date(v.created_at).toLocaleString()}</td>
                </tr>`;
            });
            document.getElementById('votesTable').innerHTML = html;
        }

        async function addPrime() {
            const user = document.getElementById('newPrimeUser').value;
            const pass = document.getElementById('newPrimePass').value;
            if (!user || !pass) return alert('Заполните поля');
            
            await supabase.from('verified_users').insert({ username: user, password: pass });
            document.getElementById('newPrimeUser').value = '';
            document.getElementById('newPrimePass').value = '';
            loadPrime();
        }

        async function deletePrime(id) {
            if (confirm('Удалить PRIME?')) {
                await supabase.from('verified_users').delete().eq('id', id);
                loadPrime();
            }
        }
    </script>
</body>
</html>
