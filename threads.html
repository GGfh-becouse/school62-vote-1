<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>темки | школа 62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #f8f9fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 32px 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #f8f9fc;
            position: relative;
            padding: 0 16px;
        }

        .main-content {
            display: block;
            padding-bottom: 90px;
        }

        /* HEADER */
        .header {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px 20px;
            margin: 8px 0 16px 0;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-img {
            height: 36px;
            width: auto;
            object-fit: contain;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a1e2b;
            letter-spacing: -0.5px;
        }

        .header-icons {
            display: flex;
            gap: 16px;
        }

        .header-icon {
            font-size: 1.2rem;
            color: #8b93a6;
            transition: color 0.2s;
            cursor: pointer;
            text-decoration: none;
        }

        .header-icon:hover {
            color: #2e3440;
        }

        @media (max-width: 600px) {
            .logo-img {
                height: 28px;
            }
        }

        /* NAVIGATION BAR */
        .nav-bar {
            background: #ffffff;
            border-radius: 40px;
            padding: 6px;
            margin-bottom: 20px;
            display: flex;
            gap: 4px;
            box-shadow: 0 4px 8px -4px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 30px;
            color: #8b93a6;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            flex: 1;
            justify-content: center;
        }

        .nav-link i {
            font-size: 1rem;
        }

        .nav-link:hover {
            background: #f0f2f5;
            color: #2e3440;
        }

        .nav-link.active {
            background: #f0f2f5;
            color: #2e3440;
        }

        /* PRIME STATUS BAR */
        .prime-status-bar {
            background: #ffffff;
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px -4px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .prime-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prime-badge {
            width: 24px;
            height: 24px;
            background: #f1c40f;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            box-shadow: 0 2px 4px rgba(241, 196, 15, 0.3);
        }

        .prime-info span {
            font-size: 0.85rem;
            color: #1a1e2b;
            font-weight: 500;
        }

        .prime-logout {
            background: none;
            border: none;
            color: #8b93a6;
            font-size: 0.75rem;
            cursor: pointer;
            text-decoration: underline;
            padding: 4px 8px;
            transition: color 0.2s;
        }

        .prime-logout:hover {
            color: #e74c3c;
        }

        /* PREMIUM INDICATOR */
        .premium-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #f1c40f;
            color: #1a1e2b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 10px;
        }

        /* CREATE THREAD FORM */
        .create-thread {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .create-thread h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .thread-input,
        .thread-textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            font-size: 0.9rem;
            background: #f8f9fc;
            transition: border-color 0.2s;
            margin-bottom: 12px;
        }

        .thread-input:focus,
        .thread-textarea:focus {
            outline: none;
            border-color: #2e3440;
            background: #ffffff;
        }

        .thread-textarea {
            min-height: 100px;
            resize: vertical;
            font-family: 'Inter', sans-serif;
        }

        .create-btn {
            background: #2e3440;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .create-btn:hover {
            background: #1a1e2b;
        }

        .create-btn:disabled {
            background: #8b93a6;
            cursor: not-allowed;
        }

        /* THREADS LIST */
        .threads-list {
            margin-bottom: 24px;
        }

        .threads-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .threads-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b93a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .threads-count {
            background: #f0f2f5;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #1a1e2b;
            font-weight: 500;
        }

        .thread-item {
            background: #ffffff;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
            box-shadow: 0 4px 8px -4px rgba(0, 0, 0, 0.03);
        }

        .thread-item:hover {
            transform: translateX(4px);
            box-shadow: 0 8px 16px -8px rgba(0, 0, 0, 0.1);
        }

        .thread-item.premium {
            border-left: 3px solid #f1c40f;
            background: #fcf9f0;
        }

        .thread-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }

        .thread-title {
            font-weight: 600;
            font-size: 1rem;
            color: #1a1e2b;
            line-height: 1.4;
        }

        .thread-author {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: #8b93a6;
            white-space: nowrap;
        }

        .thread-author.premium {
            color: #f1c40f;
            font-weight: 500;
        }

        .thread-meta {
            display: flex;
            gap: 16px;
            color: #8b93a6;
            font-size: 0.75rem;
        }

        .thread-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* LOADER */
        .loader {
            border: 2px solid #f0f2f5;
            border-top: 2px solid #2e3440;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b93a6;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* MESSAGES */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.15);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #2e3440; }
        .message.error { background: #c0392b; }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 560px;
            width: calc(100% - 32px);
            background: #ffffff;
            border-radius: 40px;
            padding: 6px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .nav-item-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8b93a6;
            text-decoration: none;
            font-size: 0.6rem;
            font-weight: 500;
            flex: 1;
            padding: 8px 0;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .nav-item-bottom.active {
            background: #f0f2f5;
            color: #2e3440;
        }

        .nav-item-bottom:hover {
            color: #2e3440;
            background: #f8f9fc;
        }

        .nav-icon-bottom {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        /* ADMIN BUTTON */
        .admin-button {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: #ffffff;
            color: #2e3440;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 8px 16px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            z-index: 999;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-button:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.15);
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            z-index: 10001;
            display: none;
        }

        .modal-card {
            background: #ffffff;
            border-radius: 28px;
            max-width: 400px;
            width: 90%;
            margin: 80px auto;
            padding: 24px;
            box-shadow: 0 25px 35px -15px rgba(0, 0, 0, 0.2);
            animation: modalSlide 0.3s;
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1e2b;
            margin-bottom: 16px;
        }

        .modal-card select,
        .modal-card input,
        .modal-card textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            margin-bottom: 10px;
            background: #f8f9fc;
            font-size: 0.9rem;
        }

        .modal-card select:focus,
        .modal-card input:focus,
        .modal-card textarea:focus {
            outline: none;
            border-color: #2e3440;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-submit {
            flex: 2;
            background: #2e3440;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-cancel {
            flex: 1;
            background: #f0f2f5;
            color: #1a1e2b;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            body {
                padding: 16px 0;
            }

            .thread-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .thread-author {
                white-space: normal;
            }

            .admin-button {
                bottom: 90px;
            }

            .logo-img {
                height: 28px;
            }
        }
    </style>

</head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userIp = null;
        let verifiedUser = null;
        let isPremiumUser = false;

        // Проверяем верифицированного пользователя из localStorage
        const savedPrime = localStorage.getItem('primeUser');
        if (savedPrime) {
            const primeData = JSON.parse(savedPrime);
            verifiedUser = primeData.name;
            isPremiumUser = primeData.isPrime || false;
            
            const indicator = document.getElementById('currentUserPremiumIndicator');
            if (indicator) {
                indicator.style.display = 'inline-flex';
            }
        }

        async function getUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
            } catch {
                userIp = 'user-' + Math.random().toString(36).substring(2, 10);
            }
        }

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.logoutPrime = function() {
            localStorage.removeItem('primeUser');
            document.getElementById('primeStatusBar').style.display = 'none';
            showMessage('вы вышли из prime', 'success');
        };

        // Загрузка тем
        async function loadThreads() {
            const container = document.getElementById('threadsContainer');
            const countSpan = document.getElementById('threadsCount');
            
            try {
                const { data, error } = await supabaseClient
                    .from('threads')
                    .select('*')
                    .order('bump_time', { ascending: false });
                
                if (error) throw error;
                
                const threads = data || [];
                if (countSpan) countSpan.textContent = threads.length;
                
                if (threads.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <p>пока нет тем. создайте первую!</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                threads.forEach(thread => {
                    const date = new Date(thread.created_at).toLocaleString('ru', {
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                    });
                    
                    // Проверяем премиум статус автора (если есть поле)
                    const isAuthorPremium = thread.author_prime || false;
                    
                    html += `
                        <a href="thread.html?id=${thread.id}" class="thread-item ${isAuthorPremium ? 'premium' : ''}">
                            <div class="thread-header">
                                <div class="thread-title">${escapeHtml(thread.title || 'Без названия')}</div>
                                <div class="thread-author ${isAuthorPremium ? 'premium' : ''}">
                                    <i class="far fa-user"></i> ${escapeHtml(thread.author_name || 'Аноним')}
                                    ${isAuthorPremium ? '<i class="fas fa-crown" style="font-size:0.7rem;"></i>' : ''}
                                </div>
                            </div>
                            <div class="thread-meta">
                                <span><i class="far fa-clock"></i> ${date}</span>
                                <span><i class="far fa-comment"></i> ${thread.reply_count || 0}</span>
                                <span><i class="far fa-eye"></i> ${thread.views || 0}</span>
                            </div>
                        </a>
                    `;
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка загрузки тем:', error);
                container.innerHTML = `
                    <div class="empty-state" style="color: #c0392b;">
                        <div class="empty-state-icon">❌</div>
                        <p>ошибка загрузки тем</p>
                    </div>
                `;
            }
        }

        // ============================================
        // ИСПРАВЛЕННАЯ ФУНКЦИЯ СОЗДАНИЯ ТЕМЫ
        // ============================================
        async function createThread() {
            const title = document.getElementById('threadTitle').value.trim();
            const content = document.getElementById('threadContent').value.trim();
            
            if (!title || !content) {
                showMessage('заполните все поля', 'error');
                return;
            }
            
            if (title.length < 3) {
                showMessage('слишком короткий заголовок', 'error');
                return;
            }
            
            const userId = localStorage.getItem('userId');
            const userNickname = localStorage.getItem('userNickname');

            if (!userId || !userNickname) {
                showMessage('войдите, чтобы создать тему', 'error');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }
            
            const createBtn = document.getElementById('createThreadBtn');
            createBtn.disabled = true;
            createBtn.textContent = 'создание...';
            
            try {
                if (!userIp) await getUserIp();
                
                const now = new Date().toISOString();
                
                // Получаем данные пользователя (опционально)
                const { data: userData } = await supabaseClient
                    .from('users')
                    .select('class, avatar_url, is_prime')
                    .eq('id', parseInt(userId))
                    .maybeSingle();

                // СОЗДАЕМ ТЕМУ - ТОЛЬКО СУЩЕСТВУЮЩИЕ ПОЛЯ
                const threadData = {
                    title: title,
                    author_name: verifiedUser || userNickname || 'Аноним',
                    author_class: userData?.class || null,
                    author_avatar: userData?.avatar_url || null,
                    views: 0,
                    reply_count: 0,
                    bump_time: now,
                    created_at: now
                    // НЕТ updated_at и author_prime - их нет в таблице!
                };

                console.log('Создание темы:', threadData);

                const { data: newThread, error: threadError } = await supabaseClient
                    .from('threads')
                    .insert([threadData])
                    .select()
                    .single();

                if (threadError) {
                    console.error('Ошибка создания темы:', threadError);
                    throw threadError;
                }

                console.log('Тема создана, ID:', newThread.id);

                // СОЗДАЕМ ПЕРВОЕ СООБЩЕНИЕ - ТОЛЬКО СУЩЕСТВУЮЩИЕ ПОЛЯ
                const messageData = {
                    thread_id: newThread.id,
                    content: content,
                    author: verifiedUser || userNickname || 'Аноним',
                    ip_address: userIp,
                    user_agent: navigator.userAgent,
                    is_first: true,
                    created_at: now
                };

                console.log('Создание сообщения:', messageData);

                const { error: messageError } = await supabaseClient
                    .from('thread_messages')
                    .insert([messageData]);

                if (messageError) {
                    console.error('Ошибка создания сообщения:', messageError);
                    throw messageError;
                }
                
                // Очищаем поля
                document.getElementById('threadTitle').value = '';
                document.getElementById('threadContent').value = '';
                
                showMessage('✅ тема создана', 'success');
                
                // Перезагружаем список тем
                await loadThreads();
                
            } catch (error) {
                console.error('Ошибка создания темы:', error);
                showMessage('ошибка: ' + (error.message || 'неизвестная ошибка'), 'error');
            } finally {
                createBtn.disabled = false;
                createBtn.textContent = 'создать тему';
            }
        }

        // Админка
        const adminBtn = document.getElementById('adminBtn');
        const adminModal = document.getElementById('adminModal');
        const adminCancel = document.getElementById('adminCancel');
        const adminSubmit = document.getElementById('adminSubmit');

        adminBtn?.addEventListener('click', () => {
            adminModal.style.display = 'block';
        });

        adminCancel?.addEventListener('click', () => {
            adminModal.style.display = 'none';
            document.getElementById('adminName').value = '';
            document.getElementById('adminMessage').value = '';
        });

        adminModal?.addEventListener('click', (e) => {
            if (e.target === adminModal) {
                adminModal.style.display = 'none';
                document.getElementById('adminName').value = '';
                document.getElementById('adminMessage').value = '';
            }
        });

        adminSubmit?.addEventListener('click', async () => {
            const name = document.getElementById('adminName').value.trim() || 'Аноним';
            const message = document.getElementById('adminMessage').value.trim();
            
            if (!message) {
                showMessage('напишите сообщение', 'error');
                return;
            }

            try {
                await supabaseClient
                    .from('feedback')
                    .insert({
                        type: 'admin_message',
                        name: name,
                        message: message,
                        user_agent: navigator.userAgent
                    });
                
                showMessage('сообщение отправлено', 'success');
                adminModal.style.display = 'none';
                document.getElementById('adminName').value = '';
                document.getElementById('adminMessage').value = '';
                
            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('ошибка: ' + error.message, 'error');
            }
        });

        // Инициализация
        document.addEventListener('DOMContentLoaded', async () => {
            await getUserIp();
            await loadThreads();
            
            document.getElementById('createThreadBtn').addEventListener('click', createThread);
        });
    </script>
</body>
</html>
