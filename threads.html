<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Тема - Школа №62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif !important;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
        }

        /* Шапка */
        .header {
            background: linear-gradient(145deg, #4a6fa5 0%, #2c3e50 100%);
            border-radius: 24px;
            padding: 18px 20px;
            margin: 16px;
            box-shadow: 0 6px 0 #1a2a3a;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .school-badge {
            background: #ffd966;
            color: #2c3e50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            border-bottom: 3px solid #b38f4a;
        }

        .main-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 3px solid rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-icon {
            font-size: 1.1rem;
        }

        .back-btn {
            background: #ffd966;
            color: #2c3e50;
            border-bottom-color: #b38f4a;
        }

        /* Основной пост */
        .main-post {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin: 0 16px 20px 16px;
            border: 2px solid #4a6fa5;
            box-shadow: 0 4px 0 #2c3e50;
        }

        .post-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .post-meta {
            display: flex;
            gap: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .post-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .post-content {
            color: #2c3e50;
            line-height: 1.6;
            font-size: 1rem;
            white-space: pre-wrap;
        }

        /* Ответы */
        .replies-section {
            margin: 20px 16px;
        }

        .replies-title {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .replies-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .reply-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 15px;
            border-left: 4px solid #4a6fa5;
        }

        .reply-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .reply-author {
            font-weight: 700;
            color: #2c3e50;
            background: #ffd966;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .reply-date {
            color: #7f8c8d;
            font-size: 0.7rem;
        }

        .reply-content {
            color: #34495e;
            font-size: 0.95rem;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        /* Форма ответа */
        .reply-form {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e0e0e0;
        }

        .reply-form textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            min-height: 100px;
            margin-bottom: 15px;
            font-family: inherit;
            resize: vertical;
        }

        .reply-form textarea:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .reply-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border-bottom: 4px solid #2c3e50;
            width: 100%;
        }

        .reply-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a6fa5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .emoji {
            font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', 'Android Emoji', 'EmojiOne Color', sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->
        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>ШКОЛЬНАЯ СТЕНА</h1>
                    <span class="school-badge">№62</span>
                </div>
                
                <nav class="main-nav">
                    <a href="index.html" class="nav-item">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-text">Главная</span>
                    </a>
                    
                    <a href="threads.html" class="nav-item back-btn">
                        <span class="nav-icon">←</span>
                        <span class="nav-text">К темкам</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- Основной пост -->
        <div class="main-post" id="mainPost">
            <div class="loader" id="postLoader"></div>
        </div>

        <!-- Ответы -->
        <div class="replies-section">
            <div class="replies-title">
                <span style="font-size: 1.3rem;">💬</span> Ответы (<span id="repliesCount">0</span>)
            </div>
            
            <div class="replies-list" id="repliesList">
                <div class="loader" id="repliesLoader"></div>
            </div>

            <!-- Форма ответа -->
            <div class="reply-form">
                <textarea id="replyContent" placeholder="Написать ответ..." maxlength="1000"></textarea>
                <button class="reply-btn" id="submitReply">📨 ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userIp = null;
        let verifiedUser = null;
        let threadId = null;
        let threadData = null;

        async function getUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
                return userIp;
            } catch {
                userIp = 'user-' + Math.random().toString(36).substring(2, 10);
                return userIp;
            }
        }

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getThreadIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        async function loadThread() {
            threadId = getThreadIdFromUrl();
            
            if (!threadId) {
                window.location.href = 'threads.html';
                return;
            }
            
            try {
                const { data, error } = await supabaseClient
                    .from('threads')
                    .select('*')
                    .eq('id', threadId)
                    .single();
                
                if (error) throw error;
                
                threadData = data;
                
                // Увеличиваем счетчик просмотров
                await supabaseClient
                    .from('threads')
                    .update({ views: (data.views || 0) + 1 })
                    .eq('id', threadId);
                
                displayMainPost(data);
                loadReplies();
                
            } catch (error) {
                console.error('Ошибка загрузки темы:', error);
                document.getElementById('postLoader').style.display = 'none';
                document.getElementById('mainPost').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #c0392b;">
                        <div style="font-size: 48px; margin-bottom: 15px;">❌</div>
                        <p>Тема не найдена</p>
                        <a href="threads.html" style="color: #4a6fa5; text-decoration: none;">Вернуться к темкам</a>
                    </div>
                `;
            }
        }

        function displayMainPost(thread) {
            const postLoader = document.getElementById('postLoader');
            postLoader.style.display = 'none';
            
            const date = new Date(thread.created_at).toLocaleString('ru', {
                day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
            });
            
            document.getElementById('mainPost').innerHTML = `
                <div class="post-title">${escapeHtml(thread.title)}</div>
                <div class="post-meta">
                    <span><span style="font-size: 1rem;">👤</span> ${escapeHtml(thread.author_name || 'Аноним')}</span>
                    <span><span style="font-size: 1rem;">🕐</span> ${date}</span>
                    <span><span style="font-size: 1rem;">👁️</span> ${thread.views || 0} просмотров</span>
                </div>
                <div class="post-content">${escapeHtml(thread.content || '')}</div>
            `;
        }

        async function loadReplies() {
            const repliesList = document.getElementById('repliesList');
            const repliesLoader = document.getElementById('repliesLoader');
            const repliesCount = document.getElementById('repliesCount');
            
            try {
                const { data, error } = await supabaseClient
                    .from('thread_messages')
                    .select('*')
                    .eq('thread_id', threadId)
                    .order('created_at', { ascending: true });
                
                if (error) throw error;
                
                repliesLoader.style.display = 'none';
                
                const replies = data?.filter(m => !m.is_first) || [];
                repliesCount.textContent = replies.length;
                
                if (replies.length === 0) {
                    repliesList.innerHTML = `
                        <div style="text-align: center; padding: 20px; color: #7f8c8d;">
                            <div style="font-size: 32px; margin-bottom: 10px;">💭</div>
                            <p>Пока нет ответов. Будьте первым!</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                replies.forEach(reply => {
                    const date = new Date(reply.created_at).toLocaleString('ru', {
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                    });
                    
                    html += `
                        <div class="reply-item">
                            <div class="reply-header">
                                <span class="reply-author">
                                    <span style="font-size: 0.9rem;">👤</span> ${escapeHtml(reply.author || 'Аноним')}
                                </span>
                                <span class="reply-date">${date}</span>
                            </div>
                            <div class="reply-content">${escapeHtml(reply.content)}</div>
                        </div>
                    `;
                });
                
                repliesList.innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка загрузки ответов:', error);
                repliesLoader.style.display = 'none';
                repliesList.innerHTML = `
                    <div style="text-align: center; padding: 20px; color: #c0392b;">
                        <div style="font-size: 32px; margin-bottom: 10px;">❌</div>
                        <p>Ошибка загрузки ответов</p>
                    </div>
                `;
            }
        }

        // ============================================
        // ОТПРАВКА ОТВЕТА (ИСПРАВЛЕНО)
        // ============================================
        async function submitReply() {
            const content = document.getElementById('replyContent').value.trim();
            
            if (!content) {
                showMessage('Напишите ответ', 'error');
                return;
            }
            
            if (content.length < 2) {
                showMessage('Слишком короткий ответ', 'error');
                return;
            }
            
            try {
                if (!userIp) await getUserIp();
                
                const now = new Date().toISOString();
                
                // Сохраняем ответ
                const { error: insertError } = await supabaseClient
                    .from('thread_messages')
                    .insert({
                        thread_id: threadId,
                        content: content,
                        author: verifiedUser || 'Аноним',
                        ip_address: userIp,
                        user_agent: navigator.userAgent,
                        is_first: false,
                        created_at: now
                    });
                
                if (insertError) {
                    console.error('Ошибка при создании ответа:', insertError);
                    showMessage('Ошибка: ' + insertError.message, 'error');
                    return;
                }
                
                // Получаем текущие значения
                const { data: thread, error: fetchError } = await supabaseClient
                    .from('threads')
                    .select('reply_count')
                    .eq('id', threadId)
                    .single();
                
                if (fetchError) {
                    console.error('Ошибка при получении данных темы:', fetchError);
                } else {
                    // Обновляем счетчик и время
                    const newReplyCount = (thread.reply_count || 0) + 1;
                    
                    const { error: updateError } = await supabaseClient
                        .from('threads')
                        .update({ 
                            reply_count: newReplyCount,
                            bump_time: now,
                            last_activity: now
                        })
                        .eq('id', threadId);
                    
                    if (updateError) {
                        console.error('Ошибка при обновлении счетчика:', updateError);
                    }
                }
                
                // Очищаем поле
                document.getElementById('replyContent').value = '';
                
                showMessage('✅ Ответ отправлен!', 'success');
                
                // Перезагружаем ответы
                await loadReplies();
                
                // Обновляем счетчик ответов в заголовке
                const repliesCount = document.getElementById('repliesCount');
                if (repliesCount) {
                    const currentCount = parseInt(repliesCount.textContent) || 0;
                    repliesCount.textContent = currentCount + 1;
                }
                
            } catch (error) {
                console.error('Ошибка отправки ответа:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', async () => {
            await getUserIp();
            await loadThread();
            
            document.getElementById('submitReply').addEventListener('click', submitReply);
            
            document.getElementById('replyContent').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    submitReply();
                }
            });
        });
    </script>
</body>
</html>
