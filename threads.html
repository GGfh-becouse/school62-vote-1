<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Темки - Школа №62</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif !important;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
        }

        /* Шапка */
        .header {
            background: linear-gradient(145deg, #4a6fa5 0%, #2c3e50 100%);
            border-radius: 24px;
            padding: 18px 20px;
            margin: 16px;
            box-shadow: 0 6px 0 #1a2a3a;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .school-badge {
            background: #ffd966;
            color: #2c3e50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            border-bottom: 3px solid #b38f4a;
        }

        /* Горизонтальное меню */
        .main-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 3px solid rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .nav-item.active {
            background: #ffd966;
            color: #2c3e50;
            border-bottom-color: #b38f4a;
        }

        .nav-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-icon {
            font-size: 1.1rem;
        }

        /* Кнопка создания темки */
        .create-thread-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            width: calc(100% - 32px);
            margin: 0 16px 20px 16px;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            border-bottom: 4px solid #2c3e50;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .create-thread-btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        /* Список темок */
        .threads-container {
            padding: 0 16px;
            margin-bottom: 30px;
        }

        .thread-item {
            background: white;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            box-shadow: 0 4px 0 #c0c0c0;
            cursor: pointer;
            transition: all 0.2s;
            animation: fadeIn 0.3s;
        }

        .thread-item:hover {
            border-color: #4a6fa5;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #a0a0a0;
        }

        .thread-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .thread-meta {
            display: flex;
            gap: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .thread-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .thread-stats {
            display: flex;
            gap: 15px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .thread-stat {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Модальное окно создания темки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10001;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            margin: 50px auto;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 2px solid #4a6fa5;
        }

        .modal-content h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #4a6fa5;
        }

        .modal-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .modal-input:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .modal-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            min-height: 120px;
            margin-bottom: 20px;
            font-family: inherit;
            resize: vertical;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 4px solid;
            transition: all 0.1s;
        }

        .modal-btn.create {
            background: #4a6fa5;
            color: white;
            border-bottom-color: #2c3e50;
        }

        .modal-btn.cancel {
            background: #e0e0e0;
            color: #2c3e50;
            border-bottom-color: #b0b0b0;
        }

        .modal-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }

        /* Индикатор загрузки */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a6fa5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        .new-thread {
            animation: fadeIn 0.3s;
        }

        .emoji {
            font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', 'Android Emoji', 'EmojiOne Color', sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->
        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>ШКОЛЬНАЯ СТЕНА</h1>
                    <span class="school-badge">№62</span>
                </div>
                
                <!-- Горизонтальное меню -->
                <nav class="main-nav">
                    <a href="index.html" class="nav-item">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-text">Главная</span>
                    </a>
                    
                    <a href="threads.html" class="nav-item active">

                        <span class="nav-text">Темки</span>
                    </a>
                    
                    <a href="javascript:void(0)" class="nav-item" style="opacity: 0.6;">
                        <span class="nav-icon">👤</span>

                    </a>
                </nav>
            </div>
        </div>

        <!-- Кнопка создания темки -->
        <button type="button" class="create-thread-btn" id="createThreadBtn">
            <span class="emoji">➕</span> СОЗДАТЬ ТЕМКУ
        </button>

        <!-- Список темок -->
        <div class="threads-container" id="threadsList">
            <div class="loader" id="threadsLoader"></div>
        </div>
    </div>

    <!-- Модальное окно создания темки -->
    <div class="modal" id="createThreadModal">
        <div class="modal-content">
            <h2>💬 СОЗДАТЬ НОВУЮ ТЕМКУ</h2>
            
            <input type="text" id="threadTitle" class="modal-input" placeholder="Название темки" maxlength="100">
            
            <textarea id="threadContent" class="modal-textarea" placeholder="Текст сообщения..." maxlength="2000"></textarea>
            
            <div class="modal-buttons">
                <button type="button" class="modal-btn create" id="submitThread">СОЗДАТЬ</button>
                <button type="button" class="modal-btn cancel" id="cancelThread">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <!-- Контейнер для сообщений -->
    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // SUPABASE КОНФИГ
        // ============================================
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================
        // ПЕРЕМЕННЫЕ
        // ============================================
        let userIp = null;
        let verifiedUser = null;
        let autoUpdateInterval = null;
        let lastThreadId = 0;

        // ============================================
        // ПОЛУЧЕНИЕ IP
        // ============================================
        async function getUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
                return userIp;
            } catch {
                userIp = 'user-' + Math.random().toString(36).substring(2, 10);
                return userIp;
            }
        }

        // ============================================
        // ПОКАЗ СООБЩЕНИЙ
        // ============================================
        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // ============================================
        // ЭКРАНИРОВАНИЕ HTML
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
// ============================================
// ЗАГРУЗКА ТРЕДОВ (ИСПРАВЛЕНО)
// ============================================
async function loadThreads() {
    const threadsList = document.getElementById('threadsList');
    const loader = document.getElementById('threadsLoader');
    
    try {
        const { data, error } = await supabaseClient
            .from('threads')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) throw error;
        
        loader.style.display = 'none';
        
        if (!data || data.length === 0) {
            threadsList.innerHTML = `
                <div style="text-align: center; padding: 40px; color: #7f8c8d;">
                    <div class="emoji" style="font-size: 48px; margin-bottom: 15px; opacity: 0.5;">💬</div>
                    <p>Пока нет темок. Создайте первую!</p>
                </div>
            `;
            return;
        }
        
        // Получаем все сообщения для подсчета ответов
        const { data: messages, error: messagesError } = await supabaseClient
            .from('thread_messages')
            .select('thread_id');
        
        const replyCounts = {};
        if (!messagesError && messages) {
            messages.forEach(msg => {
                replyCounts[msg.thread_id] = (replyCounts[msg.thread_id] || 0) + 1;
            });
        }
        
        let html = '';
        data.forEach(thread => {
            const date = new Date(thread.created_at).toLocaleString('ru', {
                day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
            });
            
            // Вычитаем первое сообщение, чтобы получить только ответы
            const replyCount = Math.max(0, (replyCounts[thread.id] || 1) - 1);
            
            html += `
                <div class="thread-item" onclick="openThread(${thread.id})">
                    <div class="thread-title">${escapeHtml(thread.title)}</div>
                    <div class="thread-meta">
                        <span><span style="font-size: 1rem;">👤</span> ${escapeHtml(thread.author_name || 'Аноним')}</span>
                        <span><span style="font-size: 1rem;">🕐</span> ${date}</span>
                    </div>
                    <div class="thread-stats">
                        <span class="thread-stat"><span style="font-size: 1rem;">💬</span> ${replyCount} ответов</span>
                        <span class="thread-stat"><span style="font-size: 1rem;">👁️</span> ${thread.views || 0} просмотров</span>
                    </div>
                </div>
            `;
        });
        
        threadsList.innerHTML = html;
        
    } catch (error) {
        console.error('Ошибка загрузки темок:', error);
        loader.style.display = 'none';
        threadsList.innerHTML = `
            <div style="text-align: center; padding: 40px; color: #c0392b;">
                <div style="font-size: 48px; margin-bottom: 15px;">❌</div>
                <p>Ошибка загрузки темок</p>
            </div>
        `;
    });
    
    threadsList.innerHTML = html;
        
    } catch (error) {
        console.error('Ошибка загрузки темок:', error);
        loader.style.display = 'none';
        threadsList.innerHTML = `
            <div style="text-align: center; padding: 40px; color: #c0392b;">
                <div class="emoji" style="font-size: 48px; margin-bottom: 15px;">❌</div>
                <p>Ошибка загрузки темок: ${error.message}</p>
            </div>
        `;
    }
}

        // ============================================
        // ЗАГРУЗКА НОВЫХ ТЕМОК
        // ============================================
        async function loadNewThreads() {
            try {
                const { data, error } = await supabaseClient
                    .from('threads')
                    .select('*')
                    .gt('id', lastThreadId)  // Только новые, с ID больше последнего
                    .order('bump_time', { ascending: false });
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    // Обновляем последний ID
                    const maxId = Math.max(...data.map(t => t.id));
                    lastThreadId = Math.max(lastThreadId, maxId);
                    
                    // Добавляем новые темки в начало списка
                    addNewThreads(data);
                    
                    // Показываем уведомление
                    showNotification(`📢 ${data.length} новых темок`);
                }
            } catch (error) {
                console.error('Ошибка загрузки новых темок:', error);
            }
        }

        // ============================================
        // ДОБАВЛЕНИЕ НОВЫХ ТЕМОК
        // ============================================
        function addNewThreads(newThreads) {
            const threadsList = document.getElementById('threadsList');
            const currentThreads = threadsList.querySelectorAll('.thread-item');
            
            // Если список пустой, просто перезагружаем всё
            if (currentThreads.length === 0) {
                displayThreads(newThreads);
                return;
            }
            
            // Добавляем новые темки в начало
            let html = '';
            newThreads.forEach(thread => {
                const date = new Date(thread.created_at).toLocaleString('ru', {
                    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                });
                
                const threadHtml = `
                    <div class="thread-item new-thread" onclick="openThread(${thread.id})">
                        <div class="thread-title">${escapeHtml(thread.title)}</div>
                        <div class="thread-meta">
                            <span><span class="emoji">👤</span> ${escapeHtml(thread.author_name || 'Аноним')}</span>
                            <span><span class="emoji">🕐</span> ${date}</span>
                            ${thread.is_pinned ? '<span><span class="emoji">📌</span> Закреплено</span>' : ''}
                            ${thread.is_hot ? '<span><span class="emoji">🔥</span> Горячее</span>' : ''}
                        </div>
                        <div class="thread-stats">
                            <span class="thread-stat"><span class="emoji">💬</span> ${thread.reply_count || 0}</span>
                            <span class="thread-stat"><span class="emoji">👁️</span> ${thread.views || 0}</span>
                        </div>
                    </div>
                `;
                html += threadHtml;
            });
            
            // Вставляем в начало списка
            threadsList.insertAdjacentHTML('afterbegin', html);
        }

        // ============================================
        // ОТОБРАЖЕНИЕ ВСЕХ ТЕМОК
        // ============================================
        function displayThreads(threads) {
            const threadsList = document.getElementById('threadsList');
            const loader = document.getElementById('threadsLoader');
            
            loader.style.display = 'none';
            
            if (!threads || threads.length === 0) {
                threadsList.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #7f8c8d;">
                        <div class="emoji" style="font-size: 48px; margin-bottom: 15px; opacity: 0.5;">💬</div>
                        <p>Пока нет темок. Создайте первую!</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            threads.forEach(thread => {
                const date = new Date(thread.created_at).toLocaleString('ru', {
                    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                });
                
                html += `
                    <div class="thread-item" onclick="openThread(${thread.id})">
                        <div class="thread-title">${escapeHtml(thread.title)}</div>
                        <div class="thread-meta">
                            <span><span class="emoji">👤</span> ${escapeHtml(thread.author_name || 'Аноним')}</span>
                            <span><span class="emoji">🕐</span> ${date}</span>
                            ${thread.is_pinned ? '<span><span class="emoji">📌</span> Закреплено</span>' : ''}
                            ${thread.is_hot ? '<span><span class="emoji">🔥</span> Горячее</span>' : ''}
                        </div>
                        <div class="thread-stats">
                            <span class="thread-stat"><span class="emoji">💬</span> ${thread.reply_count || 0}</span>
                            <span class="thread-stat"><span class="emoji">👁️</span> ${thread.views || 0}</span>
                        </div>
                    </div>
                `;
            });
            
            threadsList.innerHTML = html;
        }

        // ============================================
        // ПОКАЗ УВЕДОМЛЕНИЯ
        // ============================================
        function showNotification(text) {
            const notification = document.createElement('div');
            notification.className = 'message success';
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                top: auto;
                background: #4a6fa5;
                cursor: pointer;
            `;
            notification.innerHTML = `${text} (нажмите чтобы обновить)`;
            
            notification.addEventListener('click', () => {
                notification.remove();
                loadAllThreads().then(threads => displayThreads(threads));
            });
            
            document.getElementById('messageContainer').appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentNode) notification.remove();
            }, 5000);
        }

        // ============================================
        // ЗАГРУЗКА ТЕМОК ПРИ СТАРТЕ
        // ============================================
        async function loadThreads() {
            const threads = await loadAllThreads();
            displayThreads(threads);
        }

        // ============================================
        // ОТКРЫТИЕ ТЕМКИ
        // ============================================
        function openThread(threadId) {
            // Увеличиваем счетчик просмотров асинхронно
            supabaseClient
                .from('threads')
                .select('views')
                .eq('id', threadId)
                .single()
                .then(({ data, error }) => {
                    if (!error && data) {
                        const newViews = (data.views || 0) + 1;
                        supabaseClient
                            .from('threads')
                            .update({ views: newViews })
                            .eq('id', threadId)
                            .then();
                    }
                });
            
            // Переходим на страницу темы
            window.location.href = `thread.html?id=${threadId}`;
        }

        // ============================================
        // СОЗДАНИЕ ТЕМКИ
        // ============================================
        async function createThread() {
            const title = document.getElementById('threadTitle').value.trim();
            const content = document.getElementById('threadContent').value.trim();
            
            if (!title) {
                showMessage('Введите название темки', 'error');
                return;
            }
            
            if (!content) {
                showMessage('Введите сообщение', 'error');
                return;
            }
            
            try {
                if (!userIp) await getUserIp();
                
                const now = new Date().toISOString();
                
                const threadData = {
                    title: title,
                    content: content,
                    author_name: verifiedUser || 'Аноним',
                    author_ip: userIp,
                    user_agent: navigator.userAgent,
                    reply_count: 1,
                    views: 0,
                    bump_time: now,
                    last_activity: now,
                    created_at: now,
                    is_pinned: false,
                    is_hot: false
                };
                
                const { data: thread, error: threadError } = await supabaseClient
                    .from('threads')
                    .insert(threadData)
                    .select()
                    .single();
                
                if (threadError) throw threadError;
                
                // Создаем первое сообщение
                await supabaseClient
                    .from('thread_messages')
                    .insert({
                        thread_id: thread.id,
                        content: content,
                        author: verifiedUser || 'Аноним',
                        ip_address: userIp,
                        user_agent: navigator.userAgent,
                        is_first: true,
                        created_at: now
                    });
                
                // Закрываем модалку и очищаем поля
                document.getElementById('createThreadModal').style.display = 'none';
                document.getElementById('threadTitle').value = '';
                document.getElementById('threadContent').value = '';
                
                showMessage('✅ Темка создана!', 'success');
                
                // Обновляем список, добавляя новую темку в начало
                const date = new Date(thread.created_at).toLocaleString('ru', {
                    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                });
                
                const newThreadHtml = `
                    <div class="thread-item new-thread" onclick="openThread(${thread.id})">
                        <div class="thread-title">${escapeHtml(thread.title)}</div>
                        <div class="thread-meta">
                            <span><span class="emoji">👤</span> ${escapeHtml(thread.author_name || 'Аноним')}</span>
                            <span><span class="emoji">🕐</span> ${date}</span>
                        </div>
                        <div class="thread-stats">
                            <span class="thread-stat"><span class="emoji">💬</span> 1</span>
                            <span class="thread-stat"><span class="emoji">👁️</span> 0</span>
                        </div>
                    </div>
                `;
                
                const threadsList = document.getElementById('threadsList');
                threadsList.insertAdjacentHTML('afterbegin', newThreadHtml);
                
                // Обновляем lastThreadId
                if (thread.id > lastThreadId) {
                    lastThreadId = thread.id;
                }
                
                // Убираем сообщение "пусто" если оно было
                if (threadsList.children.length === 1 && threadsList.querySelector('div[style*="text-align: center"]')) {
                    threadsList.innerHTML = newThreadHtml;
                }
                
            } catch (error) {
                console.error('Ошибка создания темки:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ЗАПУСК АВТООБНОВЛЕНИЯ
        // ============================================
        function startAutoUpdate() {
            if (autoUpdateInterval) clearInterval(autoUpdateInterval);
            
            autoUpdateInterval = setInterval(() => {
                loadNewThreads();
            }, 5000); // Проверяем новые темки каждые 5 секунд
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Страница загружена');
            
            await getUserIp();
            await loadThreads();
            startAutoUpdate();
            
            // Кнопка создания темки
            const createBtn = document.getElementById('createThreadBtn');
            if (createBtn) {
                createBtn.addEventListener('click', () => {
                    document.getElementById('createThreadModal').style.display = 'block';
                });
            }
            
            // Кнопка отправки
            const submitBtn = document.getElementById('submitThread');
            if (submitBtn) {
                submitBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    createThread();
                });
            }
            
            // Кнопка отмены
            const cancelBtn = document.getElementById('cancelThread');
            if (cancelBtn) {
                cancelBtn.addEventListener('click', () => {
                    document.getElementById('createThreadModal').style.display = 'none';
                    document.getElementById('threadTitle').value = '';
                    document.getElementById('threadContent').value = '';
                });
            }
            
            // Закрытие по клику на фон
            const modal = document.getElementById('createThreadModal');
            if (modal) {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.style.display = 'none';
                    }
                });
            }
        });
    </script>
</body>
</html>
