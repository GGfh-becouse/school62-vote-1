<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Треды - Школа №62</title>
    <!-- Подключаем шрифт как в ВК -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
        }

        body {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
        }

        /* Шапка */
        .header {
            background: linear-gradient(145deg, #4a6fa5 0%, #2c3e50 100%);
            border-radius: 24px;
            padding: 18px 20px;
            margin: 16px;
            box-shadow: 0 6px 0 #1a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .header h1 small {
            font-size: 0.9rem;
            opacity: 0.9;
            display: block;
            margin-top: 4px;
        }

        .nav-menu {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid rgba(0,0,0,0.2);
            transition: all 0.1s;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .nav-btn.active {
            background: #ffd966;
            color: #2c3e50;
            border-bottom-color: #b38f4a;
        }

        .nav-btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        /* Кнопка создания треда */
        .create-thread-btn {
            background: #4a6fa5;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            border-bottom: 4px solid #2c3e50;
            margin: 0 16px 20px 16px;
            width: calc(100% - 32px);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .create-thread-btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        /* Список тредов */
        .threads-container {
            padding: 0 16px;
            margin-bottom: 30px;
        }

        .thread-item {
            background: white;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            box-shadow: 0 4px 0 #c0c0c0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .thread-item:hover {
            border-color: #4a6fa5;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #a0a0a0;
        }

        .thread-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .thread-meta {
            display: flex;
            gap: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .thread-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .thread-meta i {
            color: #4a6fa5;
            width: 16px;
        }

        .thread-stats {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .thread-stat {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #2c3e50;
            font-weight: 500;
        }

        /* Модальное окно создания треда */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10001;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            margin: 50px auto;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 2px solid #4a6fa5;
        }

        .modal-content h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #4a6fa5;
        }

        .modal-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .modal-input:focus {
            border-color: #4a6fa5;
            outline: none;
        }

        .modal-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.95rem;
            min-height: 120px;
            margin-bottom: 20px;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 4px solid;
            transition: all 0.1s;
        }

        .modal-btn.create {
            background: #4a6fa5;
            color: white;
            border-bottom-color: #2c3e50;
        }

        .modal-btn.cancel {
            background: #e0e0e0;
            color: #2c3e50;
            border-bottom-color: #b0b0b0;
        }

        .modal-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 10002;
            animation: slideIn 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .message.success { background: #4a6fa5; }
        .message.error { background: #c0392b; }

        /* Индикатор загрузки */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a6fa5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* PREMIUM-бейдж */
        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #4a6fa5;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с навигацией -->
        <div class="header">
            <div>
                <h1>ШКОЛЬНАЯ СТЕНКА <small>Треды</small></h1>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-btn">🏠 Главная</a>
                <a href="threads.html" class="nav-btn active">📢 Треды</a>
            </div>
        </div>

        <!-- Кнопка создания треда -->
        <button class="create-thread-btn" id="createThreadBtn">
            <i class="fas fa-plus-circle"></i> СОЗДАТЬ ТРЕД
        </button>

        <!-- Список тредов -->
        <div class="threads-container" id="threadsList">
            <div class="loader" id="threadsLoader"></div>
        </div>
    </div>

    <!-- Модальное окно создания треда -->
    <div class="modal" id="createThreadModal">
        <div class="modal-content">
            <h2>📢 СОЗДАТЬ НОВЫЙ ТРЕД</h2>
            
            <input type="text" id="threadTitle" class="modal-input" placeholder="Название треда" maxlength="100">
            
            <textarea id="threadContent" class="modal-textarea" placeholder="Текст сообщения..." maxlength="2000"></textarea>
            
            <div class="modal-buttons">
                <button class="modal-btn create" id="submitThread">СОЗДАТЬ</button>
                <button class="modal-btn cancel" id="cancelThread">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <!-- Контейнер для сообщений -->
    <div id="messageContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // SUPABASE КОНФИГ (те же данные, что на главной)
        // ============================================
        const SUPABASE_URL = 'https://wdcwxvxkvyncybsefotj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VMEPI3FAZoKDgX4ae_pqcg_Euvs40hM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================
        // ПЕРЕМЕННЫЕ
        // ============================================
        let userIp = null;
        let verifiedUser = null;

        // ============================================
        // ПОЛУЧЕНИЕ IP
        // ============================================
        async function getUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
                return userIp;
            } catch {
                userIp = 'user-' + Math.random().toString(36).substring(2, 10);
                return userIp;
            }
        }

        // ============================================
        // ПОКАЗ СООБЩЕНИЙ
        // ============================================
        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // ============================================
        // ЭКРАНИРОВАНИЕ HTML
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // ЗАГРУЗКА ТРЕДОВ
        // ============================================
        async function loadThreads() {
            const threadsList = document.getElementById('threadsList');
            const loader = document.getElementById('threadsLoader');
            
            try {
                const { data, error } = await supabaseClient
                    .from('threads')
                    .select('*')
                    .order('last_activity', { ascending: false });
                
                if (error) throw error;
                
                loader.style.display = 'none';
                
                if (!data || data.length === 0) {
                    threadsList.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #7f8c8d;">
                            <i class="fas fa-comments" style="font-size: 48px; margin-bottom: 15px; opacity: 0.5;"></i>
                            <p>Пока нет тредов. Создайте первый!</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                data.forEach(thread => {
                    const date = new Date(thread.created_at).toLocaleString('ru', {
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                    });
                    
                    html += `
                        <div class="thread-item" onclick="openThread(${thread.id})">
                            <div class="thread-title">${escapeHtml(thread.title)}</div>
                            <div class="thread-meta">
                                <span><i class="fas fa-user"></i> ${escapeHtml(thread.created_by || 'Аноним')}</span>
                                <span><i class="fas fa-clock"></i> ${date}</span>
                            </div>
                            <div class="thread-stats">
                                <span class="thread-stat"><i class="fas fa-comment"></i> ${thread.messages_count || 0} ответов</span>
                                <span class="thread-stat"><i class="fas fa-eye"></i> ${thread.views || 0} просмотров</span>
                            </div>
                        </div>
                    `;
                });
                
                threadsList.innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка загрузки тредов:', error);
                loader.style.display = 'none';
                threadsList.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #c0392b;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 15px;"></i>
                        <p>Ошибка загрузки тредов</p>
                    </div>
                `;
            }
        }

        // ============================================
        // ОТКРЫТИЕ ТРЕДА
        // ============================================
        function openThread(threadId) {
            // Увеличиваем счетчик просмотров
            supabaseClient
                .from('threads')
                .update({ views: supabaseClient.raw('views + 1') })
                .eq('id', threadId)
                .then();
            
            // Переходим на страницу треда
            window.location.href = `thread.html?id=${threadId}`;
        }

        // ============================================
        // СОЗДАНИЕ ТРЕДА
        // ============================================
        async function createThread() {
            const title = document.getElementById('threadTitle').value.trim();
            const content = document.getElementById('threadContent').value.trim();
            
            if (!title) {
                showMessage('Введите название треда', 'error');
                return;
            }
            
            if (!content) {
                showMessage('Введите сообщение', 'error');
                return;
            }
            
            try {
                // Получаем IP
                if (!userIp) await getUserIp();
                
                // Создаем тред
                const { data: thread, error: threadError } = await supabaseClient
                    .from('threads')
                    .insert({
                        title: title,
                        content: content,
                        created_by: verifiedUser || 'Аноним',
                        ip_address: userIp,
                        user_agent: navigator.userAgent,
                        messages_count: 0,
                        views: 0,
                        last_activity: new Date().toISOString()
                    })
                    .select()
                    .single();
                
                if (threadError) throw threadError;
                
                // Создаем первое сообщение
                await supabaseClient
                    .from('thread_messages')
                    .insert({
                        thread_id: thread.id,
                        content: content,
                        author: verifiedUser || 'Аноним',
                        ip_address: userIp,
                        user_agent: navigator.userAgent,
                        is_first: true
                    });
                
                // Закрываем модалку и очищаем поля
                document.getElementById('createThreadModal').style.display = 'none';
                document.getElementById('threadTitle').value = '';
                document.getElementById('threadContent').value = '';
                
                showMessage('✅ Тред создан!', 'success');
                
                // Перезагружаем список тредов
                loadThreads();
                
            } catch (error) {
                console.error('Ошибка создания треда:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            await getUserIp();
            loadThreads();
            
            // Кнопка создания треда
            document.getElementById('createThreadBtn').addEventListener('click', () => {
                document.getElementById('createThreadModal').style.display = 'block';
            });
            
            // Кнопка отправки
            document.getElementById('submitThread').addEventListener('click', createThread);
            
            // Кнопка отмены
            document.getElementById('cancelThread').addEventListener('click', () => {
                document.getElementById('createThreadModal').style.display = 'none';
                document.getElementById('threadTitle').value = '';
                document.getElementById('threadContent').value = '';
            });
            
            // Закрытие по клику на фон
            document.getElementById('createThreadModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('createThreadModal')) {
                    e.target.style.display = 'none';
                }
            });
            
            // Закрытие по Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.getElementById('createThreadModal').style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
